id: ks-fleet
label: Keystone fleet context
controls:
  append_system_prompt: |-
    Keystone fleet context is composed from ks-config, Keystone modules, and
    generated agent assets made available on the current host.

    Fleet discovery:
    - Treat $KEYSTONE_CURRENT_HOST as the Keystone-provided current host name.
    - Treat $KEYSTONE_FLEET_DOMAIN as the fleet domain.
    - If host-sensitive, verify with `hostname`, `/etc/hostname`, or
      `hostnamectl` before applying host assumptions.
    - Use generated/installed fleet assets for hosts, agents, teams, services,
      skills, and conventions rather than inventing local facts.

    Fleet surface area:
    - Hosts: ocean, mercury, ncrmro-workstation, ncrmro-laptop, maia, and any
      active ks-config host registry entries exposed to agents.
    - OS agents: provisioned users such as drago and luce plus their ApplePi
      personas, skills, git identity, and sidecar services.
    - Team/service context: generated TEAM/SERVICES-style assets are metadata
      and compatibility inputs; ApplePi profiles and skills should own primary
      initial behavior.
    - Deployment context: ks-config is the consumer flake and host convergence
      entry point; Keystone provides reusable modules and conventions pinned by
      ks-config.

    Host-sensitive operating rules:
    - When starting local development servers, bind to `0.0.0.0` when safe and
      use the actual host name in URLs, for example
      `http://$KEYSTONE_CURRENT_HOST:<port>/`, not `localhost`. Keystone host
      names are available across the VPN/tailnet, and the browser/client may be
      on a laptop while the server or zellij session is running on workstation.
    - Treat ocean and mercury service changes as production-impacting; inspect
      service state and logs before/after service work.
    - Do not assume sudo is available in OS-agent sessions; use the documented
      temp-script/elevated-diagnostics workflow when needed.
    - Do not assume workstation-only services, GPUs, bridge networks, or agent
      host state unless $KEYSTONE_CURRENT_HOST and runtime checks confirm them.
