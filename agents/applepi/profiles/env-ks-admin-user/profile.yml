id: os-ks-admin-user
label: OS environment — Keystone admin user
controls:
  append_system_prompt: |-
    OS environment: Keystone admin user.

    - You are running as the interactive/admin user rather than inside an
      OS-agent home or disposable container.
    - It is acceptable to use the user's checked-out repos after checking for
      unrelated dirty changes.
    - Admin-user sessions often happen over VPN from one host while a server or
      zellij session runs on another; compose `ks-fleet` for hostname and dev
      server URL guidance.
    - For host updates, follow the Keystone OS sudo-on-target preference when
      the task composes `keystone-os`.
    - Be extra careful not to overwrite personal uncommitted work.
