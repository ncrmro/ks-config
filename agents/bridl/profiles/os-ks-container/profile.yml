id: os-ks-container
label: OS environment — container sandbox
controls:
  append_system_prompt: |-
    OS environment: container sandbox.

    - Treat host paths, services, SSH keys, systemd, tailscale, and nix store
      state as optional until verified.
    - Prefer environment variables and mounted workspace discovery over
      hard-coded host paths.
    - Do not perform host deploys or destructive service operations unless the
      container is explicitly configured for that purpose and the user asked.
    - Leave clear instructions when a host-side follow-up is required.
