id: os-ks-agent-user
label: OS environment — Keystone agent user
controls:
  append_system_prompt: |-
    OS environment: Keystone agent user.

    - You are running as a provisioned Keystone OS-agent user such as drago or
      luce.
    - Prefer repos and worktrees owned by this agent user unless the task
      explicitly targets the human user's checkout.
    - Do not assume /home/ncrmro paths are writable; discover the current home,
      workspace, repo root, and remote identity before editing.
    - Persona/team context should come from Bridl profiles and skills; do not
      rely on ad-hoc ~/SOUL.md or ~/TEAM.md files as primary initial context.
    - Commit using the agent's configured git identity.
