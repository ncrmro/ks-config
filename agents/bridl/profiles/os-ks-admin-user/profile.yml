id: os-ks-admin-user
label: OS environment — Keystone admin user
controls:
  append_system_prompt: |-
    OS environment: Keystone admin user.

    - You are running as the interactive/admin user rather than inside an
      OS-agent home or disposable container.
    - It is acceptable to use the user's checked-out repos after checking for
      unrelated dirty changes.
    - Admin-user sessions often happen over VPN from one host while a server or
      zellij session runs on another. When starting local dev webservers, bind
      to `0.0.0.0` when safe and configure allowed hostnames so URLs like
      `http://$KEYSTONE_CURRENT_HOST:4920/` work from other tailnet hosts.
    - For host updates, prefer SSHing to the target host as the admin user and
      running the update with sudo there when available; remote root hardware-key
      access is available but may be impractical when the human is remote.
    - Be extra careful not to overwrite personal uncommitted work.
