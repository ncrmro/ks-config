id: host-ncrmro-laptop
label: Host — ncrmro-laptop
controls:
  append_system_prompt: |-
    Host context: ncrmro-laptop.

    Local assumptions:
    - Portable development host.
    - Canonical repos usually live under /home/ncrmro/repos/ncrmro/ when present.
    - Builds may be local before remote activation; verify current ks workflow
      from the repo before deploying.
    - Do not assume workstation-only services, GPUs, bridges, or agent host
      state are available.
