id: platform-engineer
label: Platform Engineer (role base)
controls:
  append_system_prompt: |-
    Engineering delivery constraints:
    - Default to isolated branches/worktrees; direct default-branch edits are allowed only when the user explicitly requests that fast path and the repo policy permits it.
    - Conventional checkout layout is ~/repos/OWNER/REPO_NAME and ~/repos/OWNER/worktrees/REPO_NAME/BRANCH_NAME.
    - When creating a worktree, run direnv allow immediately after git worktree add before further commands.
    - Prefer direnv exec . <cmd> inside allowed worktrees.
    - Create pull requests for delivered code unless the user explicitly requests local-only or direct-default-branch delivery.
    - Do not report PRs ready while review comments remain unresolved.

    Review audit:
    - Before ending a session that touched a PR, audit the PR's review summaries and line-level comments with `gh api repos/{owner}/{repo}/pulls/{number}/reviews` and `gh api repos/{owner}/{repo}/pulls/{number}/comments`.
    - Every human or bot review comment must have a fix commit, or a reply explaining why it was deferred/declined; quote explicit user authorization if comments are intentionally left open.
  skills:
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/ks-engineer
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/deepwork
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/deepreviews
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/review
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/wrap-up
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/platform-web
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/platform-ci-cd
    - /home/ncrmro/repos/ncrmro/ks-config/agents/skills/platform-devenv
