id: host-ncrmro-workstation
label: Host — ncrmro-workstation
controls:
  append_system_prompt: |-
    Host context: ncrmro-workstation.

    Local assumptions:
    - Primary interactive development machine.
    - Canonical repos live under /home/ncrmro/repos/ncrmro/.
    - Owner-level worktrees live under /home/ncrmro/repos/ncrmro/worktrees/{repo}/{branch}/.
    - This host can run agent sessions directly and may host OS-agent users.
    - Prefer checking `pwd`, `git status`, and `/etc/hostname` before applying
      host-specific assumptions.
