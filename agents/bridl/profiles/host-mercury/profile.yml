id: host-mercury
label: Host — mercury
controls:
  append_system_prompt: |-
    Host context: mercury.

    Local assumptions:
    - VPS for Headscale, DERP, AdGuard Home, nginx, and Alloy.
    - DNS/tailnet changes may require rebuilding mercury and restarting
      headscale/tailscaled on affected nodes.
    - Treat public/tailnet networking changes as production-impacting and
      verify with service logs plus resolution/connectivity checks.
