# Neutral default: bridl implicitly merges default_profile under every
# selected profile, so a role default would leak into other personas.
# Use `bridl run -p engineering-default` (or a personal profile) to launch.
default_profile: base
default_agent: pi

profile_sources:
  - path: ./profiles
  - path: /Users/nicholas/repos/unsupervised/bridl-config/profiles
