# Keystone Desktop — Hyprland entry point.
# This file lives in your ks-config repo and is symlinked to
# ~/.config/hypr/hyprland.conf by Home Manager. Edit any fragment,
# then `hyprctl reload` — no nix rebuild needed.
#
# Each concern lives in its own fragment so humans and agents can make
# small reviewable edits.

# Default applications, referenced by bindings.conf.
$terminal = ghostty
$fileManager = nautilus --new-window
$browser = firefox --new-window
$launcher = wofi --show drun

source = ./monitors.conf
source = ./input.conf
source = ./appearance.conf
source = ./layout.conf
source = ./bindings.conf
source = ./windowrules.conf
source = ./envs.conf
source = ./autostart.conf

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# Hardware cursors don't handle rotated monitors correctly,
# causing the cursor to be invisible or stuck on transformed displays.
# See: https://github.com/hyprwm/Hyprland/issues/8993
cursor {
    no_hardware_cursors = true
}

ecosystem {
    no_update_news = true
}
