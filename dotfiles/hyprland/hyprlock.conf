# Keystone hyprlock — read from ~/.config/hypr/hyprlock.conf (stow link).
# The session starts locked (autostart.conf); unlock with your account
# password (VMs: "keystone").

general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(17, 17, 27, 1.0)
}

label {
    monitor =
    text = keystone
    color = rgba(184, 162, 108, 1.0)
    font_size = 32
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 48
    outline_thickness = 2
    outer_color = rgba(184, 162, 108, 1.0)
    inner_color = rgba(30, 30, 46, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    placeholder_text = <i>password…</i>
    fade_on_empty = false
    position = 0, 20
    halign = center
    valign = center
}
