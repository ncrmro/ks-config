# Keybindings. See docs/documentation/keyboard-philosophy.md for the shared
# scheme these implement across Hyprland, GNOME, and Aerospace.
#
# $mod is Super — but with altwin:swap_alt_win (input.conf) the PHYSICAL key
# is Alt, next to the spacebar, matching Aerospace on macOS.

$mod = SUPER

# --- Application launchers ---
bind = $mod, Return, exec, $terminal
bind = $mod, Space, exec, $launcher
bind = $mod, B, exec, $browser
bind = $mod, E, exec, $fileManager

# --- Window management ---
bind = $mod, W, killactive,
bind = CTRL ALT, Delete, exec, hyprctl dispatch closewindow address:*
bind = $mod SHIFT, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, T, layoutmsg, togglesplit

# --- Focus: vim keys and arrows ---
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# --- Move windows: vim keys and arrows ---
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r
bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

# --- Workspaces 1-10 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# --- Move window to workspace ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Cycle workspaces ---
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1
bind = $mod CTRL, Tab, workspace, previous
bind = $mod, comma, workspace, -1
bind = $mod, period, workspace, +1
bind = $mod SHIFT, comma, movetoworkspace, -1
bind = $mod SHIFT, period, movetoworkspace, +1
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# --- Cycle windows (Alt+Tab — physical Super+Tab with the key swap) ---
bind = ALT, Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, bringactivetotop,

# --- Scratchpad ---
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# --- Fullscreen ---
bind = $mod, F, fullscreen,
bind = SHIFT, F11, fullscreen, 0
bind = ALT, F11, fullscreen, 1

# --- Resize ---
bind = $mod, minus, resizeactive, -100 0
bind = $mod, equal, resizeactive, 100 0
bind = $mod SHIFT, minus, resizeactive, 0 -100
bind = $mod SHIFT, equal, resizeactive, 0 100

# --- Universal copy/paste/cut (works in terminals too) ---
bind = $mod, C, sendshortcut, CTRL, Insert,
bind = $mod, V, sendshortcut, SHIFT, Insert,
bind = $mod, X, sendshortcut, CTRL, X,

# --- Clipboard history ---
bind = $mod CTRL, V, exec, $terminal --class clipse -e clipse

# --- Notifications (mako) ---
bind = $mod SHIFT, N, exec, makoctl dismiss
bind = $mod ALT, N, exec, makoctl dismiss --all
bind = $mod CTRL SHIFT, N, exec, makoctl mode -t do-not-disturb

# --- Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mod, Print, exec, hyprpicker -a

# --- Bar toggle ---
bind = $mod SHIFT, Space, exec, killall -SIGUSR1 waybar

# --- Session ---
bind = $mod CTRL, L, exec, hyprlock
bind = $mod CTRL, Q, exit,

# --- Mouse bindings ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Volume and brightness (repeat while held, work when locked) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# --- Media keys ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# --- Lid switch: lock AND suspend on close ---
bindl = , switch:on:Lid Switch, exec, pidof hyprlock || hyprlock; systemctl suspend
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on
