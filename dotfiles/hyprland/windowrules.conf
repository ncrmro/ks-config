# Window rules. Hyprland 0.54+ syntax: "action value, match:field pattern".
# tile/float need an explicit "on" — bare "tile" or "float" is a parse error.

# Chromium --app mode misidentifies windows as popups, so they float
# and overlap your tiled layout. Force them back into tiles.
windowrule = tile on, match:class ^(chromium)$

# Volume and bluetooth panels are small fixed dialogs — floating
# keeps them out of the tiling grid where they'd get awkwardly stretched.
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol|.blueman-manager-wrapped|blueman-manager)$

# Subtle transparency gives depth cues between focused and background
# windows. Video, streaming, and gaming apps get full opacity so content
# isn't washed out.
windowrule = opacity 0.97 0.9, match:class .*
windowrule = opacity 1 1, match:class ^(chromium|google-chrome|google-chrome-unstable)$, match:title .*Youtube.*
windowrule = opacity 1 0.97, match:class ^(chromium|google-chrome|google-chrome-unstable)$
windowrule = opacity 0.97 0.9, match:class ^(chrome-.*-Default)$
windowrule = opacity 1 1, match:class ^(chrome-youtube.*-Default)$
windowrule = opacity 1 1, match:class ^(zoom|vlc|org.kde.kdenlive|com.obsproject.Studio)$
windowrule = opacity 1 1, match:class ^(com.libretro.RetroArch|steam)$

# Clipse clipboard picker appears as a centered overlay, not a tiled pane.
windowrule = float on, match:class (clipse)
windowrule = size 622 652, match:class (clipse)

# hyprpolkitagent's password dialog is a fixed-size modal but ships no
# Wayland app_id, so match empty class AND the title. `pin` keeps it above
# tiled windows so an active terminal can't focus-steal it.
windowrule = float on, match:class ^$, match:title ^(Authentication required)$
windowrule = center on, match:class ^$, match:title ^(Authentication required)$
windowrule = size 486 246, match:class ^$, match:title ^(Authentication required)$
windowrule = pin on, match:class ^$, match:title ^(Authentication required)$
windowrule = opacity 0.85 0.78, match:class ^$, match:title ^(Authentication required)$
windowrule = rounding 12, match:class ^$, match:title ^(Authentication required)$
