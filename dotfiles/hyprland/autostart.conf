# Session autostart.
# D-Bus activation environment — required for app notifications to reach mako.
exec-once = systemctl --user import-environment
exec-once = dbus-update-activation-environment --systemd --all

exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent

# Clipboard: persist after apps close, and record history for clipse.
exec-once = wl-clip-persist --clipboard regular & clipse -listen
