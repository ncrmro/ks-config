# Session environment. Adjust GDK_SCALE to match your display (1 or 2).
env = GDK_SCALE, 2

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita
env = HYPRCURSOR_THEME, Adwaita
env = GTK_THEME, Adwaita:dark

# Force all apps to use Wayland
env = GDK_BACKEND, wayland
env = QT_QPA_PLATFORM, wayland
env = SDL_VIDEODRIVER, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = OZONE_PLATFORM, wayland

# Make .desktop files available for the launcher
env = XDG_DATA_DIRS, $XDG_DATA_DIRS:$HOME/.nix-profile/share:/nix/var/nix/profiles/default/share
env = PATH, $HOME/.local/bin:$PATH

# Allow software rendering fallback in VMs (no-op on bare metal with GPU)
env = WLR_RENDERER_ALLOW_SOFTWARE, 1

# NVIDIA systems: uncomment.
# env = NVD_BACKEND, direct
# env = LIBVA_DRIVER_NAME, nvidia
# env = __GLX_VENDOR_LIBRARY_NAME, nvidia

xwayland {
    force_zero_scaling = true
}
