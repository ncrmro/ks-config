# Monitor layout. Pick the profile matching your hardware and comment the
# rest. See docs/documentation/monitors.md in keystone-desktop for how
# workspaces map onto each shape.
#
# Syntax: monitor = name, resolution, position, scale
# List outputs with: hyprctl monitors

# --- Default: let Hyprland pick for any monitor ---
monitor = , preferred, auto, 1

# --- Laptop (HiDPI internal panel) ---
# monitor = eDP-1, preferred, auto, 2

# --- Ultrawide (single 3440x1440) ---
# monitor = DP-1, 3440x1440@100, 0x0, 1

# --- Multi-monitor (laptop + external above) ---
# monitor = eDP-1, preferred, 0x1440, 2
# monitor = DP-1, 2560x1440@60, 0x0, 1

# Pin workspaces to monitors in multi-monitor setups:
# workspace = 1, monitor:DP-1, default:true
# workspace = 9, monitor:eDP-1
