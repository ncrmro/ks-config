# Keyboard and pointer input.
#
# altwin:swap_alt_win: physical Alt sends Super keycodes, placing window
# management ($mod) on the ergonomic thumb position — the same physical key
# Aerospace uses on macOS. Physical Super sends Alt for browser back/forward.
# ctrl:nocaps: Caps Lock acts as Control.
input {
    kb_layout = us
    kb_options = ctrl:nocaps,altwin:swap_alt_win
    follow_mouse = 1
    sensitivity = 0
    scroll_factor = 0.4

    touchpad {
        natural_scroll = true
        drag_lock = false
    }
}
