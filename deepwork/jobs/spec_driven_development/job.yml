name: spec_driven_development
summary: "Spec-driven development workflow that turns specifications into working implementations through structured planning."

step_arguments:
  - name: development_priorities
    description: "Key priorities like code quality, testing, UX consistency, performance"
    type: string

  - name: docs_folder
    description: "Path to the project's documentation folder where the constitution and other governance files are stored"
    type: string

  - name: feature_name
    description: "Name of the feature being specified (lowercase, hyphens for spaces)"
    type: string

  - name: feature_description
    description: "High-level description of what the feature should do"
    type: string

  - name: docs_folder
    description: "Path to the project documentation folder where constitution.md and architecture.md live (e.g., 'docs' or 'doc')"
    type: string

  - name: constitution.md
    description: "Foundational governance principles and development guidelines"
    type: file_path

  - name: spec.md
    description: "Functional requirements as user stories without technology choices"
    type: file_path

  - name: plan.md
    description: "Technical implementation strategy including architecture and technology choices"
    type: file_path

  - name: data-model.md
    description: "Data model documentation with all entities and relationships"
    type: file_path

  - name: api-spec.json
    description: "API endpoint definitions with request/response schemas"
    type: file_path

  - name: research.md
    description: "Research findings and technology evaluations"
    type: file_path

  - name: architecture.md
    description: "Project architecture document, updated to include feature components and integrations"
    type: file_path

  - name: tasks.md
    description: "Actionable, ordered development tasks organized by user story"
    type: file_path

  - name: source_files
    description: "Implementation source files as specified in tasks"
    type: file_path

  - name: test_files
    description: "Test files as specified in tasks"
    type: file_path

workflows:
  full:
    summary: "Full spec-driven development lifecycle from constitution through implementation"
    common_job_info_provided_to_all_steps_at_runtime: |
      A comprehensive workflow inspired by GitHub's spec-kit that enables "spec-driven development" -
      a methodology where executable specifications generate working implementations rather than
      merely guiding them.

      This job inverts traditional development: instead of starting with code, you first create
      detailed specifications that directly generate implementations. The workflow progresses through
      six phases: Constitution, Specification, Clarification, Planning, Task Generation, and Implementation.

      The workflow produces all artifacts in a `specs/[feature-name]/` directory structure,
      keeping specifications versioned alongside the implementation they generate.
    steps:
      - name: constitution
        instructions: |
          # Establish Constitution

          ## Objective

          Create a foundational governance document (`constitution.md`) that establishes project principles, development guidelines, and quality standards that will guide all subsequent specification and implementation work.

          ## Task

          Guide the user through defining their project's constitution by asking structured questions about their development priorities, quality standards, and governance preferences.

          **Important**: Use the AskUserQuestion tool to ask structured questions when gathering information from the user.

          **Critical**: This step captures principles and standards, not implementation code. The constitution describes what technologies and patterns to use, not how to code them. Do not include code examples - those belong only in the implement step.

          ### Step 1: Understand Development Priorities

          Ask structured questions to understand the project's core values:

          1. **What are your top development priorities?** (Select all that apply)
             - Code quality and maintainability
             - Test coverage and reliability
             - Performance and scalability
             - Security and data protection
             - UX consistency and accessibility
             - Developer experience and productivity
             - Documentation quality

          2. **What's the primary nature of this project?**
             - New greenfield development
             - Adding features to existing codebase
             - Refactoring/modernization effort
             - Prototype/experimental work

          3. **Who are the stakeholders?**
             - Who will review specifications?
             - Who will review code?
             - Who are the end users?

          ### Step 2: Define Technology Preferences

          Gather technology stack information:

          1. **What's your preferred technology stack?**
             - Languages (e.g., TypeScript, Python, Go)
             - Frameworks (e.g., React, Django, FastAPI)
             - Databases (e.g., PostgreSQL, MongoDB, SQLite)
             - Infrastructure (e.g., AWS, GCP, self-hosted)

          2. **What are your testing preferences?**
             - Unit testing framework preferences
             - Integration testing approach
             - E2E testing tools (if applicable)
             - Required coverage thresholds

          3. **What coding standards do you follow?**
             - Style guides (e.g., Airbnb, Google, PEP 8)
             - Linting/formatting tools
             - Code review requirements

          ### Step 3: Establish Quality Standards

          Define what "good" looks like:

          1. **What are your code quality requirements?**
             - Type safety requirements
             - Documentation requirements (JSDoc, docstrings, etc.)
             - Maximum complexity thresholds
             - Required patterns (e.g., dependency injection, SOLID)

          2. **What are your testing requirements?**
             - Minimum test coverage percentage
             - Required test types (unit, integration, e2e)
             - Performance benchmarks

          3. **What are your security requirements?**
             - Authentication/authorization standards
             - Data handling requirements
             - Compliance needs (GDPR, HIPAA, etc.)

          ### Step 4: Define Governance Rules

          Establish how the project will be managed:

          1. **What's your branching strategy?**
             - Main branch protection rules
             - Feature branch naming conventions
             - PR/MR requirements

          2. **What are your review requirements?**
             - Number of required reviewers
             - Who can approve what types of changes
             - Automated checks that must pass

          3. **How should specifications be maintained?**
             - When should specs be updated?
             - Who owns spec maintenance?
             - How are spec changes tracked?

          ### Step 5: Create the Constitution File

          After gathering all information, create the constitution document.

          **Create the constitution file** at `[docs_folder]/constitution.md`:

          ```markdown
          # Project Constitution

          ## Overview

          [Brief description of the project and its purpose]

          ## Development Priorities

          [Ordered list of priorities gathered from Step 1]

          1. [Top priority]
          2. [Second priority]
          ...

          ## Technology Stack

          ### Languages
          - [Primary language]: [Version]

          ### Frameworks
          - [Framework]: [Version]

          ### Databases
          - [Database]: [Purpose]

          ### Infrastructure
          - [Platform]: [Services used]

          ## Quality Standards

          ### Code Quality
          - [Standard 1]
          - [Standard 2]

          ### Testing Requirements
          - Minimum coverage: [X]%
          - Required test types: [List]

          ### Security Requirements
          - [Requirement 1]
          - [Requirement 2]

          ## Governance

          ### Branching Strategy
          [Description]

          ### Review Requirements
          - Required reviewers: [Number]
          - Required checks: [List]

          ### Specification Maintenance
          [How specs should be updated and tracked]

          ## Principles

          [3-5 guiding principles that should inform all development decisions]

          1. **[Principle Name]**: [Description]
          2. **[Principle Name]**: [Description]
          ...
          ```

          ## Example Dialog

          ```
          Claude: I'll help you establish a constitution for your project. This will define the governance
          principles and development guidelines that will guide all specifications and implementations.

          Let's start with your development priorities. What matters most to you?

          [Uses AskUserQuestion with multi-select options for priorities]

          User: [Selects: Code quality, Test coverage, Security]

          Claude: Great choices. Now let me understand your technology preferences.

          What's your primary language and framework?

          User: We're using TypeScript with Next.js and PostgreSQL

          Claude: Perfect. What are your testing requirements? Do you have specific coverage thresholds
          or required test types?

          User: We need 80% coverage minimum, with unit tests for all business logic and integration
          tests for API endpoints.

          Claude: Got it. What about security? Are there specific compliance requirements or security
          standards you need to follow?

          User: We handle user data, so GDPR compliance is important. All data must be encrypted at
          rest and in transit.

          [Continues gathering information...]

          Claude: Based on our conversation, here's the constitution I've created:

          [Shows constitution content]

          Constitution established!

          **File created:**
          - [docs_folder]/constitution.md

          **Next step:**
          Run `/spec_driven_development.specify` to create your first feature specification.
          ```

          ## Output Format

          ### [docs_folder]/constitution.md

          A markdown document containing:
          - Project overview
          - Prioritized development values
          - Technology stack with versions
          - Quality standards and thresholds
          - Governance rules and processes
          - Guiding principles

          **Location**: `[docs_folder]/constitution.md`

          After creating the file:
          1. Summarize the key principles established
          2. Confirm the file has been created
          3. Tell the user to run `/spec_driven_development.specify` to create their first feature specification
        inputs:
          docs_folder:
            required: false
          development_priorities:
            required: false
        outputs:
          constitution.md:
            required: true
        process_requirements:
          priorities_captured: "The agent MUST gather specific development priorities from the user."
          principles_defined: "Governance principles MUST be clear and actionable."
          technology_guidance: "The constitution SHOULD include relevant technology stack preferences."
          quality_standards: "Quality standards and testing expectations MUST be defined."
          file_created: "constitution.md MUST be created in the project's documentation folder."

      - name: specify
        instructions: |
          # Create Specification

          ## Objective

          Create a functional specification (`spec.md`) that defines what the feature should do and why, using user stories and acceptance criteria, without making technology or implementation decisions.

          ## Task

          Guide the user through creating a comprehensive specification by asking structured questions about their feature requirements, user needs, and success criteria.

          **Important**: Use the AskUserQuestion tool to ask structured questions when gathering information from the user.

          **Critical**: Do not include any code examples, implementation snippets, or technical solutions. The specification describes user needs and acceptance criteria in plain language.

          ### Prerequisites

          Before starting, verify:
          1. The constitution exists at `[docs_folder]/constitution.md`
          2. Read the constitution to understand project principles and priorities

          If the constitution doesn't exist, inform the user they should run `/spec_driven_development.constitution` first.

          ### Step 1: Define the Feature

          Ask structured questions to understand the feature:

          1. **What is this feature called?**
             - Get a concise, descriptive name
             - Convert to lowercase with hyphens for the directory name (e.g., "User Authentication" -> "user-authentication")

          2. **What problem does this feature solve?**
             - What user pain point does it address?
             - What business value does it provide?
             - Why is this feature needed now?

          3. **Who are the users of this feature?**
             - Primary user personas
             - Secondary stakeholders
             - Admin or support considerations

          ### Step 2: Gather User Stories

          For each user type identified, ask structured questions to create user stories:

          1. **What does [user type] need to do?**
             - What's their goal?
             - What triggers them to use this feature?
             - What does success look like for them?

          2. **Create user stories in standard format:**
             ```
             As a [user type]
             I want to [action]
             So that [benefit/goal]
             ```

          3. **Define acceptance criteria for each story:**
             - What must be true for this story to be "done"?
             - What are the happy path scenarios?
             - What are the edge cases?

          ### Step 3: Define Requirements

          Gather detailed requirements:

          1. **Functional Requirements**
             - What actions must users be able to take?
             - What data must be captured or displayed?
             - What workflows must be supported?

          2. **Non-Functional Requirements**
             - Performance: What are acceptable response times?
             - Security: What data needs protection? What access controls?
             - Accessibility: What accessibility standards apply?
             - Scalability: What load must this support?

          3. **Constraints**
             - What are the boundaries of this feature?
             - What is explicitly out of scope?
             - What dependencies exist on other features?

          ### Step 4: Define Scope Boundaries

          Clearly establish what's in and out of scope:

          1. **In Scope**
             - List all capabilities included in this feature
             - Be specific about what will be delivered

          2. **Out of Scope**
             - Explicitly list what will NOT be included
             - Identify items that might be assumed but aren't part of this work
             - Note future enhancements that are deferred

          3. **Assumptions**
             - What are we assuming to be true?
             - What dependencies must be in place?

          ### Step 5: Create the Specification File

          **Create directory structure first:**
          ```bash
          mkdir -p specs/[feature-name]
          ```

          **Create the specification file** at `specs/[feature-name]/spec.md`:

          ```markdown
          # [Feature Name] Specification

          ## Overview

          ### Problem Statement
          [Description of the problem this feature solves]

          ### Business Value
          [Why this feature matters to the business/users]

          ### Target Users
          - **[User Type 1]**: [Description and needs]
          - **[User Type 2]**: [Description and needs]

          ## User Stories

          ### US-1: [Story Title]

          **As a** [user type]
          **I want to** [action]
          **So that** [benefit]

          **Acceptance Criteria:**
          - [ ] [Criterion 1]
          - [ ] [Criterion 2]
          - [ ] [Criterion 3]

          **Edge Cases:**
          - [Edge case 1]: [Expected behavior]
          - [Edge case 2]: [Expected behavior]

          ### US-2: [Story Title]
          [Continue for each user story...]

          ## Requirements

          ### Functional Requirements

          | ID | Requirement | Priority | Notes |
          |----|-------------|----------|-------|
          | FR-1 | [Requirement] | Must Have | |
          | FR-2 | [Requirement] | Should Have | |

          ### Non-Functional Requirements

          #### Performance
          - [Performance requirement 1]
          - [Performance requirement 2]

          #### Security
          - [Security requirement 1]
          - [Security requirement 2]

          #### Accessibility
          - [Accessibility requirement 1]

          ## Scope

          ### In Scope
          - [Capability 1]
          - [Capability 2]

          ### Out of Scope
          - [Excluded item 1]
          - [Excluded item 2]

          ### Assumptions
          - [Assumption 1]
          - [Assumption 2]

          ### Dependencies
          - [Dependency 1]
          - [Dependency 2]

          ## Open Questions

          [List any questions that need clarification before planning]

          1. [Question 1]
          2. [Question 2]
          ```

          ## Example Dialog

          ```
          Claude: I'll help you create a specification for your new feature. Let me first check the
          project constitution...

          [Reads [docs_folder]/constitution.md]

          Great, I see you're prioritizing code quality and security. Let's define your feature.

          What feature are you building? Give me a name and brief description.

          User: User authentication - allowing users to sign up and log in to our app

          Claude: Perfect. I'll create this under `specs/user-authentication/`.

          What problem does authentication solve for your users? Why do they need accounts?

          User: Users need accounts to save their preferences and access their data across devices.

          Claude: That makes sense. Who are the primary users of this authentication system?

          [Uses AskUserQuestion with options: New users signing up, Returning users logging in,
          Admins managing users, All of the above]

          User: All of the above

          Claude: Let's create user stories for each. Starting with new users signing up:

          What's most important to a new user when creating an account?

          User: Quick signup - ideally with email or social login. No lengthy forms.

          Claude: Got it. Here's the user story I'd write:

          **As a** new user
          **I want to** sign up quickly using my email or social account
          **So that** I can start using the app without friction

          What would make this story "done"? What must work for you to accept it?

          User: They need to be able to sign up with email/password or Google. Email verification
          should be required. The whole flow should take under a minute.

          Claude: Those are clear acceptance criteria. Now let's think about edge cases...

          [Continues gathering information...]

          Specification created!

          **File created:**
          - specs/user-authentication/spec.md

          **Open Questions:**
          I noted 2 questions that need clarification before we can plan the implementation.

          **Next step:**
          Run `/spec_driven_development.clarify` to resolve open questions and finalize the spec.
          ```

          ## Validation Rules

          Before creating the spec.md, ensure:
          - Feature name is lowercase with hyphens
          - All user stories follow "As a... I want... So that..." format
          - Each story has at least 2 acceptance criteria
          - In/out of scope sections are populated
          - No technology or implementation details are included
          - Open questions are documented

          ## Output Format

          ### specs/[feature-name]/spec.md

          A markdown document containing:
          - Overview (problem, value, users)
          - User stories with acceptance criteria
          - Functional and non-functional requirements
          - Scope boundaries
          - Open questions

          **Location**: `specs/[feature-name]/spec.md`

          After creating the file:
          1. Summarize the key user stories
          2. Highlight any open questions that need resolution
          3. Tell the user to run `/spec_driven_development.clarify` to resolve ambiguities
        inputs:
          docs_folder:
            required: true
          feature_name:
            required: true
          feature_description:
            required: true
          constitution.md:
            required: true
        outputs:
          spec.md:
            required: true
        process_requirements:
          user_stories_complete: "All user stories MUST be written in standard format (As a... I want... So that...)."
          acceptance_criteria: "Each story MUST have clear, testable acceptance criteria."
          non_functional_requirements: "Performance, security, and accessibility requirements MUST be captured."
          scope_boundaries: "It MUST be clear what is in and out of scope."
          constitution_aligned: "The spec MUST respect the governance principles from the constitution."
          technology_agnostic: "The spec MUST be free of implementation details and technology choices."
          file_created: "spec.md MUST be created in specs/[feature-name]/."

      - name: clarify
        instructions: |
          # Clarify Specification

          ## Objective

          Resolve ambiguities, fill gaps, and validate completeness of the specification through systematic questioning. The goal is to ensure the spec is detailed enough for technical planning.

          ## Task

          Review the existing specification, identify underspecified areas, and ask structured questions to resolve them. Update the spec.md with clarifications.

          **Important**: Use the AskUserQuestion tool to ask structured questions when gathering information from the user.

          **Critical**: Do not add code examples or technical solutions. Keep clarifications focused on user needs, acceptance criteria, and behavior.

          ### Prerequisites

          Before starting, verify:
          1. The specification exists at `specs/[feature-name]/spec.md`
          2. Read the specification thoroughly

          If no specification exists, inform the user they should run `/spec_driven_development.specify` first.

          ### Step 1: Identify the Feature

          Ask the user which feature specification to clarify:

          ```
          Which feature specification would you like to clarify?
          ```

          If they provide a name, look for `specs/[feature-name]/spec.md`.

          ### Step 2: Analyze for Ambiguities

          Read the specification and identify gaps in these categories:

          1. **Underspecified User Stories**
             - Stories missing acceptance criteria
             - Vague or unmeasurable criteria
             - Missing edge case definitions

          2. **Unclear Requirements**
             - Requirements with ambiguous language ("fast", "user-friendly", "secure")
             - Missing quantitative thresholds
             - Undefined terms or jargon

          3. **Missing Scenarios**
             - Error handling not defined
             - Edge cases not covered
             - Multi-user scenarios not addressed

          4. **Integration Gaps**
             - Undefined interactions with other features
             - Missing data flow definitions
             - Unclear state transitions

          5. **Open Questions**
             - Any questions listed in the "Open Questions" section
             - Implicit assumptions that need validation

          ### Step 3: Systematic Clarification

          For each ambiguity identified, ask structured questions:

          **Format your questions systematically:**

          ```
          I've identified [N] areas that need clarification in your specification.

          **Ambiguity 1: [Category] - [Brief Description]**

          The spec says: "[Quote from spec]"

          This is ambiguous because: [Explanation]

          Question: [Specific clarifying question]

          Options:
          - [Option A with implications]
          - [Option B with implications]
          - [Other - user can specify]
          ```

          **Question best practices:**
          - One topic per question
          - Provide options when possible
          - Explain implications of each option
          - Reference specific parts of the spec

          ### Step 4: Validate Edge Cases

          For each user story, ensure edge cases are covered:

          1. **What happens if the user...**
             - Provides invalid input?
             - Cancels midway?
             - Loses connection?
             - Times out?

          2. **What happens when...**
             - The system is under load?
             - Required data is missing?
             - External services are unavailable?

          3. **What about...**
             - First-time users vs returning users?
             - Different user permission levels?
             - Concurrent access scenarios?

          ### Step 5: Update the Specification

          After gathering clarifications, update `specs/[feature-name]/spec.md`:

          1. **Add a Clarifications section:**
             ```markdown
             ## Clarifications

             ### [Date] Clarification Session

             **Q1: [Original question]**
             A: [Answer received]
             Impact: [How this affects the spec]

             **Q2: [Original question]**
             A: [Answer received]
             Impact: [How this affects the spec]
             ```

          2. **Update affected sections:**
             - Refine vague acceptance criteria with specific thresholds
             - Add missing edge cases to user stories
             - Update non-functional requirements with concrete numbers
             - Remove or resolve open questions

          3. **Mark resolved questions:**
             - Move resolved items from "Open Questions" to "Clarifications"
             - Add any new questions discovered during clarification

          ### Step 6: Validate Acceptance Checklist

          Create or update an acceptance checklist:

          ```markdown
          ## Acceptance Checklist

          ### User Stories
          - [ ] All stories have 3+ acceptance criteria
          - [ ] All criteria are testable/measurable
          - [ ] Edge cases are documented

          ### Requirements
          - [ ] Performance thresholds defined (response times, throughput)
          - [ ] Security requirements are specific
          - [ ] Accessibility standards identified

          ### Scope
          - [ ] In-scope items are detailed
          - [ ] Out-of-scope items are explicit
          - [ ] Assumptions are documented

          ### Completeness
          - [ ] No open questions remain
          - [ ] All ambiguities resolved
          - [ ] Ready for technical planning
          ```

          ## Example Dialog

          ```
          Claude: I'll help clarify the specification. Which feature would you like to work on?

          User: user-authentication

          Claude: Let me review the spec at `specs/user-authentication/spec.md`...

          [Reads specification]

          I've identified 4 areas that need clarification:

          **Ambiguity 1: Performance - "Quick signup flow"**

          The spec says: "The whole flow should take under a minute"

          This is ambiguous because: It's unclear if this refers to user time, system response time,
          or includes email verification.

          What does "under a minute" mean for the signup flow?

          [Uses AskUserQuestion with options:
          - User can complete form in under 1 minute (not including email verification)
          - System processes signup in under 1 minute (including sending verification email)
          - End-to-end including email verification click
          - Other]

          User: User can complete form in under 1 minute, not including verification

          Claude: Got it. I'll update the spec to say:
          "Users can complete the signup form within 60 seconds. Email verification is asynchronous
          and not included in this timing."

          **Ambiguity 2: Security - "Email verification required"**

          The spec doesn't define what happens if verification isn't completed.

          What should happen to unverified accounts?

          [Uses AskUserQuestion with options:
          - Allow limited access for 24 hours, then restrict
          - No access until verified
          - Full access but with reminder prompts
          - Other]

          User: Allow limited access for 24 hours

          Claude: What does "limited access" mean? What can unverified users do vs not do?

          [Continues clarification...]

          After resolving all ambiguities:

          Specification clarified!

          **Updates made to** specs/user-authentication/spec.md:
          - Added 4 clarifications with answers
          - Updated 3 acceptance criteria with specific thresholds
          - Added 5 edge cases to user stories
          - Resolved all open questions

          **Acceptance checklist:** All items complete

          **Next step:**
          Run `/spec_driven_development.plan` to create the technical implementation plan.
          ```

          ## Output Format

          ### Updated specs/[feature-name]/spec.md

          The specification file updated with:
          - Clarifications section with Q&A
          - Refined acceptance criteria
          - Additional edge cases
          - Resolved open questions
          - Acceptance checklist (all items checked)

          **Location**: `specs/[feature-name]/spec.md` (same file, updated)

          After updating the file:
          1. Summarize the clarifications made
          2. Confirm the acceptance checklist is complete
          3. Tell the user to run `/spec_driven_development.plan` to create the technical plan
        inputs:
          spec.md:
            required: true
        outputs:
          spec.md:
            required: true
        process_requirements:
          ambiguities_identified: "Underspecified areas MUST be systematically identified."
          questions_asked: "The agent MUST ask structured questions to resolve each ambiguity."
          answers_documented: "Clarification answers MUST be recorded in the spec document."
          edge_cases_covered: "Edge cases and error scenarios MUST be defined."
          acceptance_checklist: "The acceptance criteria checklist MUST be complete and validated."
          spec_updated: "spec.md MUST be updated with all clarifications."

      - name: plan
        instructions: |
          # Generate Technical Plan

          ## Objective

          Create a technical implementation plan that defines architecture, technology choices, data models, and API contracts.

          ## Task

          Analyze the clarified specification and create detailed technical planning documents.

          **Important**: Use the AskUserQuestion tool to ask structured questions when technology choices need user input.

          **Critical**: This step produces planning documents, NOT implementation code. You may include API contracts, data model schemas, architecture diagrams, and technology selection rationale. Do NOT include actual implementation code, code snippets, or sample implementations.

          ### Prerequisites

          Before starting, verify these files exist and read them:
          1. `[docs_folder]/constitution.md` - Project principles and technology preferences
          2. `specs/[feature-name]/spec.md` - Clarified specification with all requirements
          3. `[docs_folder]/architecture.md` - Existing project architecture document (if present)

          If the constitution or spec is missing, inform the user which step they need to complete first. The architecture document may not exist yet for new projects - that's okay, you'll create it.

          ### Step 1: Identify the Feature

          Ask the user which feature to plan:

          ```
          Which feature would you like to create a technical plan for?
          ```

          If they provide a name, verify `specs/[feature-name]/spec.md` exists and has been clarified (has a Clarifications section and complete acceptance checklist).

          ### Step 2: Architecture Design

          Analyze the specification and design the high-level architecture:

          1. **Component Identification**
             - What major components are needed?
             - How do they interact?
             - What are the boundaries between components?

          2. **Integration Points**
             - What external systems must this integrate with?
             - What APIs will be consumed?
             - What APIs will be exposed?

          3. **Data Flow**
             - How does data move through the system?
             - What transformations occur?
             - Where is data persisted?

          **Ask for input when:**
          - Multiple valid architectural approaches exist
          - Trade-offs need user decision (e.g., simplicity vs scalability)
          - Constitution doesn't specify a preference

          ### Step 3: Technology Selection

          Based on the constitution and requirements, select specific technologies:

          1. **Framework/Library Choices**
             - What frameworks best fit the requirements?
             - Are there existing patterns in the codebase to follow?
             - What libraries are needed for specific functionality?

          2. **Database Design**
             - What database(s) are appropriate?
             - What's the data model strategy (relational, document, etc.)?
             - What indexing/performance considerations exist?

          3. **Infrastructure Considerations**
             - What hosting/deployment approach?
             - What caching strategy (if needed)?
             - What monitoring/observability needs?

          **Document rationale for each choice:**
          ```markdown
          ### [Technology] Selection

          **Chosen**: [Technology name and version]
          **Alternatives Considered**: [Other options]
          **Rationale**: [Why this was selected]
          **Constitution Alignment**: [How it aligns with project principles]
          ```

          ### Step 4: Data Model Design

          Create a comprehensive data model:

          1. **Entities**
             - What data entities are needed?
             - What are their attributes?
             - What are the relationships?

          2. **Schema Design**
             ```markdown
             ### [Entity Name]

             | Field | Type | Constraints | Description |
             |-------|------|-------------|-------------|
             | id | UUID | PK | Unique identifier |
             | ... | ... | ... | ... |

             **Relationships:**
             - [Relationship description]

             **Indexes:**
             - [Index description and purpose]
             ```

          3. **Data Lifecycle**
             - How is data created, updated, deleted?
             - What are the retention policies?
             - How is data migrated/versioned?

          ### Step 5: API Design

          Define the API contracts:

          1. **Endpoint Design**
             ```markdown
             ### [Operation Name]

             **Endpoint**: `[METHOD] /api/v1/[resource]`
             **Description**: [What it does]
             **Authentication**: [Required/Optional, type]

             **Request:**
             ```json
             {
               "field": "type - description"
             }
             ```

             **Response (200):**
             ```json
             {
               "field": "type - description"
             }
             ```

             **Error Responses:**
             - 400: [When/why]
             - 401: [When/why]
             - 404: [When/why]
             ```

          2. **Create OpenAPI/JSON Schema** (if applicable)
             - Generate `api-spec.json` with full endpoint definitions

          ### Step 6: Research Documentation

          Document any research performed:

          1. **Technology Evaluations**
             - What options were researched?
             - What were the findings?
             - What benchmarks were run (if any)?

          2. **Pattern Research**
             - What design patterns were considered?
             - What examples were referenced?
             - What best practices were identified?

          3. **Risk Assessment**
             - What technical risks exist?
             - What mitigations are planned?

          ### Step 7: Review and Update Project Architecture

          Review the existing project architecture document (`[docs_folder]/architecture.md`) and update it to accommodate this feature:

          1. **If the architecture document exists:**
             - Read it thoroughly to understand the current system architecture
             - Identify where this feature fits into the existing architecture
             - Determine if any existing components need modification
             - Add new components, services, or modules introduced by this feature
             - Update diagrams or descriptions to reflect the changes
             - Ensure consistency between the feature plan and the overall architecture

          2. **If the architecture document doesn't exist:**
             - Create a new architecture document that captures the project's structure
             - Include the components being added by this feature
             - Document the high-level system design

          3. **What to include in architecture updates:**
             - New components or services added
             - Modified integration points
             - New data flows
             - Updated system boundaries
             - Any architectural decisions that affect the broader system

          **Important**: The architecture document is a living document that evolves with the project. Each feature should leave it more complete and accurate than before.

          ### Step 8: Create Planning Documents

          Create the following files in `specs/[feature-name]/`:

          **1. plan.md** - Main implementation plan
          ```markdown
          # [Feature Name] Implementation Plan

          ## Architecture Overview

          ### High-Level Design
          [Diagram or description of component architecture]

          ### Component Responsibilities
          - **[Component 1]**: [Responsibility]
          - **[Component 2]**: [Responsibility]

          ### Integration Points
          - [External system]: [How it integrates]

          ## Technology Stack

          ### [Category]
          **Chosen**: [Technology]
          **Rationale**: [Why]

          ## Implementation Strategy

          ### Phase 1: [Phase Name]
          [Description of what will be built]

          ### Phase 2: [Phase Name]
          [Description of what will be built]

          ## Security Considerations
          [How security requirements will be met]

          ## Performance Strategy
          [How performance requirements will be met]

          ## Testing Strategy
          [Approach to testing this feature]

          ## Deployment Considerations
          [How this will be deployed]
          ```

          **2. data-model.md** - Database schema and relationships
          ```markdown
          # [Feature Name] Data Model

          ## Entity Relationship Diagram
          [Text-based ERD or description]

          ## Entities

          ### [Entity Name]
          [Table definition as shown in Step 4]

          ## Migrations
          [Migration strategy if applicable]
          ```

          **3. api-spec.json** - OpenAPI specification (if applicable)
          ```json
          {
            "openapi": "3.0.0",
            "info": {
              "title": "[Feature] API",
              "version": "1.0.0"
            },
            "paths": {
              ...
            }
          }
          ```

          **4. research.md** - Research findings
          ```markdown
          # [Feature Name] Research

          ## Technology Evaluations
          [Findings from research]

          ## Design Decisions
          [Key decisions and rationale]

          ## References
          [Links to documentation, articles, examples referenced]
          ```

          ## Example Dialog

          ```
          Claude: I'll create a technical implementation plan. Which feature are you planning?

          User: user-authentication

          Claude: Let me review the specification and constitution...

          [Reads both files]

          I see you're using TypeScript with Next.js and prioritizing security. The spec requires
          email/password and Google OAuth signup with email verification.

          Let me design the architecture. I have a question about session management:

          [Uses AskUserQuestion with options:
          - JWT tokens (stateless, good for scaling)
          - Server-side sessions with Redis (more control, easier revocation)
          - Next.js built-in auth (iron-session)
          - Other]

          User: JWT tokens

          Claude: Good choice for scalability. For the database schema, I see you're using PostgreSQL.

          Here's the proposed data model:

          **Users Table:**
          | Field | Type | Constraints |
          |-------|------|-------------|
          | id | UUID | PK |
          | email | VARCHAR(255) | UNIQUE, NOT NULL |
          | password_hash | VARCHAR(255) | NULL (for OAuth users) |
          | email_verified | BOOLEAN | DEFAULT FALSE |
          | created_at | TIMESTAMP | NOT NULL |

          **OAuth Connections Table:**
          | Field | Type | Constraints |
          |-------|------|-------------|
          | id | UUID | PK |
          | user_id | UUID | FK -> users |
          | provider | VARCHAR(50) | NOT NULL |
          | provider_id | VARCHAR(255) | NOT NULL |

          Does this data model match your needs?

          [Continues planning...]

          Technical plan created!

          **Files created/updated:**
          - specs/user-authentication/plan.md
          - specs/user-authentication/data-model.md
          - specs/user-authentication/api-spec.json
          - specs/user-authentication/research.md
          - [docs_folder]/architecture.md (updated with auth components)

          **Next step:**
          Run `/spec_driven_development.tasks` to generate the implementation task breakdown.
          ```

          ## Output Format

          ### specs/[feature-name]/plan.md
          Main implementation plan with architecture, technology choices, and strategy.

          ### specs/[feature-name]/data-model.md
          Database schema with entities, relationships, and migration strategy.

          ### specs/[feature-name]/api-spec.json
          OpenAPI specification for API endpoints (if applicable).

          ### specs/[feature-name]/research.md
          Research findings, technology evaluations, and references.

          ### [docs_folder]/architecture.md
          Project-wide architecture document, updated to include this feature's components and integrations.

          After creating the files:
          1. Summarize the architecture and key technology choices
          2. Highlight any decisions that required user input
          3. Tell the user to run `/spec_driven_development.tasks` to generate tasks
        inputs:
