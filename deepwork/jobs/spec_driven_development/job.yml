          research_documented: "Research findings or technology evaluations SHOULD be captured."
          dependencies_listed: "External dependencies and their versions MUST be specified."
          constitution_respected: "The plan MUST align with governance principles."
          architecture_doc_updated: "The project architecture document SHOULD be reviewed and updated if needed."
          files_created: "All output files MUST be created in specs/[feature-name]/."

      - name: tasks
        instructions: |
          # Generate Task Breakdown

          ## Objective

          Convert the implementation plan into an ordered list of actionable development tasks. Each task should be small enough to complete in a single coding session and clearly specify what files will be created or modified.

          ## Task

          Analyze the implementation plan and specification to generate a comprehensive task list organized by user story with proper dependency ordering.

          **Critical**: This step produces a task breakdown, NOT implementation code. Task descriptions should specify what files to create/modify, what each file should accomplish, and acceptance criteria. Do NOT include actual code snippets or implementations.

          ### Prerequisites

          Before starting, verify these files exist and read them:
          1. `specs/[feature-name]/spec.md` - User stories and acceptance criteria
          2. `specs/[feature-name]/plan.md` - Architecture and implementation strategy
          3. `[docs_folder]/architecture.md` - Project architecture document

          If any are missing, inform the user which step they need to complete first.

          ### Step 1: Identify the Feature

          Ask the user which feature to generate tasks for:

          ```
          Which feature would you like to generate tasks for?
          ```

          Verify the plan exists and review it along with the specification.

          ### Step 2: Analyze Dependencies

          Map out the dependency graph:

          1. **Infrastructure Dependencies**
             - Database setup must come before data access code
             - Authentication must come before protected routes
             - Base components before compound components

          2. **User Story Dependencies**
             - Some stories may depend on others
             - Identify the critical path

          3. **Testing Dependencies**
             - Tests often written alongside or before implementation (TDD)
             - Integration tests after unit tests

          ### Step 3: Task Decomposition

          For each user story, break down into tasks:

          1. **Database/Model Tasks**
             - Create migrations
             - Define models/entities
             - Add indexes

          2. **Backend Tasks**
             - Implement API endpoints
             - Add business logic
             - Integrate services

          3. **Frontend Tasks** (if applicable)
             - Create components
             - Add pages/routes
             - Implement state management

          4. **Testing Tasks**
             - Unit tests for business logic
             - Integration tests for APIs
             - E2E tests for critical flows

          5. **Infrastructure Tasks**
             - Configuration
             - Deployment scripts
             - Monitoring setup

          ### Step 4: Task Format

          Each task should follow this format:

          ```markdown
          ### Task [N]: [Descriptive Title]

          **User Story**: US-[N] (or "Infrastructure" if not tied to a story)
          **Type**: [Database | Backend | Frontend | Test | Infrastructure]
          **Dependencies**: [List of task numbers that must complete first, or "None"]
          **Parallel**: [P] (add if can run in parallel with other tasks)

          **Description:**
          [What needs to be done]

          **Files to Create/Modify:**
          - `path/to/file.ts` - [What to do with this file]
          - `path/to/another.ts` - [What to do with this file]

          **Acceptance Criteria:**
          - [ ] [Specific criterion]
          - [ ] [Specific criterion]

          **Validation:**
          [How to verify this task is complete - e.g., "Run tests", "Check endpoint responds"]
          ```

          ### Step 5: Identify Parallel Tasks

          Mark tasks that can run in parallel with `[P]`:

          - Tasks with no dependencies on each other
          - Tasks working on different subsystems
          - Independent test suites

          **Parallel notation:**
          ```markdown
          ### Task 5: Create User Model [P]
          ### Task 6: Create OAuth Connection Model [P]

          (Tasks 5 and 6 can run in parallel after Task 4 completes)
          ```

          ### Step 6: Add Checkpoints

          Insert validation checkpoints between phases:

          ```markdown
          ## Checkpoint: Database Layer Complete

          **Verify before proceeding:**
          - [ ] All migrations run successfully
          - [ ] Models are defined with correct relationships
          - [ ] Database can be seeded with test data

          **Run:** `npm run db:migrate && npm run db:seed`
          ```

          ### Step 7: Create Tasks File

          Create `specs/[feature-name]/tasks.md`:

          ```markdown
          # [Feature Name] Implementation Tasks

          ## Overview

          **Total Tasks**: [N]
          **Estimated Phases**: [N]
          **Parallelizable Tasks**: [N]

          ## Task Dependency Graph

          ```
          [1] -> [2] -> [5]
                   \
          [3] -> [4] -> [6] -> [7]
                   /
          [1] -> [8]
          ```

          ## Phase 1: Infrastructure & Database

          ### Task 1: Setup Database Migrations

          **User Story**: Infrastructure
          **Type**: Database
          **Dependencies**: None

          **Description:**
          Create the initial database migrations for [entity] tables.

          **Files to Create/Modify:**
          - `migrations/001_create_users.sql` - Create users table
          - `migrations/002_create_oauth_connections.sql` - Create OAuth table

          **Acceptance Criteria:**
          - [ ] Migrations run without errors
          - [ ] Tables created with correct schema
          - [ ] Indexes are in place

          **Validation:**
          Run `npm run db:migrate` and verify tables exist.

          ---

          ### Task 2: [Next Task]
          ...

          ---

          ## Checkpoint: Database Layer Complete
          [Checkpoint content]

          ---

          ## Phase 2: Backend API

          ### Task 3: [Backend Task]
          ...

          ---

          ## Checkpoint: API Layer Complete
          [Checkpoint content]

          ---

          ## Phase 3: Frontend Components

          ### Task 4: [Frontend Task]
          ...

          ---

          ## Checkpoint: Feature Complete
          [Final validation checklist]

          ---

          ## Summary

          | Phase | Tasks | Parallel |
          |-------|-------|----------|
          | 1. Infrastructure | 1-2 | 0 |
          | 2. Backend | 3-6 | 2 |
          | 3. Frontend | 7-10 | 3 |
          | 4. Testing | 11-14 | 4 |

          **Critical Path**: Tasks 1 -> 3 -> 7 -> 11 -> 14

          **Total Parallelizable**: [N] tasks can run concurrently
          ```

          ## Example Dialog

          ```
          Claude: I'll generate implementation tasks. Which feature are you working on?

          User: user-authentication

          Claude: Let me review the plan and specification...

          [Reads specs/user-authentication/plan.md and spec.md]

          Based on the plan, I see we need:
          - Database: Users and OAuth connections tables
          - API: Signup, login, OAuth, and verification endpoints
          - Frontend: Signup form, login form, OAuth buttons

          I'll organize tasks by user story and phase. Here's the structure:

          **Phase 1: Database (4 tasks)**
          - Task 1: Create users migration
          - Task 2: Create OAuth connections migration [P]
          - Task 3: Create user model
          - Task 4: Create OAuth connection model [P]

          **Phase 2: Authentication Backend (6 tasks)**
          - Task 5: Implement password hashing utility
          - Task 6: Implement JWT token service [P]
          - Task 7: Create signup endpoint
          - Task 8: Create login endpoint [P]
          - Task 9: Create OAuth callback handler
          - Task 10: Create email verification endpoint

          **Phase 3: Frontend (4 tasks)**
          - Task 11: Create signup form component
          - Task 12: Create login form component [P]
          - Task 13: Create OAuth button component [P]
          - Task 14: Add authentication pages

          **Phase 4: Testing (4 tasks)**
          - Task 15: Unit tests for auth utilities
          - Task 16: Integration tests for auth API [P]
          - Task 17: E2E test for signup flow [P]
          - Task 18: E2E test for login flow [P]

          That's 18 tasks total, with 9 parallelizable.

          Does this breakdown look right? Any tasks you'd like to add or modify?

          User: Looks good!

          Claude: Creating the tasks file...

          Task breakdown created!

          **File created:**
          - specs/user-authentication/tasks.md

          **Summary:**
          - 18 tasks across 4 phases
          - 9 tasks can run in parallel
          - Critical path: 9 tasks in sequence
          - 4 checkpoints for validation

          **Next step:**
          Run `/spec_driven_development.implement` to start executing tasks.
          ```

          ## Task Sizing Guidelines

          **Good task size:**
          - Can be completed in 15-60 minutes
          - Creates/modifies 1-3 files
          - Has clear start and end state
          - Can be validated independently

          **Too large (split it):**
          - Takes more than 2 hours
          - Touches more than 5 files
          - Has multiple distinct outcomes
          - Hard to validate incrementally

          **Too small (combine it):**
          - Takes less than 5 minutes
          - Is just configuration
          - Can't be validated alone

          ## Output Format

          ### specs/[feature-name]/tasks.md

          A markdown document containing:
          - Task dependency overview/graph
          - Numbered tasks organized by phase
          - Each task with full details (story, type, dependencies, files, criteria)
          - Checkpoints between phases
          - Summary table with parallelization info

          **Location**: `specs/[feature-name]/tasks.md`

          After creating the file:
          1. Summarize total tasks and phases
          2. Highlight parallelization opportunities
          3. Show the critical path
          4. Tell the user to run `/spec_driven_development.implement` to begin implementation
        inputs:
          docs_folder:
            required: false
          plan.md:
            required: true
          spec.md:
            required: true
          architecture.md:
            required: true
        outputs:
          tasks.md:
            required: true
        process_requirements:
          user_story_organization: "Tasks MUST be organized by user story."
          dependencies_sequenced: "Task dependencies MUST be correctly ordered."
          parallel_tasks_marked: "Parallelizable tasks SHOULD be identified with [P] markers."
          file_paths_specified: "Each task MUST specify which files it creates or modifies."
          tdd_structure: "Test tasks MUST be included before or alongside implementation tasks."
          checkpoints_defined: "Validation checkpoints SHOULD be included between phases."
          granularity_appropriate: "Tasks SHOULD be small enough to be completed in one session."
          file_created: "tasks.md MUST be created in specs/[feature-name]/."

      - name: implement
        instructions: |
          # Execute Implementation

          ## Objective

          Execute the task breakdown to generate working code that implements the feature specification. Tasks are executed in dependency order, with progress tracked throughout.

          ## Task

          Systematically work through each task in `tasks.md`, implementing the feature according to the specification and plan.

          ### Prerequisites

          Before starting, verify ALL prerequisite files exist:

          1. `[docs_folder]/constitution.md` - Project principles
          2. `[docs_folder]/architecture.md` - Project architecture document
          3. `specs/[feature-name]/spec.md` - Requirements and acceptance criteria
          4. `specs/[feature-name]/plan.md` - Architecture and technology choices
          5. `specs/[feature-name]/tasks.md` - Task breakdown

          **If any file is missing**, inform the user which step they need to complete first. Do NOT proceed without all artifacts.

          ### Step 1: Identify the Feature

          Ask the user which feature to implement:

          ```
          Which feature would you like to implement?
          ```

          Load and review all specification artifacts.

          ### Step 2: Validate Prerequisites

          Before implementing, verify:

          1. **Specification is complete**
             - All user stories have acceptance criteria
             - No open questions remain
             - Scope is clearly defined

          2. **Plan is actionable**
             - Architecture is defined
             - Technology choices are made
             - Data model is specified

          3. **Tasks are ready**
             - Tasks are properly sequenced
             - Dependencies are clear
             - Checkpoints are defined

          If validation fails, inform the user what needs to be addressed.

          ### Step 3: Setup Progress Tracking

          Create or update progress tracking in tasks.md:

          ```markdown
          ## Implementation Progress

          **Started**: [Date/Time]
          **Current Phase**: 1 of 4
          **Tasks Completed**: 0 of 18

          | Task | Status | Notes |
          |------|--------|-------|
          | 1 | Pending | |
          | 2 | Pending | |
          ...
          ```

          ### Step 4: Execute Tasks

          For each task in order:

          1. **Announce the task:**
             ```
             Starting Task [N]: [Title]
             Type: [Type]
             Dependencies: [Met/Pending]
             ```

          2. **Verify dependencies are met:**
             - Check all prerequisite tasks are complete
             - If not, skip and note as blocked

          3. **Implement the task:**
             - Follow the task description
             - Create/modify specified files
             - Use constitution guidelines for code quality

          4. **Validate completion:**
             - Check all acceptance criteria
             - Run specified validation commands
             - Fix any issues before proceeding

          5. **Update progress:**
             ```
             Task [N] Complete
             Files created/modified:
             - path/to/file.ts
             - path/to/another.ts
             ```

          ### Step 5: Handle Checkpoints

          At each checkpoint:

          1. **Stop and validate:**
             ```
             Checkpoint: [Name]

             Validating:
             - [ ] [Criterion 1]
             - [ ] [Criterion 2]
             ```

          2. **Run validation commands:**
             - Execute tests
             - Run linting
             - Check build

          3. **Report status:**
             ```
             Checkpoint [Name]: PASSED
             All criteria met. Proceeding to Phase [N].
             ```

             OR

             ```
             Checkpoint [Name]: FAILED
             Issues found:
             - [Issue 1]
             - [Issue 2]

             Addressing issues before proceeding...
             ```

          4. **Do not proceed until checkpoint passes**

          ### Step 6: Handle Parallel Tasks

          When encountering parallel tasks:

          1. **Identify the parallel group:**
             ```
             Tasks 5 and 6 can run in parallel.
             Implementing Task 5...
             ```

          2. **Complete all parallel tasks before moving to dependents:**
             ```
             Task 5 Complete
             Task 6 Complete

             Both parallel tasks complete. Proceeding to Task 7.
             ```

          ### Step 7: Handle Issues

          When problems occur:

          1. **Document the issue:**
             ```
             Issue in Task [N]:
             [Description of the problem]
             ```

          2. **Attempt resolution:**
             - If fixable, fix it
             - If needs clarification, ask user
             - If blocked by external factor, mark as blocked

          3. **Update task status:**
             ```markdown
             | 7 | Blocked | Waiting for API credentials |
             ```

          4. **Continue with non-dependent tasks:**
             - Skip blocked tasks
             - Proceed with independent tasks
             - Return to blocked tasks when resolved

          ### Step 8: Verify Acceptance Criteria

          After all tasks complete:

          1. **Review specification acceptance criteria:**
             - Go through each user story
             - Verify all criteria are met
             - Document any gaps

          2. **Run full test suite:**
             ```bash
             npm test
             npm run lint
             npm run build
             ```

          3. **Final validation:**
             ```
             ## Implementation Complete

             **Acceptance Criteria Verification:**

             US-1: [Story Title]
             - [x] [Criterion 1] - Implemented in src/auth/signup.ts
             - [x] [Criterion 2] - Tested in tests/auth/signup.test.ts

             US-2: [Story Title]
             - [x] [Criterion 1] - Implemented in src/auth/login.ts
             ...
             ```

          ### Step 9: Final Report

          Produce a completion report:

          ```markdown
          ## Implementation Summary

          **Feature**: [Feature Name]
          **Completed**: [Date/Time]

          ### Statistics
          - Total Tasks: [N]
          - Completed: [N]
          - Blocked: [N]
          - Duration: [Time]

          ### Files Created
          - `src/auth/signup.ts` - Signup endpoint
          - `src/auth/login.ts` - Login endpoint
          ...

          ### Files Modified
          - `src/routes/index.ts` - Added auth routes
          ...

          ### Tests Added
          - `tests/auth/signup.test.ts` - 8 tests
          - `tests/auth/login.test.ts` - 6 tests
          ...

          ### Acceptance Criteria Status
          - US-1: All criteria met
          - US-2: All criteria met
          - US-3: 1 criterion deferred (noted in spec)

          ### Notes
          [Any important observations or follow-up items]
          ```

          ## Example Dialog

          ```
          Claude: I'll implement the feature. Which one are you working on?

          User: user-authentication

          Claude: Let me verify all prerequisites...

          Constitution exists
          Specification complete (5 user stories, all clarified)
          Plan complete (architecture, data model, API spec)
          Tasks complete (18 tasks across 4 phases)

          Starting implementation...

          ---

          **Phase 1: Database**

          Starting Task 1: Create users migration
          Type: Database
          Dependencies: None

          Creating migration file...

          [Creates migrations/001_create_users.sql]

          Running migration validation...

          Task 1 Complete
          Files created:
          - migrations/001_create_users.sql

          ---

          Starting Task 2: Create OAuth connections migration [P]
          Type: Database
          Dependencies: Task 1

          [Creates migrations/002_create_oauth_connections.sql]

          Task 2 Complete

          ---

          Checkpoint: Database Layer Complete

          Validating:
          - [x] All migrations run successfully
          - [x] Tables created with correct schema
          - [x] Indexes are in place

          Running: `npm run db:migrate`

          Checkpoint Database Layer: PASSED

          ---

          **Phase 2: Backend API**

          Starting Task 3: Implement password hashing utility
          Type: Backend
          Dependencies: None

          [Creates src/utils/password.ts]

          Running tests...

          Task 3 Complete
          Files created:
          - src/utils/password.ts
          - tests/utils/password.test.ts

          ---

          [Continues through all tasks...]

          ---

          ## Implementation Complete!

          **Statistics:**
          - Total Tasks: 18
          - Completed: 18
          - Blocked: 0

          **Acceptance Criteria:**
          All 5 user stories have all criteria met.

          **Files Created:** 14
          **Tests Added:** 24 tests, all passing

          The user-authentication feature is ready for review.
          ```

          ## Output Format

          This step produces working code:
          - Source files as specified in tasks
          - Test files alongside implementation
          - Configuration as needed

          Progress is tracked by updating `specs/[feature-name]/tasks.md` with status.

          After completion:
          1. Summarize what was implemented
          2. List all files created/modified
          3. Confirm all acceptance criteria are met
          4. Note any issues or follow-up items
        inputs:
          docs_folder:
            required: false
          tasks.md:
            required: true
          plan.md:
            required: true
          spec.md:
            required: true
          architecture.md:
            required: true
        outputs:
          source_files:
            required: true
          test_files:
            required: true
        process_requirements:
          prerequisites_met: "All spec/plan/tasks artifacts MUST be validated before starting."
          task_order_followed: "Tasks MUST be executed in dependency order."
          tests_written: "Tests MUST be created alongside or before implementation."
          acceptance_criteria_met: "The implementation MUST satisfy all acceptance criteria from spec."
          code_quality: "The code MUST meet the standards defined in the constitution."
          progress_tracked: "Progress SHOULD be communicated throughout implementation."
          all_tasks_complete: "All tasks in tasks.md MUST be completed."

