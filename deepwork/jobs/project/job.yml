name: project
summary: "Project onboarding, press releases, milestone planning, engineering handoff, success charter reviews, and health audits"

step_arguments:
  # ── user-provided string inputs ──────────────────────────────────────────
  - name: project_name
    description: "The name of the project to onboard (may be approximate — the conversation will refine it)"
    type: string

  - name: project_slug
    description: "The project slug (e.g., 'my-project') matching the directory under projects/"
    type: string

  - name: project_repo
    description: "Repo slug (owner/repo) and platform (github or forgejo) where the milestone will live"
    type: string

  - name: issue_number
    description: "Issue number or URL to use as the starting point (leave blank if providing freehand notes)"
    type: string

  - name: freehand_notes
    description: "Freehand scope notes if no existing issue (leave blank if using an existing issue)"
    type: string

  - name: press_release_issue_url
    description: "Full URL of the press release issue created by project/press_release — embed in milestone issue body if provided (optional)"
    type: string

  - name: milestone_issue_number
    description: "The milestone's consolidated user stories issue number (must already exist)"
    type: string

  - name: feature_brief
    description: "What the feature does and how it furthers the project's business or mission"
    type: string

  - name: repos
    description: "Space-separated list of repo paths to scan (e.g. '~/.keystone/repos/ncrmro/keystone'). Leave blank to scan the current working directory."
    type: string

  # ── file outputs flowing between steps ───────────────────────────────────
  - name: intake_notes
    description: "Raw conversation summary capturing all gathered details: name, slug, mission, domains, repos, lean canvas answers, and any user stories mentioned"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify intake_notes captures:
        - Core Fields Captured: The notes include project name, slug, mission/description, and at least one of: domain, git repo, or customer segment.
        - Lean Canvas Started: At least 3 of the 5 lean canvas fields (problem, customer segments, UVP, unfair advantage, key metrics) have been discussed.
        - Riskiest Assumptions Identified: The agent has identified or asked about the project's riskiest assumptions.

  - name: investigation_report
    description: "Findings from repo inspection (README, structure, languages, recent activity) and website review (screenshots, key pages)"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read intake_notes to verify all repos and domains mentioned were investigated.
        Verify:
        - All Repos Checked: Every git repo mentioned in intake_notes was checked for agent access (SSH clone or ls-remote) and basic structure.
        - CLI Before Browser: Investigation used CLI tools (git, tea/fj, gh) for repo investigation before using Chrome MCP.
        - Access Status Clear: For each repo, it is clear whether drago and luce agents have access (can clone/push). No 'untested' entries without explanation.
        - Website State Captured: Every live website (HTTP 200) has a current state summary covering headline, positioning, key pages, and page states (live/demo/placeholder).

  - name: readme_yaml
    description: "The projects/{slug}/README.yaml structured profile document"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read intake_notes and investigation_report to verify the profile accurately reflects gathered information.
        Verify:
        - Complete Structure: README.yaml includes all required fields: name, slug, description, mission, repos, lean_canvas, riskiest_assumptions, recommended_next_steps, status, created_at.
        - Assumptions Prioritized: Riskiest assumptions are listed and ranked, with recommended next steps aligned to validating the highest-risk assumptions first.
        - Valid YAML: The file is valid YAML with no syntax errors.

  - name: projects_yaml
    description: "Updated PROJECTS.yaml with the new project entry appended"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Project Added: The new project appears in PROJECTS.yaml with name, description, status, and priority fields.
        - Existing Projects Preserved: All previously existing projects remain unchanged in PROJECTS.yaml.

  - name: setup_confirmation
    description: "Confirmation of repo setup actions taken: repos created, access verified, or skipped if all repos already existed"
    type: file_path

  - name: context_brief
    description: "Structured brief with customer segment, problem, solution framing, and key claims"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Customer Identified: The brief clearly identifies a specific customer segment and their needs.
        - Problem-Solution Framing: The problem is stated before the solution, and both are concrete — not vague or generic.
        - Scoping Value: The brief implies what must be built to deliver on the promise, providing development scoping value.

  - name: press_release
    description: "The finished working-backwards press release in MDX format"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read `.agents/conventions/process.press-release.md` for the full convention rules, and the context_brief file for the intended framing.
        Verify:
        - Customer-First Framing: The headline and opening paragraph state the customer benefit, not the feature name.
        - Working Backwards Structure: Body follows current state, why, how, what flow, written in present tense.
        - Succinct and Terse: 300-500 words, no filler or verbose marketing prose. Each section is 1-3 sentences.
        - Plain Language: No jargon, buzzwords, or internal terminology — a non-technical reader can understand it.
        - Scoping Clarity: The press release clearly implies what must be built to deliver the promise.
        - ASCII Art Mockup: For products with a UI, an ASCII art mockup shows the product in use with realistic data.
        - No Quotes or City: No fictional customer quotes. No city dateline (unless user explicitly requested).
        - Unique Local Artifact Path: The local `.deepwork/tmp/` artifact path uses a unique topic-derived basename rather than a shared generic filename.

  - name: press_release_issue_url_output
    description: "Full URL of the issue created for the press release (for traceability and downstream workflow linking)"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Full URL Present: The file contains a full URL (starting with https://) pointing to the issue that holds the press release.
        - Issue Accessible: The URL points to an actual issue on GitHub or Forgejo, not a file path or placeholder.
        - Quoted Press Release: The published issue body presents the user-facing press release inside a Markdown blockquote.

  - name: raw_scope
    description: "Extracted raw scope content from the issue body or freehand notes, with source metadata and press release content if provided"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Source Captured: The raw scope includes the full original content without omissions.
        - Metadata Present: The file includes metadata about the source (issue number/URL, repo, platform) or notes that input was freehand.
        - Press Release Captured: If press_release_issue_url was provided, the press release content is recorded under a '## Press Release' heading.

  - name: refined_stories
    description: "User stories in standard format with acceptance criteria, priority tags, and ownership labels"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read the raw_scope from the previous step to verify all scope items are covered.
        Verify:
        - Full Coverage: Every distinct scope item from the raw input maps to at least one user story.
        - Standard Format: Each story follows: As a [persona], I want [action], so that [benefit] — with a checklist of acceptance criteria.
        - Ownership Tagged: Each story is tagged as product or engineering with a logical distinction.
        - Priority Assigned: Each story has a priority tag (high / medium / low).

  - name: milestone_title
    description: "Auto-generated milestone title derived from the scope content"
    type: file_path

  - name: setup_report
    description: "Summary of created/found milestone, issue number, URLs, and what was updated"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read the refined_stories to verify the issue body contains all refined stories.
        Verify:
        - Milestone Exists: A milestone was found or created and its title and URL are recorded.
        - Issue Linked: The issue is associated with the milestone.
        - Issue Body Updated: The issue body was updated with the refined user stories in standard format.
        - Labels Applied: The product label is on the issue.
        - Report Complete: The report includes milestone title, issue number, and URLs.
        - Press Release Embedded: If a press release issue URL was provided in gather_and_parse, the full press release text is embedded in the issue body under a '## Press Release' heading — not as a link or vault path.
        - Milestone Description Short: The milestone description is a short summary (2-3 sentences), not a wall of text.
        - Milestone Description Motivating: The milestone description includes both WHY (the problem or motivation) and WHAT (the deliverable) — not just a feature label.

  - name: scope_analysis
    description: "Systems map, affected files/modules, shared boundaries, prerequisites, and ambiguity flags"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Full Story Coverage: Every user story from the milestone issue is analyzed and mapped to affected codebase files or modules.
        - Codebase Grounding: References actual files and directories in the project repository, not hypothetical or generic paths.
        - Boundary Identification: Shared system boundaries across stories are identified and documented.
        - Gap Detection: Implied prerequisites not explicitly listed in the user stories are identified and flagged.

  - name: internal_faq
    description: "Per-story feasibility/architecture/cost/risk analysis, required spikes list, and summary verdict (green/yellow/red)"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Full Story Coverage: Every user story from the scope analysis has a feasibility, architecture, cost/effort, and risk answer.
        - T-shirt Sizing Concrete: Every story has a T-shirt size (XS/S/M/L/XL) with a written justification — no 'TBD' entries.
        - Spikes Identified: Any stories relying on novel or unproven technology have a corresponding spike entry with a clear blocking question.
        - Verdict Stated: The document opens with a summary verdict of green, yellow, or red with supporting rationale.
        - Posted as Comment: The internal FAQ was posted as a comment on the milestone issue.

  - name: review_decision
    description: "Binding scope decision: in-scope stories, deferred stretch goals, renegotiated stories, spike findings, and explicit green-light for specs"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read internal_faq to verify all required spikes were completed and all red/yellow items were resolved before the green-light.
        Verify:
        - Spikes Completed: If the internal FAQ listed required spikes, each spike's findings are documented in the review decision.
        - Stories Categorized: Every story is explicitly categorized as in scope, deferred, or renegotiated — no uncategorized stories.
        - Renegotiations Documented: For each renegotiated story, the original promise, the revised scope, and the technical constraint are recorded.
        - Milestone Issue Updated: The milestone issue body was updated to reflect the negotiated scope.
        - Green-lit: The document ends with an explicit 'Green-lit for specs' statement.

  - name: specs_pr_report
    description: "Report of created spec files and the draft PR with links"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read the scope_analysis and review_decision to verify all approved system boundaries are covered by specs and deferred stories are excluded.
        Verify:
        - Full Boundary Coverage: Every system boundary for approved stories has a corresponding spec file.
        - Behavioral Requirements: Specs use RFC 2119 keywords (MUST, SHOULD, MAY) for behavioral requirements.
        - Data Contracts: API contracts, data models, or interface definitions are specified where applicable.
        - PR Created: A draft PR has been created with the spec files and assigned to reviewers.
        - Edge Cases: Edge cases and error handling are documented in each spec.
        - Approved Scope Only: No specs were written for deferred stories from the review decision.

  - name: plan_issue_report
    description: "Report of the created plan issue with number, URL, and content summary"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read scope_analysis, review_decision, and specs_pr_report to verify the plan covers all approved stories. Verify that NO child issues were created — all work is tracked in the single plan issue's task checklist.
        Verify:
        - Single Issue: Only ONE plan issue was created. No child issues exist.
        - Task Checklist: The plan issue includes a phased task checklist with conventional commit prefixes (feat:, chore:, test:).
        - Parallelism Documented: The plan issue documents which tasks can be done in parallel and which are blocking.
        - Approved Stories Present: Every approved story from the review decision appears in the plan with happy path requirements.
        - Test Expectations: Each story includes red/green test expectations describing what fails before and passes after implementation.
        - Design Mockups: ASCII art mockups are included for new UI components or layouts.
        - Demo Descriptions: Expected demo artifacts are described for each story.
        - Specs Referenced: The specs PR is referenced in the plan issue body.
        - Review Decision Referenced: The review decision is referenced so implementers understand scope constraints.
        - Milestone Linked: The plan issue is linked to the milestone.

  - name: state_assessment
    description: "Current project state: milestone progress, recent activity, existing charter status, and raw data for the charter step"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Project Data Gathered: The assessment includes data from README.yaml, PROJECTS.yaml, and any existing charter.md.
        - Milestone Progress: Current milestone status (open/closed issues, completion %) is captured from the platform.
        - Activity Summary: Recent git and issue activity is summarized to show momentum or stagnation.

  - name: charter
    description: "The projects/{slug}/charter.md living document with mission, KPIs, and goals"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read state_assessment to verify the charter reflects current project reality and addresses any gaps identified.
        Verify:
        - Mission Defined: The charter includes a clear, concise mission statement that distinguishes this project from others.
        - KPIs Specified: At least 3 business KPIs are defined with current values (or baselines) and target values.
        - All Horizons Covered: Goals are defined for all 5 horizons: 1 month, 6 months, 1 year, 5 years, and 10 years.
        - Goals Are Measurable: Each goal has concrete success criteria, not vague aspirations.

  - name: success_review
    description: "Dated review report at projects/{slug}/reports/success_review_YYYY-MM.md with KPI scores, goal progress, and verdict"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read the charter file and state_assessment to verify the review accurately reflects progress against stated goals and KPIs.
        Verify:
        - KPI Scoring: Each KPI from the charter is scored against its target with current vs target values shown.
        - Goal Progress: Each goal across all 5 horizons is assessed for on-track, at-risk, or off-track status.
        - Verdict Present: A clear verdict (accelerate/continue/pivot/pause/archive) is stated with confidence level (high/medium/low).
        - Business Thread Check: The review flags if activity is skewed toward engineering at the expense of business goals.
        - Evidence-Based: The verdict and confidence score are supported by specific data points, not gut feeling.

  - name: priority_recommendations
    description: "Concrete next actions: workflows to run, milestones to create/close, PROJECTS.yaml priority changes"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read the success_review report and charter to verify recommendations are aligned with the verdict and goals.
        Verify:
        - Verdict Aligned: Recommendations directly follow from the verdict in the success review.
        - Actionable Items: Each recommendation specifies a concrete action (which workflow to run, which milestone to create/close, what to change in PROJECTS.yaml).
        - Prioritized: Recommendations are ordered by impact and urgency.

  - name: hub_report
    description: "Structured hub summary: note path, hub fields present/missing (website_url, social_media, repos), list of repos with their platform and URL, and website repo if identified"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Hub Note Found: The report identifies the hub note path in the configured notes dir index/.
        - Fields Audited: The report records which of these are present or missing: website URL, social media handles, linked repos (repo_ref tags or repos: frontmatter).
        - Repos Listed: Every repo referenced in the hub (via tags, frontmatter, or body links) is listed with its platform (github/forgejo) and URL.
        - Website Repo Identified: If any repo appears to be a website/web frontend, it is flagged as the website repo.

  - name: health_report
    description: "Consolidated findings: repo/doctor results per repo, releases found vs posts published, and missing release posts list"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read hub_report to verify all repos from the hub were checked.
        Verify:
        - All Repos Checked: Every repo from hub_report has a repo/doctor result or a clear explanation of why it was skipped.
        - Releases Enumerated: All releases or tags in each source repo are listed with version, date, and title.
        - Post Coverage Mapped: Each release is mapped to either a published MDX post (with path) or marked as missing.
        - Blog Infrastructure Status: For each website repo, it is recorded whether a blog/posts MDX infrastructure exists (e.g. src/content/posts/).

  - name: gap_report
    description: "Summary of all gaps found and all issues filed, with URLs"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read health_report to verify every gap identified has either an issue filed or an explicit reason it was skipped.
        Verify:
        - All Gaps Addressed: Every gap from health_report and hub_report is listed with either an issue URL or a skip reason.
        - Blog Infrastructure Issue: If a website repo lacks blog/MDX infrastructure, exactly one issue was filed on that repo with a clear description and 'copilot' or 'agent' label.
        - Per-Release Issues: One issue was filed per missing release post — not a single bulk issue — so each can be assigned and tracked independently.
        - Hub Note Updated: If hub fields were missing, the hub note was updated with what could be filled in automatically (e.g. repo_ref tags from discovered repos).

  - name: wrap_up_scan
    description: "Discovered change groups with file lists, suggested commit messages, branch state, and any groups claimed/processed by other sessions from shared state"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Groups Identified: Each logical group of related changes is listed as a separate entry with a file list and suggested commit message.
        - Shared State Read: The scan checked .deepwork/tmp/wrap_up_state.json and excluded files already processed or claimed by other sessions.
        - Branch Context: For each repo, the current branch, default branch, and whether it is ahead/behind remote are recorded.

  - name: wrap_up_plan
    description: "The single change group approved for this commit: file list, final commit message, repo path, and session claim written to .deepwork/tmp/wrap_up_state.json"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read wrap_up_scan to verify only one group is planned and it does not overlap with groups already processed or claimed by other sessions.
        Verify:
        - Single Group: Exactly one commit group is described — no unrelated files are bundled together.
        - Conventional Commit Message: The commit message follows Conventional Commits format: type(scope): subject.
        - Claim Recorded: The plan notes that this group has been claimed in the shared state file before proceeding.

  - name: wrap_up_progress
    description: "Outcome: commit SHA, push status, notes report path, list of issues/PRs commented on, and updated shared state"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - Committed and Pushed: The commit SHA is recorded and the push succeeded (or the reason for failure is explained).
        - Notes Report Created: A docs/reports/ note was created in the configured notes dir with context, status, testing, next steps, and deferred sections.
        - Issues Commented: Every open issue or PR related to the committed changes received a structured check-in comment.
        - Shared State Updated: The group is marked as processed in .deepwork/tmp/wrap_up_state.json with the commit SHA.

  - name: wrap_up_summary
    description: "Final summary listing all commits made, notes reports created, and issues/PRs commented on during this wrap-up session"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify:
        - All Work Listed: Every commit made during this wrap-up session is listed with its SHA and message.
        - Notes and Issues Referenced: Every notes report and issue/PR comment produced during this session is referenced.
        - Remaining Changes Noted: If unprocessed change groups remain, they are listed so the user knows what is still pending.

workflows:
  onboard:
    summary: "Interactive project onboarding from discovery through profile creation"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff:

      1. **Onboard** — Interactive onboarding for new projects: collect info, investigate repos/sites,
         build a structured profile. Projects can be commercial ventures, nonprofits, open-source
         efforts, or mission-focused initiatives.

      2. **Press Release** — Working-backwards press release in the Amazon tradition. The press release
         announces a product feature to customers AND scopes the development work required to deliver
         on the promise.

      3. **Milestone** — Creates or adopts a milestone for a project repo, starting from either a
         press release issue URL, an existing issue, or freehand notes. Refines raw content into
         properly formatted user stories, creates the milestone, and links the issue.
         Usually follows `project/press_release`.

      4. **Milestone Engineering Handoff** — The engineering response to a product milestone.
         Produces an internal FAQ (feasibility, architecture, cost, risk), conducts a document
         review with optional technical spikes, writes functional requirement specs, and creates
         a single plan issue tracking all implementation work. PRs are opened against the plan
         issue directly — no child issues. Implementation work flows through `engineer/implement`.

      5. **Success** — Define and review a project's mission, KPIs, charter, and goals across
         5 horizons (1 month, 6 month, 1 year, 5 year, 10 year). Produces a living charter doc
         and dated status reports with a verdict (accelerate/continue/pivot/pause/archive) plus
         confidence score. Serves as the backbone for prioritization and reality checks — keeps
         the human from losing the business thread while focused on engineering.

      6. **Doctor** — Audit a project's public presence and release coverage:
         - Checks the notes hub exists and contains website URL and social media accounts
         - Checks every release/pre-release has a corresponding published MDX post on the website
         - If the website repo has no blog/posts MDX infrastructure, files a GitHub/Forgejo issue
           to add it (assignable to Copilot / agents for implementation)
         - For each missing release post, files a separate issue on the website repo
         Run `project/doctor` after each release cycle to keep the public website in sync with
         the project's history.

      The complete project pipeline:
        1. project/press_release                 — working-backwards press release
        2. project/milestone                     — milestone + user stories (accepts press_release_issue_url)
        3. project/milestone_engineering_handoff — internal FAQ → document review → specs → plan issue
        4. engineer/implement                    — implementation task by task (one PR per task)

      After completing any project workflow, use `ks.notes` / `notes/process_inbox` to capture
      key decisions, risks, and learnings into personal notes and keep shared surfaces up to date.

      Key data files:
      - PROJECTS.yaml: Priority-ordered project list at repo root. New projects are appended
        at the end (lowest priority) unless the user specifies otherwise.
      - projects/{slug}/README.yaml: Structured project profile (the primary deliverable of onboard).
      - projects/{slug}/charter.md: Living project charter with mission, KPIs, and goals (success workflow).
      - projects/{slug}/reports/success_review_YYYY-MM.md: Dated success review reports.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
      - Use Chrome MCP for all live public websites (HTTP 200) — take screenshot + snapshot
        to capture current state, messaging, and page status (live/demo/placeholder).

      Press release conventions:
      - The agent writing the press release MUST follow the conventions defined in
        `.agents/conventions/process.press-release.md` and adopt the role described in
        `.agents/roles/press-release-writer.md`. Read both files before drafting.
      - Write from the customer's perspective, not the builder's
      - Lead with customer benefit in headline and opening
      - Include problem paragraph before solution paragraph
      - Present tense, as if the product is already launched
      - Plain language — no jargon, buzzwords, or internal terminology
      - 300-500 words, succinct and semi-terse — current state, why, how, what
      - Do NOT include a fictional customer quote — no fabricated testimonials
      - Do NOT include a city dateline unless the user explicitly asks for one
      - Include a call to action
      - Claims must not exceed what the planned feature set can deliver
      - Internal metrics and implementation details must not appear
      - The local workflow artifact for a press release is staged under `.deepwork/tmp/`.
        Use a unique basename derived from the project slug or headline slug so repeated
        runs do not overwrite each other. If the project stores press releases in-repo,
        publish the finalized `.mdx` to the project's designated directory, typically
        `posts/press_releases/`, as a separate explicit step.
      - Before creating the issue, a permanent zk note MUST be created in the configured notes dir (`$NOTES_DIR`, `~/notes` for Keystone human users)
        containing the full press release content. The note MUST include `project/<slug>`,
        `source/agent`, and `source/deepwork` tags, plus `repo_ref` frontmatter. After the
        issue is created, the note MUST be updated with `issue_ref: gh:<owner>/<repo>#<number>`
        (or `fj:` for Forgejo). See `process.notes` and `tool.zk-notes` for the tagging standard.
      - After writing the press release, an issue MUST be created on the project's repo containing
        the full press release content. The issue body MUST present the user-facing press release as
        a Markdown blockquote, not plain pasted text. The full URL of this issue is a required output
        — downstream workflows (milestone/setup, etc.) link back to the press release via this URL.

      Downstream workflows this profile feeds into:
      - `project/milestone` — creates milestone and user stories from press release scope
      - Research workflows for competitive analysis, market research, technical research

      Lean Canvas fields collected during intake:
      - Problem (top 1-3 problems)
      - Customer Segments (target users)
      - Unique Value Proposition
      - Unfair Advantage (if any)
      - Key Metrics (how success is measured)
      - Additional fields are optional and can be filled in later.

      README.yaml structure should include:
      - name, slug, description, mission
      - domains (list of domain names)
      - repos (list of {url, platform, description})
      - lean_canvas (problem, customer_segments, unique_value_proposition, unfair_advantage, key_metrics)
      - riskiest_assumptions (list of assumptions ranked by risk)
      - recommended_next_steps (prioritized list of downstream workflows to run)
      - status, created_at
    steps:
      - name: gather_basics
        instructions: |
          # Gather Project Basics

          ## Objective

          Collect core project information through an interactive conversation with the user, covering identity, mission, infrastructure, and lean canvas fundamentals.

          ## Task

          Have a structured conversation with the user to gather everything needed to build a project profile. Ask structured questions using the AskUserQuestion tool. Start with what the user has already provided (the project_name input), then fill in gaps through focused follow-up questions.

          ### Process

          1. **Establish project identity**
             - Confirm the project name and derive a slug (lowercase, hyphens)
             - Ask for a one-sentence mission statement
             - Ask for a longer description if the mission statement isn't sufficient

          2. **Collect infrastructure details**
             - Ask about domains (websites, landing pages, documentation sites)
             - Ask about git repositories — collect URLs for each
             - For each repo, note the platform (GitHub, Forgejo/git.ncrmro.com, other)
             - Ask if any repos need to be created

          3. **Lean Canvas discovery (ask 3-5 of these)**

             Ask structured questions to fill in lean canvas fields. Prioritize based on what the user hasn't already covered. You don't need to ask all of these — pick the 3-5 most relevant:
             - **Problem**: "What are the top 1-3 problems this project solves?"
             - **Customer Segments**: "Who are the target users or beneficiaries?"
             - **Unique Value Proposition**: "What's the single clearest reason someone would choose this over alternatives?"
             - **Unfair Advantage**: "Is there anything you have that can't be easily copied? (expertise, data, network, etc.)"
             - **Key Metrics**: "How will you measure success for this project?"

          4. **Identify riskiest assumptions**
             - Based on the conversation, identify what the project is betting on that hasn't been validated
             - Ask the user: "What's the thing that would kill this project if it turned out to be wrong?"
             - Note 2-4 riskiest assumptions

          5. **Surface potential user stories**
             - Ask: "Are there specific user stories or features you already have in mind that should be tracked?"
             - Note any mentioned but don't deep-dive — that's for a downstream workflow

          6. **Determine project type and status**
             - Ask structured questions about project type (commercial, nonprofit, open-source, mission-focused)
             - Ask about current status (idea, prototype, active development, launched, maintenance)

          ### Conversation Tips

          - Don't ask all questions at once — batch them into 2-4 at a time using AskUserQuestion
          - If the user has a public website, note it for the investigate step but don't browse it yet
          - If the user mentions repos, collect the full URLs
          - Keep the conversation moving — 3-5 rounds of questions maximum

          ## Output Format

          ### intake_notes.md

          A structured summary of everything gathered during the conversation.

          **Structure**:

          ```markdown
          # Project Intake Notes: [Project Name]

          ## Identity

          - **Name**: [project name]
          - **Slug**: [lowercase-hyphenated]
          - **Type**: [commercial / nonprofit / open-source / mission-focused]
          - **Status**: [idea / prototype / active / launched / maintenance]
          - **Mission**: [one-sentence mission]
          - **Description**: [longer description if provided]

          ## Infrastructure

          ### Domains

          - [domain1.com] — [purpose: marketing site, app, docs, etc.]

          ### Git Repositories

          - [url] — [platform] — [description]
          - [url] — [platform] — [needs to be created: yes/no]

          ## Lean Canvas

          ### Problem

          [Top 1-3 problems]

          ### Customer Segments

          [Target users/beneficiaries]

          ### Unique Value Proposition

          [Single clearest reason to choose this]

          ### Unfair Advantage

          [What can't be easily copied, or "none identified yet"]

          ### Key Metrics

          [How success is measured]

          ## Riskiest Assumptions

          1. [Assumption] — [Why it's risky]
          2. [Assumption] — [Why it's risky]

          ## User Stories Mentioned

          - [Any user stories or features the user brought up, or "None mentioned"]

          ## Notes

          [Any other relevant context from the conversation]
          ```

          ## Quality Criteria

          - Project name, slug, and mission are captured
          - At least one domain or git repo is documented
          - At least 3 of 5 lean canvas fields have substantive answers
          - Riskiest assumptions are identified (not just listed generically)
          - The notes are comprehensive enough for someone who wasn't in the conversation to understand the project

          ## Context

          This is the first step in project onboarding. The information gathered here drives everything downstream: the investigate step will check repos and websites, build_profile will synthesize it into a structured YAML document, and the riskiest assumptions will determine which downstream workflows (user stories, requirements, competitive research) are recommended first.
        inputs:
          project_name: { required: true }
        outputs:
          intake_notes: { required: true }

      - name: investigate
        instructions: |
          # Investigate Repos and Websites

          ## Objective

          Independently investigate all git repositories and public websites mentioned in the intake notes, verifying agent access and gathering technical context.

          ## Task

          Read the intake_notes from the gather_basics step, then systematically investigate every repo and domain listed. The goal is to understand what already exists and confirm agent access to the infrastructure.

          ### Process

          #### Phase 1: Repository Investigation

          For each git repo mentioned in intake_notes:

          1. **Check agent access** using the appropriate CLI tools per platform (see common job info for tool conventions)
             - Record access status for each agent

          2. **Inspect repo structure** (if accessible)
             - Clone to a temporary location or use the platform API
             - Check for: README, license, CI/CD config, language/framework
             - Note recent commit activity (last commit date, active contributors)
             - Look for existing documentation, tests, deployment configs
             - Note the primary language and any frameworks detected

          3. **Check for existing project artifacts**
             - Look for requirements docs, user stories, roadmaps
             - Note any existing issue trackers
             - Check for PRs, branches, release tags

          #### Phase 2: Website Investigation

          For each public domain mentioned in intake_notes:

          1. **Quick CLI check first** — `curl -sI <url>` to check status, redirects, server info

          2. **Chrome MCP for any live site** — If the site is up (HTTP 200), always open it in Chrome MCP to capture the current state. This is critical context for the project profile.
             - Take a screenshot of the homepage
             - Take a snapshot (a11y tree) to capture all text content, navigation, CTAs
             - Note: key messaging, product positioning, pricing, target audience signals
             - Check for key pages (pricing, docs, dashboard, blog, team)
             - Browse 1-2 additional routes if they exist (e.g., /dashboard, /docs, /pricing) and note their state (live, demo, placeholder)
             - Summarize the current website state in 5-10 lines

          3. **Skip Chrome MCP only if** the domain doesn't resolve, returns 4xx/5xx errors, or is a purely internal/API domain with no UI

          #### Phase 3: Access Summary

          Compile a clear access matrix showing which agents can reach which repos.

          ## Output Format

          ### investigation_report.md

          **Structure**:

          ```markdown
          # Investigation Report: [Project Name]

          ## Repository Investigation

          ### [Repo Name] — [repo_url]

          - **Platform**: GitHub / Forgejo / other
          - **Agent Access**: drago: [yes/no/untested] | luce: [yes/no/untested]
          - **Primary Language**: [language]
          - **Framework**: [framework or "none detected"]
          - **Last Activity**: [date of last commit]
          - **Structure Notes**: [key observations about repo structure]
          - **Existing Docs**: [any requirements, roadmaps, or specs found]
          - **Issues/PRs**: [count of open issues and PRs]

          [Repeat for each repo]

          ## Website Investigation

          ### [domain.com]

          - **Status**: [up / down / redirect / not registered]
          - **Hosting**: [detected hosting/CDN/framework]
          - **Screenshot**: [taken / not applicable]

          #### Current Website State

          [5-10 line summary of what the site communicates: headline, positioning, product/pricing,
          key pages and their state (live vs demo vs placeholder), navigation structure, blog activity,
          any calls to action. This summary feeds directly into the project profile.]

          [Repeat for each domain]

          ## Access Matrix

          | Resource | drago | luce | Notes                |
          | -------- | ----- | ---- | -------------------- |
          | [repo1]  | yes   | yes  |                      |
          | [repo2]  | no    | no   | Need to add SSH keys |

          ## Issues Found

          - [Any access problems, broken links, missing repos, etc.]

          ## Additional Context Discovered

          - [Anything learned from repo/website investigation that enriches the project profile]
          ```

          ## Quality Criteria

          - Every repo listed in intake_notes was investigated
          - Access status is documented for each agent per repo — no "untested" entries without explanation
          - Report clearly distinguishes between "no access" and "not tested"
          - Every live website (HTTP 200) was opened in Chrome MCP with a snapshot and screenshot taken
          - Website state summary captures headline, positioning, key pages, and page states (live/demo/placeholder)

          ## TODO

          - When git LFS is set up, commit screenshots to `projects/{slug}/screenshots/` for version-controlled visual history of the project's web presence over time.

          ## Context

          This step bridges the user conversation (gather_basics) and the structured profile (build_profile). The investigation surfaces ground truth about what infrastructure exists, what agents can access, and what the project looks like from the outside. The access matrix is critical for the setup_repos step, which will fix any access gaps.
        inputs:
          intake_notes: { required: true }
        outputs:
          investigation_report: { required: true }

      - name: build_profile
        instructions: |
          # Build Project Profile

          ## Objective

          Synthesize all gathered information and investigation findings into a structured `projects/{slug}/README.yaml` profile document and update `PROJECTS.yaml` with the new project entry.

          ## Task

          Read both intake_notes and investigation_report, then produce two outputs:

          1. A comprehensive `projects/{slug}/README.yaml` — the canonical structured profile for this project
          2. An updated `PROJECTS.yaml` — with the new project appended

          ### Process

          1. **Determine the slug**
             - Use the slug from intake_notes
             - Ensure it's lowercase, hyphenated, and unique (not already in PROJECTS.yaml)

          2. **Create the project directory**
             - Create `projects/{slug}/` if it doesn't exist

          3. **Build README.yaml**
             - Merge information from both intake_notes and investigation_report
             - Fill in all fields from the schema below
             - For lean canvas fields that weren't discussed, use `null` rather than guessing
             - For repos, include access status from the investigation

          4. **Prioritize riskiest assumptions**
             - Rank assumptions by: impact if wrong * likelihood of being wrong
             - Map each risky assumption to the downstream workflow that would help validate it:
               - Market/customer uncertainty -> `research` (competitive analysis, market research)
               - Product/feature uncertainty -> `user_story` (user story definition)
               - Technical uncertainty -> `research` (technical research)
               - Business model uncertainty -> `research` (business model research)

          5. **Generate recommended next steps**
             - Order recommendations by which riskiest assumption they address
             - The highest-risk assumption's validation workflow goes first
             - Include a brief rationale for each recommendation

          6. **Update PROJECTS.yaml**
             - Read the current PROJECTS.yaml from the repo root
             - Append the new project at the end (lowest priority) unless the user specified otherwise
             - Preserve all existing projects exactly as they are
             - Add: name, description, status, priority, updated (today's date)

          ## Output Format

          ### projects/{slug}/README.yaml

          **Structure**:

          ```yaml
          ---
          name: "[Project Name]"
          slug: "[project-slug]"
          description: "[One-paragraph description]"
          mission: "[One-sentence mission statement]"
          type: "[commercial / nonprofit / open-source / mission-focused]"
          status: "[idea / prototype / active / launched / maintenance]"
          created_at: "[YYYY-MM-DD]"

          domains:
            - name: "[domain.com]"
              purpose: "[marketing / app / docs / api]"
              status: "[active / planned / down]"

          repos:
            - url: "[git@github.com:org/repo.git or https://...]"
              platform: "[github / forgejo / other]"
              description: "[What this repo contains]"
              agent_access:
                drago: "[yes / no / untested]"
                luce: "[yes / no / untested]"

          lean_canvas:
            problem:
              - "[Problem 1]"
              - "[Problem 2]"
            customer_segments:
              - "[Segment 1]"
            unique_value_proposition: "[UVP statement]"
            unfair_advantage: "[Advantage or null]"
            key_metrics:
              - "[Metric 1]"
            # Optional fields (null if not discussed)
            solution: null
            channels: null
            cost_structure: null
            revenue_streams: null

          riskiest_assumptions:
            - assumption: "[What we're betting on]"
              risk_level: "[high / medium]"
              validation_approach: "[How to test this]"
              recommended_workflow: "[research / user_story / requirements]"

          recommended_next_steps:
            - workflow: "[workflow name]"
              rationale: "[Why this should be done first — tied to riskiest assumption]"
            - workflow: "[workflow name]"
              rationale: "[Why this comes next]"

          user_stories_mentioned:
            - "[User story or feature mentioned during intake, if any]"

          notes: "[Any additional context]"
          ```

          ### PROJECTS.yaml

          The existing file with the new project appended. Example new entry:

          ```yaml
          - name: "[project-name]"
            description: "[One-sentence description]"
            status: active
            priority: [next number]
            updated: "[YYYY-MM-DD]"
          ```

          ## Quality Criteria

          - README.yaml includes all required fields: name, slug, description, mission, repos, lean_canvas, riskiest_assumptions, recommended_next_steps, status, created_at
          - Riskiest assumptions are ranked and each maps to a specific downstream workflow
          - Recommended next steps are ordered by risk priority (highest risk first)
          - PROJECTS.yaml preserves all existing projects unchanged
          - The new project is added with correct priority numbering
          - README.yaml is valid, parseable YAML

          ## Context

          This profile becomes the canonical reference for the project across the agent workspace. Downstream workflows (user_story, requirements, research) will read this README.yaml to understand the project context. The riskiest assumptions and recommended next steps are the most actionable part — they tell the user (and the agent's task loop) what to work on next.
        inputs:
          intake_notes: { required: true }
          investigation_report: { required: true }
        outputs:
          readme_yaml: { required: true }
          projects_yaml: { required: true }

      - name: setup_repos
        instructions: |
          # Setup Repositories

          ## Objective

          Create any repositories that don't exist yet and ensure all agents have SSH access to all project repos.

          ## Task

          Read the README.yaml profile and investigation_report to identify repos that need to be created or where agent access is missing. Ask the user for decisions about where to create new repos. Skip this step quickly if all repos exist and agents have access.

          ### Process

          1. **Assess what needs to be done**
             - Read the investigation_report access matrix
             - Read the repos section of README.yaml
             - Identify repos that need to be created and repos with missing agent access

          2. **Create missing repos** (if any)

             For each repo that needs to be created, ask structured questions using the AskUserQuestion tool:
             - "Where should [repo-name] be created?" — Options: Forgejo, GitHub, Other
             - "Should it be public or private?"
             - "Under which org/owner?"

             Then create using the appropriate platform CLI (see common job info for tool conventions). Example flags:
             - `tea repo create --name <name> --owner <owner> [--private]`
             - `gh repo create <owner>/<name> [--private] [--description "..."]`

          3. **Fix agent access** (if any repos are inaccessible)
             - Check if the issue is SSH key configuration or missing collaborator invites
             - Document what needs to be done by a human if the agent can't fix it directly

          4. **Verify access** after any changes and update the README.yaml access matrix if needed

          5. **Quick exit if nothing to do** — If all repos exist and agents have access, just confirm and move on

          ## Output Format

          ### setup_confirmation.md

          **Structure**:

          ```markdown
          # Repository Setup Confirmation: [Project Name]

          ## Actions Taken

          ### Repos Created

          - [repo_url] on [platform] — [public/private] — created successfully
            [or "No repos needed to be created"]

          ### Access Fixed

          - [repo_url] — [what was done to fix access]
            [or "All repos already accessible"]

          ### Access Verification

          | Repo  | Agent Access | Status |
          | ----- | ------------ | ------ |
          | [url] | all verified | ok     |

          ## Remaining Issues

          - [Any access problems that require human intervention, or "None"]

          ## README.yaml Updates

          - [Any updates made to the profile's repo section, or "No updates needed"]
          ```

          ## Quality Criteria

          - Every repo from the profile was checked for access
          - New repos were created on the platform the user chose
          - Access verification was performed after any changes
          - Any issues requiring human intervention are clearly documented

          ## Context

          This is the final step in project onboarding. After this, the project should be fully set up in the agent workspace: profile exists, PROJECTS.yaml is updated, all repos are accessible, and the recommended next steps are ready to be acted on by downstream workflows.
        inputs:
          readme_yaml: { required: true }
          investigation_report: { required: true }
        outputs:
          setup_confirmation: { required: true }

  press_release:
    summary: "Gather context and write a working-backwards press release"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff:

      1. **Onboard** — Interactive onboarding for new projects: collect info, investigate repos/sites,
         build a structured profile. Projects can be commercial ventures, nonprofits, open-source
         efforts, or mission-focused initiatives.

      2. **Press Release** — Working-backwards press release in the Amazon tradition. The press release
         announces a product feature to customers AND scopes the development work required to deliver
         on the promise.

      3. **Milestone** — Creates or adopts a milestone for a project repo, starting from either a
         press release issue URL, an existing issue, or freehand notes. Refines raw content into
         properly formatted user stories, creates the milestone, and links the issue.
         Usually follows `project/press_release`.

      4. **Milestone Engineering Handoff** — The engineering response to a product milestone.
         Produces an internal FAQ (feasibility, architecture, cost, risk), conducts a document
         review with optional technical spikes, writes functional requirement specs, and creates
         a single plan issue tracking all implementation work. PRs are opened against the plan
         issue directly — no child issues. Implementation work flows through `engineer/implement`.

      5. **Success** — Define and review a project's mission, KPIs, charter, and goals across
         5 horizons (1 month, 6 month, 1 year, 5 year, 10 year). Produces a living charter doc
         and dated status reports with a verdict (accelerate/continue/pivot/pause/archive) plus
         confidence score. Serves as the backbone for prioritization and reality checks — keeps
         the human from losing the business thread while focused on engineering.

      6. **Doctor** — Audit a project's public presence and release coverage:
         - Checks the notes hub exists and contains website URL and social media accounts
         - Checks every release/pre-release has a corresponding published MDX post on the website
         - If the website repo has no blog/posts MDX infrastructure, files a GitHub/Forgejo issue
           to add it (assignable to Copilot / agents for implementation)
         - For each missing release post, files a separate issue on the website repo
         Run `project/doctor` after each release cycle to keep the public website in sync with
         the project's history.

      The complete project pipeline:
        1. project/press_release                 — working-backwards press release
        2. project/milestone                     — milestone + user stories (accepts press_release_issue_url)
        3. project/milestone_engineering_handoff — internal FAQ → document review → specs → plan issue
        4. engineer/implement                    — implementation task by task (one PR per task)

      After completing any project workflow, use `ks.notes` / `notes/process_inbox` to capture
      key decisions, risks, and learnings into personal notes and keep shared surfaces up to date.

      Key data files:
      - PROJECTS.yaml: Priority-ordered project list at repo root. New projects are appended
        at the end (lowest priority) unless the user specifies otherwise.
      - projects/{slug}/README.yaml: Structured project profile (the primary deliverable of onboard).
      - projects/{slug}/charter.md: Living project charter with mission, KPIs, and goals (success workflow).
      - projects/{slug}/reports/success_review_YYYY-MM.md: Dated success review reports.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
      - Use Chrome MCP for all live public websites (HTTP 200) — take screenshot + snapshot
        to capture current state, messaging, and page status (live/demo/placeholder).

      Press release conventions:
      - The agent writing the press release MUST follow the conventions defined in
        `.agents/conventions/process.press-release.md` and adopt the role described in
        `.agents/roles/press-release-writer.md`. Read both files before drafting.
      - Write from the customer's perspective, not the builder's
      - Lead with customer benefit in headline and opening
      - Include problem paragraph before solution paragraph
      - Present tense, as if the product is already launched
      - Plain language — no jargon, buzzwords, or internal terminology
      - 300-500 words, succinct and semi-terse — current state, why, how, what
      - Do NOT include a fictional customer quote — no fabricated testimonials
      - Do NOT include a city dateline unless the user explicitly asks for one
      - Include a call to action
      - Claims must not exceed what the planned feature set can deliver
      - Internal metrics and implementation details must not appear
      - The local workflow artifact for a press release is staged under `.deepwork/tmp/`.
        Use a unique basename derived from the project slug or headline slug so repeated
        runs do not overwrite each other. If the project stores press releases in-repo,
        publish the finalized `.mdx` to the project's designated directory, typically
        `posts/press_releases/`, as a separate explicit step.
      - Before creating the issue, a permanent zk note MUST be created in the configured notes dir (`$NOTES_DIR`, `~/notes` for Keystone human users)
        containing the full press release content. The note MUST include `project/<slug>`,
        `source/agent`, and `source/deepwork` tags, plus `repo_ref` frontmatter. After the
        issue is created, the note MUST be updated with `issue_ref: gh:<owner>/<repo>#<number>`
        (or `fj:` for Forgejo). See `process.notes` and `tool.zk-notes` for the tagging standard.
      - After writing the press release, an issue MUST be created on the project's repo containing
        the full press release content. The issue body MUST present the user-facing press release as
        a Markdown blockquote, not plain pasted text. The full URL of this issue is a required output
        — downstream workflows (milestone/setup, etc.) link back to the press release via this URL.

      Downstream workflows this profile feeds into:
      - `project/milestone` — creates milestone and user stories from press release scope
      - Research workflows for competitive analysis, market research, technical research

      Lean Canvas fields collected during intake:
      - Problem (top 1-3 problems)
      - Customer Segments (target users)
      - Unique Value Proposition
      - Unfair Advantage (if any)
      - Key Metrics (how success is measured)
      - Additional fields are optional and can be filled in later.

      README.yaml structure should include:
      - name, slug, description, mission
      - domains (list of domain names)
      - repos (list of {url, platform, description})
      - lean_canvas (problem, customer_segments, unique_value_proposition, unfair_advantage, key_metrics)
      - riskiest_assumptions (list of assumptions ranked by risk)
      - recommended_next_steps (prioritized list of downstream workflows to run)
      - status, created_at
    steps:
      - name: gather_context
        instructions: |
          # Gather Context

          ## Objective

          Research the project and frame the customer problem, solution, and value proposition into a structured brief that will drive the press release draft.

          ## Task

          Take the user-provided project name and feature brief, then build a structured context document that identifies the customer, articulates the problem they face, and frames the solution in terms of customer benefit. This brief serves as the foundation for the working-backwards press release.

          ### Process

          1. **Ask clarifying questions — always**
             Before doing any research or drafting, ask the user these scoping questions. Do not skip this step even if the brief seems complete — the answers prevent scope creep and ensure the press release makes a promise the team can keep.

             **If the `AskUserQuestion` tool is available, use it** — structured question UI is faster and clearer for the user than a wall of text. Ask the six questions as separate structured questions in a single `AskUserQuestion` call, with short option lists where applicable (e.g. multiple-choice for customer segment) and free-text "Other" fallback.

             If `AskUserQuestion` is not available, batch all six as plain text in one message:
             - **Who is the primary customer?** — Be specific: not "developers" but "backend engineers building multi-tenant SaaS apps"
             - **What is the one problem this solves?** — What does the customer struggle with today that this fixes?
             - **What is in scope?** — What will actually be built or shipped as part of this?
             - **What is explicitly out of scope?** — What might the customer expect but won't be delivered?
             - **What is the single most important customer benefit?** — The headline should be this.
             - **How does the customer get started?** — A URL, a command, a signup flow

             Wait for answers before proceeding to the next steps.

          2. **Identify the customer**
             - Who is the primary customer segment?
             - What is their role, context, or situation?
             - What do they care about most?

          3. **Frame the problem**
             - What does the customer struggle with today?
             - What is the cost of the status quo (time, money, frustration)?
             - Why hasn't this been solved before, or why are existing solutions inadequate?

          4. **Frame the solution**
             - How does this feature solve the problem?
             - What can the customer now do that they couldn't before?
             - What is the single most compelling benefit?

          5. **Define key claims**
             - What specific, defensible claims can the press release make?
             - Claims MUST NOT exceed what the planned feature set can deliver
             - Each claim should be something the development team can build toward

          If the feature brief is ambiguous about the customer segment, the problem being solved, or the scope of what will be built, ask structured questions to resolve the ambiguity before proceeding.

          ## Output Format

          ### context_brief.md

          A structured markdown document that provides all the raw material needed to write the press release.

          **Structure**:

          ```markdown
          # Context Brief: [Feature/Product Name]

          ## Project

          - **Name**: [project name]
          - **Mission**: [project's overall business mission, derived from the brief]

          ## Customer

          - **Segment**: [who the customer is]
          - **Role/Context**: [their situation — e.g., "developers building web applications"]
          - **Primary Need**: [what they need most]

          ## Problem

          [2-3 sentences describing what the customer struggles with today. Be specific and concrete — not "it's hard to do X" but "developers spend 3 hours configuring Y before they can Z."]

          ## Solution

          [2-3 sentences describing what the feature enables. Focus on what the customer can now do, not how the technology works.]

          ## Key Claims

          - [Claim 1 — must be deliverable by the planned feature set]
          - [Claim 2]
          - [Claim 3]

          ## Call to Action

          [How the customer gets started — sign up, visit a page, try a demo, etc.]

          ## Scope Notes

          [What this feature implies must be built. This section helps development teams understand the commitment the press release makes.]
          ```

          **Concrete example** (for reference):

          ```markdown
          # Context Brief: Amazon S3

          ## Project

          - **Name**: Amazon Web Services
          - **Mission**: Make web-scale computing accessible and affordable for developers

          ## Customer

          - **Segment**: Web developers and startups
          - **Role/Context**: Developers building web applications who need to store and serve files
          - **Primary Need**: Reliable, scalable storage without managing infrastructure

          ## Problem

          Developers building web applications must provision, manage, and scale their own storage servers. When traffic spikes, storage fails. When it's quiet, they're paying for idle hardware. Most of their time goes to infrastructure instead of their actual product.

          ## Solution

          Amazon S3 provides a simple web services interface to store and retrieve any amount of data, at any time, from anywhere on the web. Developers get the same storage infrastructure Amazon uses internally — without managing a single server.

          ## Key Claims

          - Store and retrieve any amount of data
          - Simple web services interface (REST/SOAP)
          - Same infrastructure Amazon uses for its own sites
          - Pay only for what you use

          ## Call to Action

          Sign up for the Amazon S3 beta at aws.amazon.com/s3.

          ## Scope Notes

          Implies building: REST API for object storage, pay-per-use billing, multi-region availability, and a developer console for account management.
          ```

          ## Quality Criteria

          - The brief clearly identifies a specific customer segment and their needs
          - The problem is stated before the solution, and both are concrete — not vague or generic
          - Key claims do not exceed what the planned feature set can deliver
          - The brief implies what must be built, providing development scoping value
          - The customer quote direction captures genuine value, not marketing fluff
          - The call to action is specific and actionable

          ## Context

          This is the foundation step. The press release will be written directly from this brief, so the quality of the context determines the quality of the final output. The brief also serves a scoping purpose — by articulating what the press release will promise, the team can evaluate whether the development investment is justified before writing a single line of code.
        inputs:
          project_name: { required: true }
          feature_brief: { required: true }
        outputs:
          context_brief: { required: true }

      - name: write_press_release
        instructions: |
          # Write Press Release

          ## Objective

          Draft a working-backwards press release following the `process.press-release` convention, using the structured context brief as source material.

          ## Task

          Read the context brief from the previous step and the conventions at `.agents/conventions/process.press-release.md` and `.agents/roles/press-release-writer.md`. Then write a complete press release that announces the feature as if it has already launched.

          ### Process

          1. **Read the conventions**
             - Read `.agents/conventions/process.press-release.md` for structural rules
             - Read `.agents/roles/press-release-writer.md` for tone and behavior guidance
             - These are the authoritative source — follow them precisely

          2. **Read the context brief**
             - Review `context_brief.md` from the gather_context step
             - Identify: customer, problem, solution, key claims, quote direction, CTA

          3. **Write the headline**
             - State the customer benefit in plain language
             - Do NOT lead with the feature name or technical capability
             - Bad: "Project X Launches New S3-Compatible Storage API"
             - Good: "Developers Now Store and Retrieve Any Amount of Data Without Managing Servers"

          4. **Write the opening paragraph**
             - Answer: who is the customer, what can they now do, why does it matter
             - Present tense, as if the product is launched
             - Do NOT include a city dateline (e.g., "San Francisco, CA —") unless the user explicitly requests one

          5. **Draft the body using the internal structure**
             Use the **current state -> why this -> how -> what** flow as an internal organizing device while drafting. These labels help ensure the arc is complete. Do NOT carry these labels into the published press release — they are for the agent's internal draft only, not for the audience.
             - **Current state**: What the customer struggles with today (the problem)
             - **Why this**: Why this matters now — the motivation for building it
             - **How**: How the product solves the problem (customer outcomes, not technical implementation)
             - **What**: Key features at a high level, staying within the claims from the context brief
             - Keep each section to 1-3 sentences. Be direct. No filler.

             When converting to the audience-facing press release (step 12), rewrite these sections as flowing narrative paragraphs without labels. The published press release is for readers, not for agents.

          6. **Include ASCII art mockup**
             - If the product has a UI (TUI, GUI, CLI output, web page), include an ASCII art mockup showing the key interaction
             - The mockup should show the product in use with realistic data — not empty states
             - Use box-drawing characters for structure
             - Place the mockup between the body and the call to action
             - If the product has no visual interface (e.g., a library or API), omit the mockup

          7. **Write the call to action**
             - How the customer gets started
             - Be specific — a URL, a signup flow, a command

          8. **Optional: Write FAQ**
             - Anticipate 2-3 objections or questions
             - Keep answers concise

          9. **Final check**
             - Verify word count is 300-500 words (aim for concise)
             - Verify present tense throughout
             - Verify no jargon, internal metrics, or implementation details
             - Verify claims match the context brief's key claims
             - Verify NO fictional customer quotes are included
             - Verify NO city dateline is included (unless user requested one)
             - Write the local workflow artifacts under `.deepwork/tmp/`, not ad hoc `/tmp/` paths
             - Use unique artifact filenames derived from the project slug or headline slug so repeated runs do not overwrite each other

          10. **Stage the local outputs**
              - Derive a stable unique basename from the project slug when available, otherwise from the headline slug
              - Write the press release draft to `.deepwork/tmp/<slug>-press-release.mdx`
              - Write the issue URL to `.deepwork/tmp/<slug>-press-release-issue-url.md`
              - These files are transient workflow artifacts for DeepWork output handoff

          11. **Store in the configured notes dir (zk)**
              - Use `NOTES_DIR="${NOTES_DIR:-$HOME/notes}"`. On Keystone systems this resolves to the configured notebook root (`~/notes` for human users).
              - Create a permanent note in `$NOTES_DIR` using the project slug:
                ```bash
                NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
                zk --notebook-dir "$NOTES_DIR" new notes/ --title "<Headline>" --no-input --print-path \
                  --extra project="<slug>"
                ```
              - Write the full press release content into the created note
              - Set the following frontmatter fields:
                - `type: note`
                - `project: <slug>`
                - `tags`: `project/<slug>`, `source/agent`, `source/deepwork`
                - `repo_ref`: `gh:<owner>/<repo>` or `fj:<owner>/<repo>` (the project's primary repo)
              - After the issue is created in step 12, update the note with:
                - `issue_ref: gh:<owner>/<repo>#<number>` (or `fj:` for Forgejo)
              - If a milestone exists or is created downstream, update the note with:
                - `milestone_ref: gh:<owner>/<repo>#<milestone_number>`
              - Link the note from the project's hub note in `$NOTES_DIR/index/` if one exists

          12. **Publish the canonical copy**
              - After the press release file is written and passes the final check, create an issue on the project's repo
              - Use `gh issue create` (GitHub) or `fj issue create` (Forgejo) depending on where the project is hosted
              - The issue title MUST be `Press Release: <Product Label>` (e.g., "Press Release: KS Project Agent"). The product label is a short name for the feature or product, not the headline.
              - The issue body MUST be the **audience-facing press release** rendered inside a Markdown blockquote (`>` prefix on each content line)
              - The `>` blockquote is what readers see — it must be high-level narrative prose, NOT the internal `**Current state** / **Why this** / **How** / **What**` labeled structure. Convert the internal draft into flowing paragraphs before publishing.
              - Label the issue with `press-release` (create the label if it doesn't exist)
              - Record the **full URL** of the created issue in `.deepwork/tmp/<slug>-press-release-issue-url.md`
              - Update the zk note's `issue_ref` frontmatter field with the created issue URL
              - If the project repo already stores press releases as tracked content, publish the finalized draft there as a separate explicit step after the issue is created
              - If the project does not store press releases in-repo, keep `.deepwork/tmp/press_release.mdx` as the transient local artifact and treat the issue as the canonical published record

          ## Output Format

          ### press_release.mdx

          The finished press release in MDX format. Write the local workflow artifact to a
          unique path under `.deepwork/tmp/`, such as `.deepwork/tmp/keystone-project-agent-press-release.mdx`.

          If the project already stores press releases in-repo, publish the finalized draft
          to the project's designated directory, typically `posts/press_releases/`, as a
          separate explicit publication step.

          ### zk note in the configured notes dir

          A permanent note in the configured notes dir `notes/` containing the full press release content.
          The note MUST include:
          - `type: note`
          - `project: <slug>`
          - `tags`: `project/<slug>`, `source/agent`, `source/deepwork`
          - `repo_ref`: normalized `gh:` or `fj:` repo reference
          - `issue_ref`: set after the issue is created (e.g., `gh:<owner>/<repo>#42`)

          Follow `process.notes` and `tool.zk-notes` for the authoritative tagging standard.

          ### press_release_issue_url.md

          A single-line file at a unique path under `.deepwork/tmp/`, such as
          `.deepwork/tmp/keystone-project-agent-press-release-issue-url.md`, containing the full
          URL of the issue created for the press release (e.g.,
          `https://github.com/owner/repo/issues/42`). This URL is required for traceability —
          downstream workflows like `milestone/setup` link back to the press release via this URL.

          The issue body has five parts, in order:

          1. **Context header** (plain text) — a short human-readable summary of what this feature does. Written for someone who has never heard of the project. No jargon, no internal tool names, no pipeline notation. 1-3 sentences max.

          2. **`---` separator** before the press release.

          3. **`>` blockquote** — the audience-facing press release. Clean narrative prose readable by anyone. No internal labels. Just headline, paragraphs, ASCII mockup (if applicable), and CTA.

          4. **`---` separator** after the press release.

          5. **Below the second `---`** — user stories (with unique IDs), internal context (current state / why / how / what), FAQ, and scope notes.

          **Issue body structure**:

          ```
          [1-3 sentence human-readable summary — no jargon, no internal tool names]

          ---

          > ## [Headline: Customer Benefit in Plain Language]
          >
          > [Opening paragraph — who the customer is, what they can now do]
          >
          > [Problem paragraph — what the customer struggles with today]
          >
          > [Solution paragraph — how this solves it, customer outcomes]
          >
          > [Feature/benefit paragraph — what they can now do at high level]
          >
          > ```
          > [ASCII art mockup if applicable]
          > ```
          >
          > [Call to action]

          ---

          **Current state**: [What the customer struggles with today]

          **Why this**: [Why it matters now — motivation for building it]

          **How**: [How the product solves the problem — customer outcomes]

          **What**: [Key features and scope — what must be built]

          ### User Stories

          - **US-1**: As a [persona], I want to [goal] so that [benefit]
          - **US-2**: As a [persona], I want to [goal] so that [benefit]
          - **US-3**: As a [persona], I want to [goal] so that [benefit]

          ### FAQ

          - **Q: [Anticipated question]**
            A: [Answer]
          ```

          **Do NOT include inside the `>` blockquote:**

          - The `**Current state**` / `**Why this**` / `**How**` / `**What**` labels — these go outside the blockquote
          - City dateline (e.g., "San Francisco, CA —") — omit unless user explicitly requests
          - Fictional customer quotes — no fabricated testimonials

          ## Quality Criteria

          - The headline and opening paragraph state the customer benefit, not the feature name
          - The press release narrative covers the problem, solution, and customer benefit arc
          - The entire release is written in present tense
          - Succinct and semi-terse — no filler, no verbose marketing prose
          - No jargon, buzzwords, or internal terminology — a non-technical reader can understand it
          - The press release clearly implies what must be built to deliver the promise
          - Word count is 300-500 words
          - Includes a specific call to action
          - No internal metrics or implementation details appear
          - Claims do not exceed what the context brief defines as deliverable
          - ASCII art mockup included for products with a UI (TUI, GUI, CLI, web) — shows realistic usage
          - No fictional customer quotes
          - No city dateline (unless user explicitly requested one)
          - Local `.deepwork/tmp/` artifact filenames are unique to the run topic and do not reuse generic shared basenames
          - The `>` blockquote in the published issue is audience-facing narrative prose — no `**Current state**` / `**Why this**` / `**How**` / `**What**` labels visible to readers
          - The issue body (outside the blockquote) includes the `**Current state**` / `**Why this**` / `**How**` / `**What**` context sections for the development team
          - The issue body includes a user stories section with 3-5 stories, each with a unique identifier (US-1, US-2, etc.)
          - The issue title follows the `Press Release: <Product Label>` format
          - The issue body has a human-readable context header above the first `---` — no jargon or internal tool names
          - The press release blockquote is enclosed between two `---` separators

          ## Next Steps

          After this workflow completes, suggest the following to the user:

          > The press release is done. The natural next step is to run **`milestone/setup`** to create a milestone with user stories derived from this press release. The press release issue URL output feeds directly into milestone setup as the scope source.
          >
          > After milestone setup, run **`milestone/engineering_handoff`** to create functional requirement specs and a plan issue.

          The full pipeline is: `project/press_release` -> `milestone/setup` -> `milestone/engineering_handoff`.

          ## Context

          This press release is a working-backwards document in the Amazon tradition. It serves two audiences: customers (who should understand the value immediately) and the development team (who should understand what needs to be built). The quality of this document determines whether the team invests in building the feature — so clarity and honesty about what is being promised are essential.
        inputs:
          context_brief: { required: true }
        outputs:
          press_release: { required: true }
          press_release_issue_url_output: { required: true }

  milestone:
    summary: "Parse press release or scope notes, refine user stories, create milestone, and link issue"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff.

      The complete project pipeline:
        1. project/press_release                 — working-backwards press release
        2. project/milestone                     — milestone + user stories (accepts press_release_issue_url)
        3. project/milestone_engineering_handoff — internal FAQ → document review → specs → plan issue
        4. engineer/implement                    — implementation task by task (one PR per task)

      After completing any project workflow, use `ks.notes` / `notes/process_inbox` to capture
      key decisions, risks, and learnings into personal notes and keep shared surfaces up to date.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
    steps:
      - name: gather_and_parse
        instructions: |
          # Gather and Parse Input

          ## Objective

          Collect the raw scope for a project milestone from either an existing GitHub/Forgejo issue or freehand notes provided by the user, and produce a structured document capturing the full original content with source metadata.

          ## Task

          Determine the input source and extract the raw scope content. The agent must handle two paths:

          1. **Existing issue** — Fetch the issue body from the platform and capture it verbatim
          2. **Freehand notes** — Accept the user's raw notes as-is

          ### Process

          1. **Determine the platform**
             - Parse the `project_repo` input to identify the repo slug (e.g., `owner/repo`) and platform
             - If the platform isn't explicit, ask structured questions: "Is this a GitHub or Forgejo repo?"
             - For GitHub: use `gh` CLI
             - For Forgejo: use `fj` CLI or `tea api`/`curl`

          2. **Determine the input source**
             - If `issue_number` is provided (and not blank), fetch the issue from the platform
             - If `freehand_notes` is provided (and not blank), use those as the raw scope
             - If both are provided, prefer the issue and append freehand notes as supplementary context
             - If neither is provided, ask structured questions to gather the scope from the user

          3. **Fetch the issue (if applicable)**
             - GitHub: `gh issue view <number> --repo <owner/repo> --json title,body,labels,milestone,assignees`
             - Forgejo: `fj issue view <number>` or equivalent API call
             - Capture the full issue title, body, existing labels, and any milestone already assigned

          4. **Handle the press release issue URL (if provided)**
             - If `press_release_issue_url` is provided, fetch the press release issue body from the platform
             - Record the press release content in `raw_scope.md` under a `## Press Release` heading
             - This content will be embedded in the milestone issue body by the `setup_milestone` step

          5. **Assemble the raw scope document**
             - Include all original content without editing or reformatting
             - Add metadata header with source information
             - If the content is sparse or unclear, do NOT attempt to fill gaps — capture what exists and note gaps for the next step

          ## Output Format

          ### raw_scope.md

          A markdown document with metadata header and the full original content.

          **Structure**:

          ```markdown
          # Raw Scope

          ## Source Metadata

          - **Platform**: [github | forgejo]
          - **Repository**: [owner/repo]
          - **Source Type**: [issue | freehand]
          - **Issue Number**: [number or "N/A"]
          - **Issue Title**: [title or "N/A"]
          - **Existing Labels**: [comma-separated list or "none"]
          - **Existing Milestone**: [milestone title or "none"]
          - **Press Release Issue URL**: [URL or "N/A"]

          ## Original Content

          [Full verbatim content from the issue body or freehand notes, preserving all formatting]

          ## Press Release

          [Full press release content fetched from press_release_issue_url, or "None"]

          ## Supplementary Notes

          [Any additional freehand notes provided alongside an issue, or "None"]
          ```

          ## Quality Criteria

          - The raw scope includes the full original content without omissions or edits
          - Metadata captures the source (issue number/URL, repo, platform) or notes freehand input
          - If an issue was fetched, the title, labels, and milestone status are recorded
          - The document preserves the original formatting of the source content
          - If `press_release_issue_url` was provided, the press release content is captured under `## Press Release`

          ## Context

          This is the entry point for the milestone workflow. The quality of downstream steps (story refinement, milestone creation) depends entirely on capturing the full scope here. Do not filter, summarize, or interpret — just capture faithfully. The refine_stories step will handle transformation.
        inputs:
          project_repo: { required: true }
          issue_number: { required: false }
          freehand_notes: { required: false }
          press_release_issue_url: { required: false }
        outputs:
          raw_scope: { required: true }

      - name: refine_stories
        instructions: |
          # Refine User Stories

          ## Objective

          Transform raw scope content (from an issue or freehand notes) into properly formatted user stories with acceptance criteria, priority tags, and ownership labels. Also generate a milestone title from the scope.

          ## Task

          Read the raw scope document and decompose it into discrete user stories following the standard format. The input may be rough notes, bullet points, or partially formed ideas — your job is to identify the distinct units of work and express each as a clear user story.

          ### Process

          1. **Read the raw scope**
             - Read `raw_scope.md` from the previous step
             - Identify all distinct features, tasks, or deliverables mentioned
             - Note any priorities or categories the author implied (e.g., "nice to have", "must have")

          2. **Generate the milestone title**
             - Derive a concise title from the issue title (if present) or the overall theme of the notes
             - The title should capture the product/feature name or customer benefit
             - Keep it short (3-8 words), title case
             - Write it to `milestone_title.md`

          3. **Decompose into user stories**
             - Each distinct feature or deliverable becomes its own story
             - Group related items if they are too granular to stand alone
             - Split items that contain multiple distinct deliverables

          4. **Write each story in standard format**
             - Choose an appropriate persona (developer, user, operator, admin, etc.)
             - Express the action clearly — what capability does the persona gain?
             - Articulate the benefit — why does this matter?
             - Write acceptance criteria as a testable checklist

          5. **Assign ownership and priority**
             - Tag each story as `engineering` or `product`:
               - `engineering`: implementation, infrastructure, code, deployment
               - `product`: documentation, processes, communications, analytics, UX, design
             - Assign priority based on cues in the original content:
               - `high`: core functionality, explicitly required, blocking other work
               - `medium`: important but not blocking, enhances core functionality
               - `low`: nice-to-have, future improvements, polish

          6. **Add traceability**
             - Each story must include a "Derived from" line that points back to the specific item in the raw scope

          ## Output Format

          ### refined_stories.md

          **Structure**:

          ```markdown
          # User Stories

          ## Engineering Stories

          ### [Concise action statement]

          **As a** [persona], **I want** [action], **so that** [benefit].

          **Acceptance Criteria:**

          - [ ] [Testable criterion 1]
          - [ ] [Testable criterion 2]
          - [ ] [Testable criterion 3]

          **Derived from:** [quote or reference to raw scope item]
          **Priority:** [high | medium | low]

          ---

          [Repeat for each engineering story]

          ## Product Stories

          ### [Concise action statement]

          [Same format as above]

          ---

          [Repeat for each product story]
          ```

          ### milestone_title.md

          A single-line file containing the milestone title.

          **Structure**:

          ```
          [Milestone Title in Title Case]
          ```

          ## Quality Criteria

          - Every distinct scope item from the raw input maps to at least one user story
          - Each story follows the format: As a [persona], I want [action], so that [benefit]
          - Each story has a checklist of testable acceptance criteria
          - Each story is tagged as `engineering` or `product` with logical distinction
          - Each story has a priority tag (high / medium / low)
          - Each story has a "Derived from" line tracing back to the raw scope
          - The milestone title is concise and captures the overall theme

          ## Context

          This step is the intellectual core of the workflow. The raw input may be messy, incomplete, or informal — your job is to interpret it charitably, identify the real intent, and express it in a structured format that enables clear review and task tracking. When in doubt about scope or intent, err on the side of capturing what was stated rather than adding assumptions.
        inputs:
          raw_scope: { required: true }
        outputs:
          refined_stories: { required: true }
          milestone_title: { required: true }

      - name: setup_milestone
        instructions: |
          # Set Up Milestone and Link Issue

          ## Objective

          Check if a milestone already exists for this scope, create one if needed, update the issue body with refined user stories, and link the issue to the milestone.

          ## Task

          Using the refined stories and milestone title from the previous step, set up the milestone and issue on the project's platform (GitHub or Forgejo).

          ### Process

          1. **Determine the platform and repo**
             - Use the `project_repo` input to identify the platform and repo slug
             - Read `.agents/TEAM.md` to get the correct agent username for the platform

          2. **Check for existing milestone**
             - GitHub: `gh api repos/{owner}/{repo}/milestones --jq '.[] | select(.title == "TITLE") | .number'`
             - Forgejo: `tea api /repos/{owner}/{repo}/milestones` or equivalent curl
             - If a matching milestone exists, use it (record its number and URL)
             - If no match, create a new milestone

          3. **Create milestone (if needed)**
             - GitHub: `gh api repos/{owner}/{repo}/milestones -f title="TITLE" -f description="DESCRIPTION"`
             - Forgejo: `tea api -X POST /repos/{owner}/{repo}/milestones` with title and description
             - The milestone description MUST be a short summary (2-3 sentences max). GitHub/Forgejo milestone descriptions are collapsed by default — long content is hidden behind a click.
             - The description MUST include both **why** (the problem or motivation) and **what** (the deliverable). Lead with the why — it gives reviewers instant context on the business reason for the milestone.
             - Example: "Developers lose minutes every day switching between projects across scattered terminals and workspaces. This milestone delivers a unified context system for launching, naming, and switching between scoped work environments. User stories: #174"

          4. **Ensure required labels exist**
             - Check that `product` and `engineering` labels exist on the repo
             - Create any missing labels:
               - GitHub: `gh label create "product" --repo owner/repo --description "Product story" --color "0E8A16"`
               - Forgejo: equivalent API call
             - Use sensible default colors if creating

          5. **Update or create the issue**
             - Build the issue body with two sections:
               1. If a press release preceded this milestone, embed its full text under a `## Press Release` heading at the top of the issue body. This is the working-backwards doc that scoped the milestone — reviewers must be able to read it directly on the issue. Do NOT link to vault file paths (private, invisible to reviewers).
               2. Below the press release (or at the top if no press release), include all refined stories from `refined_stories.md` under a `## User Stories` heading.
             - If `issue_number` is provided:
               - GitHub: `gh issue edit <number> --repo owner/repo --body "BODY"`
               - Update the issue title to "[Milestone Title]: User Stories for Review"
               - Add the `product` label to the issue
               - Set the milestone on the issue
               - Assign to the business agent's account
             - If `issue_number` is blank:
               - Title: "[Milestone Title]: User Stories for Review"
               - GitHub: `gh issue create --repo owner/repo --title "TITLE" --body "BODY" --label "product" --milestone "MILESTONE"`
               - Assign to the business agent's account

          6. **Verify the setup**
             - Confirm the milestone exists and the issue is linked to it
             - Confirm labels are applied
             - Record all URLs and numbers

          ## Output Format

          ### setup_report.md

          A summary of everything that was created or updated.

          **Structure**:

          ```markdown
          # Milestone Setup Report

          ## Milestone

          - **Title**: [milestone title]
          - **Number**: [milestone number]
          - **URL**: [milestone URL]
          - **Status**: [created | already existed]

          ## Issue

          - **Number**: [issue number]
          - **Title**: [issue title]
          - **URL**: [issue URL]
          - **Status**: [updated | created]
          - **Labels**: [comma-separated labels applied]
          - **Assigned To**: [agent username]

          ## Actions Taken

          1. [Description of each action, e.g., "Created milestone 'Homelab Monitoring Stack'"]
          2. [e.g., "Updated issue #42 body with 4 refined user stories"]
          3. [e.g., "Added user-story label to issue #42"]
          4. [e.g., "Linked issue #42 to milestone #3"]

          ## Platform

          - **Platform**: [github | forgejo]
          - **Repository**: [owner/repo]
          ```

          ## Quality Criteria

          - A milestone was found or created and its title and URL are recorded
          - The issue is associated with the milestone
          - The issue body was updated with the refined user stories in standard format
          - The `product` label is on the issue
          - The report includes milestone title, issue number, and URLs
          - The `product` and `engineering` labels exist on the repo for future use

          ## Next Steps

          After this workflow completes, suggest the following to the user:

          > The milestone and user stories are ready. The natural next step is to run **`project/milestone_engineering_handoff`** to produce an internal FAQ, conduct the document review, create functional requirement specs, and create a single plan issue tracking all implementation work.

          ## Context

          This is the final step that makes everything concrete on the platform. After this step, a human can review the consolidated issue, comment on individual stories, and approve them before agents begin work. The milestone provides the tracking container, and the issue serves as the parent scope document.
        inputs:
          refined_stories: { required: true }
          milestone_title: { required: true }
          project_repo: { required: true }
          issue_number: { required: false }
        outputs:
          setup_report: { required: true }

  milestone_engineering_handoff:
    summary: "Internal FAQ, document review, optional spikes, specs, and plan issue — full engineering gate before implementation"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff.

      The complete project pipeline:
        1. project/press_release                 — working-backwards press release
        2. project/milestone                     — milestone + user stories (accepts press_release_issue_url)
        3. project/milestone_engineering_handoff — internal FAQ → document review → specs → plan issue
        4. engineer/implement                    — implementation task by task (one PR per task)

      After completing any project workflow, use `ks.notes` / `notes/process_inbox` to capture
      key decisions, risks, and learnings into personal notes and keep shared surfaces up to date.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
    steps:
      - name: review_milestone
        instructions: |
          # Review Milestone and Analyze Scope

          ## Objective

          Fetch the milestone's consolidated user stories issue, clone/navigate to the project repo, and produce a scope analysis that maps every user story to affected codebase files, identifies shared system boundaries, and flags gaps or ambiguities.

          ## Task

          Read the milestone issue from the platform, explore the project's codebase, and build a systems map showing how the proposed user stories interact with existing code. This analysis informs the internal FAQ and spec creation in subsequent steps.

          ### Process

          1. **Gather inputs**
             - Ask structured questions to collect the `project_repo` (repo slug and platform) and `milestone_issue_number` if not already provided
             - Determine the platform (GitHub or Forgejo) from the input or the project's `README.yaml`

          2. **Fetch the milestone issue**

             **GitHub**:

             ```bash
             gh issue view {number} --repo {owner}/{repo} --json title,body,labels,milestone,assignees
             ```

             **Forgejo**:

             ```bash
             fj issue view {number} -r {owner}/{repo}
             ```

             - Capture the full issue body with all user stories
             - Note the milestone title, labels, and assignees

          3. **Clone or navigate to the project repo**
             - Check if the repo exists at `.repos/{owner}/{repo}`
             - If not, clone it per the cloning convention:
               - GitHub: `gh repo clone {owner}/{repo} .repos/{owner}/{repo}`
               - Forgejo: `git clone ssh://forgejo@git.ncrmro.com:2222/{owner}/{repo}.git .repos/{owner}/{repo}`
             - If it exists, `git fetch origin && git pull` to ensure it's up to date

          4. **Analyze each user story against the codebase**
             - For each user story in the issue body:
               - Identify which files, modules, or directories are affected
               - Classify the story type: `feat` (new feature), `chore` (infrastructure), `test` (test suite), `refactor` (restructuring)
               - Note the estimated complexity (small / medium / large)
             - Use `find`, `grep`, and file reading to ground the analysis in actual code

          5. **Build the systems map**
             - Group stories by the system/module they touch
             - Identify shared boundaries where multiple stories affect the same code
             - Note any shared infrastructure needs (database migrations, API routes, shared components)

          6. **Identify prerequisites and gaps**
             - List implied prerequisites not explicitly stated in the user stories (e.g., database setup, auth middleware, CI config)
             - Flag ambiguous stories that need CPO clarification before implementation
             - Note any stories that seem too large and should be split

          7. **Write the scope analysis**

          ## Output Format

          ### scope_analysis.md

          A structured document mapping user stories to codebase systems with boundary and gap analysis.

          **Structure**:

          ```markdown
          # Scope Analysis: [Milestone Title]

          ## Source

          - **Platform**: [github | forgejo]
          - **Repository**: [owner/repo]
          - **Milestone Issue**: #[number] — [issue title]
          - **Milestone**: [milestone title]
          - **Analysis Date**: [YYYY-MM-DD]

          ## Story-to-System Map

          ### US-001: [Story title]

          - **Type**: feat | chore | test | refactor
          - **Affected files/modules**:
            - `src/routes/search.ts` — new route handler
            - `src/lib/db.ts` — new query method
          - **Complexity**: small | medium | large
          - **Notes**: [any implementation notes]

          ### US-002: [Story title]

          ...

          ## System Boundaries

          Boundaries where multiple stories intersect or share infrastructure.

          ### [Boundary Name] (e.g., "API Layer", "Database Schema", "Auth Middleware")

          - **Stories involved**: US-001, US-003, US-005
          - **Shared concern**: [what they share — e.g., "All need new API routes with auth"]
          - **Key files**: [files at this boundary]
          - **Coordination notes**: [ordering or dependency implications]

          ### [Another Boundary]

          ...

          ## Implied Prerequisites

          Items not listed as user stories but required for implementation.

          | #   | Prerequisite                       | Required By    | Type  | Notes     |
          | --- | ---------------------------------- | -------------- | ----- | --------- |
          | 1   | [e.g., Database migration setup]   | US-001, US-003 | chore | [details] |
          | 2   | [e.g., CI pipeline for new module] | All stories    | chore | [details] |

          ## Ambiguities and Clarification Needed

          Items requiring CPO clarification before implementation.

          | #   | Story  | Question                                              | Impact                        |
          | --- | ------ | ----------------------------------------------------- | ----------------------------- |
          | 1   | US-004 | [What does "real-time" mean — websockets or polling?] | [Affects architecture choice] |

          ## Stories Recommended for Splitting

          | Story  | Reason                                         | Suggested Split                        |
          | ------ | ---------------------------------------------- | -------------------------------------- |
          | US-007 | [Too large — covers both backend and frontend] | [Split into US-007a: API, US-007b: UI] |
          ```

          ## Quality Criteria

          - Every user story from the milestone issue is analyzed and mapped to affected codebase files or modules
          - References actual files and directories in the project repository, not hypothetical or generic paths
          - Shared system boundaries across stories are identified and documented
          - Implied prerequisites not explicitly listed in the user stories are identified and flagged
          - Ambiguous stories needing clarification are flagged with specific questions

          ## Context

          This is the first step in the engineering handoff workflow. The scope analysis drives the internal FAQ, specs, and plan issue. A thorough analysis prevents rework later — missing a shared boundary means specs won't cover it, and missing a prerequisite means blocked PRs during implementation.
        inputs:
          project_repo: { required: true }
          milestone_issue_number: { required: true }
        outputs:
          scope_analysis: { required: true }

      - name: write_internal_faq
        instructions: |
          # Write Internal FAQ

          ## Objective

          Produce the engineering internal FAQ — the reality check that must be completed before any code commitment. This document answers the four critical questions for every user story: feasibility, architecture, cost/effort, and risk. It is the engineering team's voice in the working-backwards process.

          ## Background

          Before a single line of code is written or a project is greenlit, engineering must respond to the press release with an honest internal assessment. This is not a blocker — it is a quality gate that prevents the organization from approving a product that demands impossible physics or non-existent APIs.

          The Internal FAQ serves three purposes:
          1. **Reality check** — surfaces hidden complexity before commitment
          2. **Scope negotiation input** — provides the data needed for the document review step
          3. **Audit trail** — records why decisions were made before implementation

          ## Task

          Read the scope analysis from the previous step and the press release embedded in the milestone issue body. For every user story, answer four questions. Then produce a summary verdict.

          ### Process

          1. **Read the scope analysis**
             - Load `scope_analysis.md` from the `review_milestone` step
             - Extract all user stories, system boundaries, and implied prerequisites

          2. **Read the press release**
             - Fetch the milestone issue body to get the embedded press release
             - Understand the customer promise being made — this is what engineering must validate

          3. **Answer four questions per story**

             For each user story (`US-001`, `US-002`, etc.):

             **Feasibility**
             - Is this achievable with the current technology stack?
             - What would need to change (new libraries, new services, infrastructure upgrades)?
             - Are there hard blockers (missing APIs, unsupported features, licensing constraints)?

             **Architecture**
             - What hidden dependencies does this story imply?
             - Are there bottlenecks or systemic overhauls required?
             - Does this touch shared infrastructure that affects other systems?
             - What ordering constraints does this create?

             **Cost/Effort** (T-shirt sizing)
             - XS: < 1 day, 1-2 files
             - S: 1-3 days, contained change
             - M: 1-2 weeks, multiple components
             - L: 2-4 weeks, cross-cutting change
             - XL: > 1 month, significant architectural work
             - Provide a brief justification — not just the size

             **Risk**
             - Latency: could this slow down critical paths?
             - Scaling: does this break under load or at scale?
             - Security: does this introduce attack surface, data exposure, or auth risks?
             - Data integrity: could this corrupt or lose data?
             - Reversibility: how hard is it to undo if something goes wrong?

          4. **Identify required technical spikes**
             - A spike is needed when a story relies on a novel mechanism or unproven technology
             - Each spike should have a clear blocking question and a time box
             - Spikes that cannot complete within 2-3 days indicate the story needs renegotiation

          5. **Produce the summary verdict**
             - `green`: all stories are feasible, risks are manageable, proceed to document review and specs
             - `yellow`: some stories have unresolved questions — spikes required before specs can be written
             - `red`: one or more stories are infeasible or require scope renegotiation before proceeding

          6. **Post the internal FAQ as a comment**
             - Post the internal FAQ as a comment on the milestone issue (visible to all stakeholders)
             - GitHub: `gh issue comment {number} --repo {owner}/{repo} --body "$BODY"`
             - Forgejo: `fj issue comment {number} -r {owner}/{repo} --body "$BODY"`

          ## Output Format

          ### internal_faq.md

          ```markdown
          # Internal FAQ: [Milestone Title]

          ## Summary verdict: green | yellow | red

          [1-2 sentences on the overall engineering assessment. Be direct.]

          ## Required spikes

          - [SP-001]: [Spike question/hypothesis] — [Why this blocks specs]
          - [SP-002]: [Spike question/hypothesis] — [Why this blocks specs]

          (or: "None — all stories are feasible with current stack.")

          ## Story-by-story analysis

          ### US-001: [Story title]

          **Feasibility**: [Can we do this? What would need to change? Any hard blockers?]

          **Architecture**: [Hidden dependencies, bottlenecks, systemic overhauls, ordering constraints]

          **Cost/Effort**: [XS/S/M/L/XL] — [Brief justification]

          **Risk**: [Latency, scaling, security, data integrity, reversibility concerns — or "Low risk, no concerns."]

          ---

          ### US-002: [Story title]

          ...

          ## System-level concerns

          [Cross-cutting concerns that affect multiple stories — shared infrastructure, ordering dependencies, deployment risks, etc.]
          ```

          ## Quality Criteria

          - Every user story from the scope analysis has feasibility, architecture, cost/effort, and risk answers
          - T-shirt sizing is concrete (not "TBD") with a written justification for each story
          - Required spikes are listed with a clear blocking question (not just "needs investigation")
          - Summary verdict is one of `green`, `yellow`, or `red` with supporting rationale
          - Internal FAQ is posted as a comment on the milestone issue before the step completes

          ## Context

          This step is engineering's answer to the press release. The internal FAQ surfaces hidden complexity before any stakeholder commitment is made. A `green` verdict means the team has confidence in the proposed scope. A `yellow` verdict means spikes are needed before specs can be written. A `red` verdict means the scope must be renegotiated in the document review step. The goal is not to block — it is to ensure that the scope agreed upon in the next step is one engineering can actually deliver.
        inputs:
          scope_analysis: { required: true }
        outputs:
          internal_faq: { required: true }

      - name: document_review
        instructions: |
          # Document Review

          ## Objective

          Conduct the crucible — where engineering interrogates the press release and internal FAQ, challenges assumptions, and negotiates scope down to a defensible MVP. This step produces a binding review decision that green-lights the agreed scope for spec writing. Required spikes are executed here before proceeding.

          ## Background

          Before a project is greenlit, the PR/FAQ is reviewed by all stakeholders. Engineers are crucial participants. The role is to:
          - Interrogate the document and challenge assumptions
          - Ensure the idealized customer experience does not mask catastrophic technical debt
          - Poke holes in the logic
          - Negotiate scope down to a manageable Minimum Viable Product

          This is not a rubber stamp — it is a structured negotiation between what the product promises and what engineering can deliver.

          ## Task

          Present the internal FAQ verdict to the user, run any required spikes as nested workflows, negotiate scope if needed, and produce a binding review decision document.

          ### Process

          1. **Present the verdict to the user**
             - Read `internal_faq.md` from the previous step
             - Present the summary verdict (`green` / `yellow` / `red`) and the list of required spikes
             - For a `green` verdict: proceed directly to scope confirmation
             - For `yellow`: run spikes first (see step 3)
             - For `red`: initiate scope negotiation (see step 4)

          2. **Confirm or negotiate scope (green path)**
             - Present each story with its engineering assessment (cost, risk)
             - Ask the user: "Are there any stories you'd like to defer, simplify, or cut from MVP scope?"
             - Document the agreed scope as-is or with modifications

          3. **Run required spikes (yellow path)**
             - For each spike listed in the internal FAQ:
               - Start a nested `spike/spike` workflow with the spike question as the goal
               - The spike produces findings that inform the scope decision
             - After all spikes complete, update the scope decision with spike findings
             - If spike findings change the verdict to `red`, escalate to scope negotiation

          4. **Scope negotiation (red path or post-spike escalation)**
             - Walk through each story that is infeasible or too risky with the user
             - Use `AskUserQuestion` to present options:
               - **Cut**: remove the story from this milestone entirely
               - **Defer**: move to a future milestone as stretch goal
               - **Renegotiate**: simplify the story so it is feasible (document the constraint and revision)
             - Continue until all remaining in-scope stories are `green`

          5. **Update the milestone issue**
             - Update the milestone issue body to reflect the negotiated scope:
               - Mark deferred stories clearly (e.g., move to a "Stretch Goals" section)
               - Add a note on renegotiated stories explaining the constraint and revision
             - GitHub: `gh issue edit {number} --repo {owner}/{repo} --body "$UPDATED_BODY"`
             - Forgejo: equivalent API call

          6. **Write the review decision**

          ## Output Format

          ### review_decision.md

          ```markdown
          # Review Decision: [Milestone Title]

          ## Decision date: YYYY-MM-DD

          ## Verdict: green | yellow | red -> resolved

          ## Summary

          [2-3 sentences on what was decided and why.]

          ## Approved MVP scope

          ### In scope

          - US-001: [title] — [scope notes if any negotiation occurred]
          - US-003: [title]

          ### Deferred (stretch goals — future milestone)

          - US-005: [title] — [reason deferred]

          ### Renegotiated

          - US-002: [title]
            - **Original**: [what the press release promised]
            - **Revised**: [what engineering can deliver]
            - **Constraint**: [the technical reason for the revision]

          ## Spikes completed

          | Spike | Question | Finding | Decision |
          |-------|----------|---------|----------|
          | SP-001 | [question] | [finding] | [decision made based on finding] |

          (or: "No spikes required.")

          ## Blocking assumptions resolved

          | Assumption | Resolution |
          |------------|------------|
          | [assumption from internal FAQ] | [how resolved] |

          ## Green-lit for specs

          The scope above is approved. The `create_specs` step may proceed with the in-scope and renegotiated stories listed above.
          ```

          ## Quality Criteria

          - Internal FAQ verdict and required spikes were presented to the user before proceeding
          - Every required spike was completed via `spike/spike` nested workflow before reaching a decision
          - Every story is explicitly categorized: in scope, deferred, or renegotiated
          - Renegotiated stories document the original promise, the revision, and the technical constraint
          - The milestone issue body was updated to reflect the negotiated scope
          - The document ends with an explicit "Green-lit for specs" statement

          ## Context

          This step is the boundary between product intent and engineering commitment. Once the review decision is written and signed off, the scope is frozen for this milestone. The `create_specs` step will only write specs for stories that are in scope or renegotiated — deferred stories are excluded. The review decision document becomes the audit trail for why the final implementation differs from the original press release.
        inputs:
          internal_faq: { required: true }
          scope_analysis: { required: true }
        outputs:
          review_decision: { required: true }

      - name: create_specs
        instructions: |
          # Create Functional Requirement Specs

          ## Objective

          Write spec files grouped by system boundary, each containing behavioral requirements, data contracts, and edge case documentation. Commit specs to a branch, open a draft PR, and assign reviewers.

          ## Task

          Read the scope analysis and review decision from prior steps, group approved stories by system boundary, and write spec files using RFC 2119 keywords. Each spec covers one system boundary and defines the behavioral requirements that implementation must satisfy. Only write specs for stories that are **in scope** or **renegotiated** per the review decision — deferred stories are excluded.

          ### Process

          1. **Read the prior step outputs**
             - Load `scope_analysis.md` from the `review_milestone` step
             - Load `review_decision.md` from the `document_review` step
             - Extract the approved MVP scope — only in-scope and renegotiated stories
             - Note the system boundaries and the repository slug and platform

          2. **Navigate to the project repo**
             - Work in `.repos/{owner}/{repo}`
             - Ensure the repo is up to date: `git fetch origin`

          3. **Create a branch and worktree**
             - Derive a milestone slug from the milestone title (e.g., "Recipe Sharing Platform" -> `recipe-sharing-platform`)
             - Create a branch: `git branch docs/specs-{milestone-slug} origin/main`
             - Create a worktree: `git worktree add "$HOME/.worktrees/{owner}/{repo}/docs/specs-{milestone-slug}" docs/specs-{milestone-slug}`
             - Work in the worktree for all subsequent operations

          4. **Create spec files**
             - Create a `specs/` directory in the repo root (if it doesn't exist)
             - For each system boundary identified in the scope analysis (for approved stories only), create a spec file at `specs/{NNN}-{slug}.md`
             - Number specs sequentially: `001`, `002`, etc.
             - The slug should be a short kebab-case name derived from the boundary name

          5. **Write each spec**
             - For each spec file, include:
               - Which user stories this spec covers
               - Affected modules and files
               - Data models or API contracts (request/response schemas, database columns)
               - Behavioral requirements using RFC 2119 keywords (MUST, SHOULD, MAY)
               - Edge cases and error handling
               - ASCII art mockups for UI components (if applicable)
             - For renegotiated stories, reflect the **revised** scope from the review decision — not the original press release promise
             - Cross-reference other specs when boundaries interact

          6. **Commit and push**
             - Stage all spec files: `git add specs/`
             - Commit: `git commit -m "docs(specs): add functional requirement specs for {milestone}"`
             - Push: `git push -u origin docs/specs-{milestone-slug}`

          7. **Open a draft PR**

             **GitHub**:

             ```bash
             gh pr create --draft \
               --title "docs(specs): functional requirement specs for {milestone}" \
               --body "Specs for milestone #{milestone_issue_number}. Review before implementation begins."
             ```

             **Forgejo**:

             ```bash
             fj pr create "WIP: docs(specs): functional requirement specs for {milestone}" \
               --head docs/specs-{milestone-slug} --base main \
               --body "Specs for milestone #{milestone_issue_number}. Review before implementation begins." \
               -r {owner}/{repo}
             ```

          8. **Assign reviewers**
             - Read `.agents/TEAM.md` for the correct platform usernames
             - Assign Luce (CPO) and Nicholas (human) as reviewers
             - GitHub: `gh pr edit {pr_number} --add-reviewer {username1},{username2}`
             - Forgejo: use the API to add reviewers

          9. **Write the specs PR report**

          ## Output Format

          ### specs_pr_report.md

          A report documenting the created spec files and the draft PR.

          **Structure**:

          ```markdown
          # Specs PR Report: [Milestone Title]

          ## Platform

          - **Platform**: [github | forgejo]
          - **Repository**: [owner/repo]
          - **Branch**: docs/specs-[milestone-slug]

          ## Draft PR

          - **Number**: [PR number]
          - **Title**: [PR title]
          - **URL**: [PR URL]
          - **Reviewers**: [assigned reviewers]

          ## Spec Files Created

          | File                           | Boundary        | Stories Covered        |
          | ------------------------------ | --------------- | ---------------------- |
          | `specs/001-api-layer.md`       | API Layer       | US-001, US-002, US-003 |
          | `specs/002-database-schema.md` | Database Schema | US-001, US-002, US-004 |

          ## Spec Summary

          ### specs/001-api-layer.md

          - **Boundary**: API Layer
          - **Key requirements**: [1-2 sentence summary of MUST requirements]
          - **Data contracts**: [list of API endpoints or models defined]

          ### specs/002-database-schema.md

          ...

          ## Notes

          [Any issues encountered, cross-spec dependencies, or items needing attention]
          ```

          ## Quality Criteria

          - Every system boundary identified in the scope analysis (for approved stories) has a corresponding spec file
          - Specs use RFC 2119 keywords (MUST, SHOULD, MAY) for behavioral requirements
          - API contracts, data models, or interface definitions are specified where applicable
          - A draft PR has been created with the spec files and assigned to reviewers
          - Edge cases and error handling are documented in each spec
          - Spec files are numbered sequentially and use kebab-case slugs
          - Specs reflect renegotiated scope from the review decision, not the original press release promises

          ## Context

          This step bridges analysis and implementation planning. Specs serve as the contract between product and engineering: they define what the system must do (behavioral requirements) without prescribing how (implementation details). The specs PR goes through review before implementation starts, ensuring alignment between Luce (product), Nicholas (human), and Drago (engineering). Subsequent steps reference these specs when creating the plan issue.
        inputs:
          scope_analysis: { required: true }
          review_decision: { required: true }
          project_repo: { required: true }
          milestone_issue_number: { required: true }
        outputs:
          specs_pr_report: { required: true }

      - name: create_plan_issue
        instructions: |
          # Create Implementation Plan Issue

          ## Objective

          Create a **single** plan issue on the milestone that serves as the sole tracking issue for all implementation work. This issue includes happy paths, test expectations, design mockups, demo artifacts, **and a phased task checklist documenting parallelism and blocking dependencies**. PRs are opened directly against this issue — no child issues are created.

          ## Task

          Read the scope analysis, review decision, and specs PR report from prior steps, then compose and create one comprehensive plan issue on the project's platform. This issue becomes the single reference point for all implementation work on the milestone. Multiple PRs will reference this issue via `Part of #N` or `Closes #N`.

          **IMPORTANT: Do NOT create child issues.** All work is tracked in this issue's task checklist.

          **ISSUE COUNT CAP**: Create exactly ONE plan issue. If you identify a genuinely distinct feature that warrants its own issue (large delineating feature, not just a subtask), you MUST stop and ask the human for approval before creating it. The absolute maximum is 1-3 additional issues, and each requires explicit human sign-off. Issue bloat (10+ issues per milestone) has been a recurring problem — err on fewer issues.

          ### Process

          1. **Read prior step outputs**
             - Load `scope_analysis.md` — for the story-to-system map and prerequisites
             - Load `review_decision.md` — for the approved MVP scope (in scope + renegotiated stories only)
             - Load `specs_pr_report.md` — for the specs PR number/URL and spec file details
             - Extract the milestone title, issue number, and platform

          2. **Compose the plan issue body**
             For each **approved** user story from the review decision, include:
             - **Happy path requirements** — the expected user flow when everything works correctly
             - **Red/green test expectations** — what test should fail before implementation (red) and pass after (green). Be specific about the assertion, not just "it should work."
             - **ASCII art design mockups** — for any new UI components, page layouts, or visual elements. Show the layout, key elements, and user interaction points.
             - **Expected demo artifacts** — describe what screenshots, videos, or preview URLs should be produced when this story is complete. These are used for the press release and human review.

             Also include:
             - **Implementation order** — which stories can be parallelized and which have dependencies
             - **Feature flag requirements** — which stories need feature flags for safe deployment
             - References to the specs PR, the review decision, and the original milestone issue

          3. **Compose the phased task checklist**

             Break the work into tasks grouped by phase. Each task should map to a single small PR (2-3 files max). Use conventional commit prefixes for task names. Document parallelism and blocking:

             ```markdown
             ## Tasks

             ### Phase 1: Infrastructure (parallel — no dependencies)

             - [ ] chore: add recipes database migration
             - [ ] chore: set up image upload infrastructure

             ### Phase 2: Features (parallel — depends on Phase 1)

             - [ ] feat: add recipe creation form
             - [ ] feat: add recipe search

             ### Phase 3: Integration Tests (depends on Phase 2)

             - [ ] test: add recipe API integration tests

             ### Future Work (out of milestone scope)

             - Recipe ratings and reviews
             - Recipe import from external sites
             ```

             Design for non-blocking PRs:
             - Tasks within the same phase should be independently implementable
             - Infrastructure tasks (`chore:`) come first and unblock feature work
             - Feature tasks should depend on infrastructure, not on each other
             - Use feature flags to avoid blocking on deployment order

          4. **Create the plan issue**

             **GitHub**:

             ```bash
             gh issue create --repo {owner}/{repo} \
               --title "Plan: {milestone title}" \
               --body "$BODY" \
               --label "engineering" --label "plan" \
               --milestone "{milestone title}" \
               --assignee {drago_username}
             ```

             **Forgejo**:

             ```bash
             fj issue create "Plan: {milestone title}" \
               --body "$BODY" \
               --label "engineering" --label "plan" \
               -r {owner}/{repo}
             ```

             Then link to milestone and assign via API.
             - Ensure `engineering` and `plan` labels exist (create if missing)
             - Assign to Drago (CTO) — read username from `.agents/TEAM.md`
             - Link to the milestone

          5. **Write the plan issue report**

          ## Output Format

          ### plan_issue_report.md

          A report documenting the created plan issue.

          **Structure**:

          ```markdown
          # Plan Issue Report: [Milestone Title]

          ## Platform

          - **Platform**: [github | forgejo]
          - **Repository**: [owner/repo]

          ## Plan Issue

          - **Number**: #[number]
          - **Title**: Plan: [milestone title]
          - **URL**: [issue URL]
          - **Milestone**: [milestone title]
          - **Assignee**: [Drago's username]
          - **Labels**: engineering, plan

          ## References

          - **Milestone Issue**: #[milestone_issue_number]
          - **Specs PR**: #[specs_pr_number] ([URL])
          - **Review Decision**: [link or summary]

          ## Stories Included

          | Story           | Happy Path | Tests | Mockup | Demo |
          | --------------- | ---------- | ----- | ------ | ---- |
          | US-001: [title] | yes        | yes   | yes/no | yes  |
          | US-002: [title] | yes        | yes   | yes/no | yes  |

          ## Implementation Order

          [Summary of the phasing — what can be parallel, what must be sequential]

          ## Feature Flags

          [List of stories requiring feature flags, or "None"]

          ## Notes

          [Any issues or items needing attention]
          ```

          ## Quality Criteria

          - **No child issues created** — all work tracked in this single plan issue's task checklist
          - Every approved user story from the review decision appears in the plan with happy path requirements
          - A phased task checklist documents all work items with conventional commit prefixes
          - Parallelism and blocking dependencies are clearly documented per phase
          - Each story includes red/green test expectations describing what fails before and passes after implementation
          - ASCII art mockups are included for new UI components or layouts
          - Expected demo artifacts are described for each story (screenshots, videos, preview URLs)
          - The specs PR is referenced in the plan issue body
          - The plan issue is linked to the milestone

          ## After this step

          Once the plan issue is created, suggest the following to the user:

          > The plan issue is ready. Next steps:
          >
          > 1. **`engineer/implement`** — use this workflow for each task in the plan checklist to drive implementation through to merged PRs.
          > 2. **`ks.notes` / `notes/process_inbox`** — capture the scope analysis, design decisions, and review outcome into personal notes before implementation begins. Key decisions made during the document review are worth preserving in the Zettelkasten.

          ## Context

          This step creates the engineering blueprint for the milestone. The plan issue serves as the **single tracking issue** for all implementation work — no child issues are created. Instead, the plan issue contains a phased task checklist where each task maps to one PR. This avoids issue sprawl (10+ granular issues per milestone) and keeps all context, parallelism notes, and blocking info in one place. PRs reference the plan issue with `Part of #N`. The test expectations follow TDD principles — defining what should fail and pass before writing code. The demo artifacts ensure that every story has a verifiable outcome visible to stakeholders.
        inputs:
          scope_analysis: { required: true }
          review_decision: { required: true }
          specs_pr_report: { required: true }
          project_repo: { required: true }
          milestone_issue_number: { required: true }
        outputs:
          plan_issue_report: { required: true }

  success:
    summary: "Define or review project charter, KPIs, goals, and produce a verdict with recommendations"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff.

      Key data files:
      - PROJECTS.yaml: Priority-ordered project list at repo root.
      - projects/{slug}/README.yaml: Structured project profile.
      - projects/{slug}/charter.md: Living project charter with mission, KPIs, and goals.
      - projects/{slug}/reports/success_review_YYYY-MM.md: Dated success review reports.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
    steps:
      - name: assess_state
        instructions: |
          # Assess Project State

          ## Objective

          Gather the current state of a project from all available sources — README.yaml, PROJECTS.yaml, platform milestones/issues, git activity, and any existing charter — to establish a factual baseline for the charter and reality check steps.

          ## Task

          Read all available project data and compile a comprehensive state assessment. This is a data-gathering step — do not make judgments or recommendations here.

          ### Process

          1. **Read the project profile**
             - Read `projects/{slug}/README.yaml` for the project's mission, repos, lean canvas, and status
             - If no README.yaml exists, note the absence and use PROJECTS.yaml description as the only profile data. Recommend running `project/onboard` as a follow-up in the state assessment output.
             - Read `PROJECTS.yaml` for the project's current priority ranking
             - Note the project type, status, and any riskiest assumptions listed

          2. **Check for existing charter**
             - Look for `projects/{slug}/charter.md`
             - If it exists, read it and note: mission statement, KPIs (with any recorded values), goals at each horizon, and when it was last updated
             - If it doesn't exist, note "No charter exists — will be created in the next step"

          3. **Check previous success reviews**
             - Look for `projects/{slug}/reports/success_review_*.md`
             - If any exist, read the most recent one and note: last verdict, confidence, and key findings
             - This provides continuity across reviews

          4. **Gather platform activity**
             - Identify the project's primary repo and platform from README.yaml
             - Check milestone status:
               - GitHub: `gh api repos/{owner}/{repo}/milestones --jq '.[] | {title, open_issues, closed_issues, state}'`
               - Forgejo: equivalent API call
             - Check recent issue activity (last 30 days):
               - GitHub: `gh issue list --repo {owner}/{repo} --state all --limit 20`
             - Note: total open issues, recently closed, any blockers or stale issues

          5. **Gather git activity**
             - Check recent commit frequency:
               - `gh api repos/{owner}/{repo}/commits --jq '.[0:10] | .[] | {date: .commit.author.date, message: .commit.message}'`
             - Note: last commit date, commit frequency, active contributors

          6. **Assess activity balance**
             - Categorize recent activity as engineering (code, PRs, technical issues) vs business (milestones, user stories, press releases, research)
             - Note the ratio — this feeds the "business thread" check in the reality_check step

          ## Output Format

          ### state_assessment.md

          ```markdown
          # State Assessment: [Project Name]

          ## Project Profile

          - **Name**: [name]
          - **Slug**: [slug]
          - **Status**: [from PROJECTS.yaml]
          - **Priority**: [from PROJECTS.yaml]
          - **Mission**: [from README.yaml]
          - **Type**: [commercial / nonprofit / open-source / mission-focused]

          ## Existing Charter

          [Summary of current charter if it exists, or "No charter exists"]

          - **Last Updated**: [date or N/A]
          - **Current Mission**: [from charter or "not defined"]
          - **KPIs Defined**: [count and list, or "none"]
          - **Goals Defined**: [which horizons have goals, or "none"]

          ## Previous Reviews

          - **Last Review**: [date or "none"]
          - **Last Verdict**: [verdict or "N/A"]
          - **Last Confidence**: [level or "N/A"]
          - **Key Findings**: [summary or "N/A"]

          ## Milestone Status

          | Milestone | Open Issues | Closed Issues | Completion |
          | --------- | ----------- | ------------- | ---------- |
          | [title]   | [n]         | [n]           | [%]        |

          ## Recent Activity (Last 30 Days)

          - **Issues Opened**: [n]
          - **Issues Closed**: [n]
          - **Last Commit**: [date]
          - **Commit Frequency**: [e.g., "3-4 per week" or "1 in last month"]
          - **Active Contributors**: [list]

          ## Activity Balance

          - **Engineering Activity**: [summary — PRs merged, code issues, deployments]
          - **Business Activity**: [summary — milestones created, user stories, research, press releases]
          - **Balance Assessment**: [e.g., "heavily engineering-skewed" or "balanced" or "mostly business planning"]

          ## Raw Data for Charter

          - **Lean Canvas Problem**: [from README.yaml]
          - **Customer Segments**: [from README.yaml]
          - **UVP**: [from README.yaml]
          - **Riskiest Assumptions**: [from README.yaml]
          - **Recommended Next Steps**: [from README.yaml]
          ```

          ## Quality Criteria

          - Project data from README.yaml and PROJECTS.yaml is captured
          - Existing charter and previous reviews are read if they exist
          - Milestone and issue status is gathered from the platform
          - Recent git activity is summarized
          - Activity balance between engineering and business work is assessed
        inputs:
          project_slug: { required: true }
        outputs:
          state_assessment: { required: true }

      - name: define_charter
        instructions: |
          # Define or Update Charter

          ## Objective

          Create or update the project's living charter document with a mission statement, business KPIs with targets, and goals across 5 time horizons (1 month, 6 months, 1 year, 5 years, 10 years).

          ## Task

          Read the state assessment, then work with the human interactively to define or refine the charter. If a charter already exists, present the current version and ask what needs updating. If no charter exists, build one from scratch using the project profile as a starting point.

          ### Process

          1. **Read the state assessment**
             - Load `state_assessment.md` from the previous step
             - Note existing charter content (if any), lean canvas data, and project status

          2. **Define or confirm mission statement**
             - If a mission exists in the charter or README.yaml, present it and ask: "Is this still accurate, or should we refine it?"
             - If no mission exists, ask: "What is this project's mission? In one sentence, what does it exist to accomplish?"
             - The mission should be specific enough to guide prioritization decisions

          3. **Define business KPIs**
             - Ask structured questions about which business metrics matter most. Suggest relevant KPIs based on the project type:
               - **Commercial**: revenue, MRR, users, conversion rate, CAC, LTV, churn
               - **Open-source**: stars, contributors, downloads, community engagement
               - **Nonprofit/Mission**: beneficiaries served, impact metrics, funding secured
             - For each KPI, gather:
               - **Current value** (or "not yet measured" if pre-launch)
               - **Target value** with timeframe
               - **How it's measured** (data source, frequency)
             - Aim for 3-5 KPIs — enough to be comprehensive, few enough to focus
             - Each KPI should appear as a single row in the table with one primary target and timeframe. Use the goals section (not the KPI table) for longer-term targets of the same metric.

          4. **Define goals at 5 horizons**

             For each horizon, ask what success looks like. Guide the conversation:
             - **1 Month**: "What's the most important thing to accomplish in the next 30 days?"
               - Should be tactical, specific, and achievable
             - **6 Months**: "Where should this project be in 6 months?"
               - Should be milestone-level: features shipped, users reached, revenue targets
             - **1 Year**: "What does year-end success look like?"
               - Should cover product, market position, and business metrics
             - **5 Years**: "Where is this project in 5 years?"
               - Should describe market position, scale, and strategic positioning
             - **10 Years**: "What's the long-term vision?"
               - Should describe the enduring impact or market position

             Each goal must have concrete success criteria — not vague aspirations.

          5. **Write the charter**
             - Save to `projects/{slug}/charter.md`
             - If updating an existing charter, preserve the creation date and add an "Updated" date
             - Include a change log section at the bottom tracking what changed and when

          ### Conversation Tips

          - If the project is pre-launch, KPI current values can be "0" or "not yet measured" — that's fine
          - For long horizons (5yr/10yr), it's OK to be more visionary, but still include at least one measurable criterion
          - If the human seems unsure about a horizon, help them think through it: "Given your 1-year goal of X, what would the 5-year version of that look like?"
          - Keep the conversation focused — 3-5 rounds of questions maximum
          - Use AskUserQuestion for structured choices

          ## Output Format

          ### projects/{slug}/charter.md

          ```markdown
          # Project Charter: [Project Name]

          **Created**: [YYYY-MM-DD]
          **Updated**: [YYYY-MM-DD]
          **Status**: [from PROJECTS.yaml]

          ## Mission

          [One clear sentence describing why this project exists and what it accomplishes]

          ## Key Performance Indicators

          | KPI      | Current | Target   | Timeframe | How Measured  |
          | -------- | ------- | -------- | --------- | ------------- |
          | [metric] | [value] | [target] | [by when] | [data source] |

          ## Goals

          ### 1 Month

          **Goal**: [specific, tactical goal]
          **Success Criteria**:

          - [ ] [measurable criterion 1]
          - [ ] [measurable criterion 2]

          ### 6 Months

          **Goal**: [milestone-level goal]
          **Success Criteria**:

          - [ ] [measurable criterion 1]
          - [ ] [measurable criterion 2]

          ### 1 Year

          **Goal**: [annual goal covering product and business]
          **Success Criteria**:

          - [ ] [measurable criterion 1]
          - [ ] [measurable criterion 2]

          ### 5 Years

          **Goal**: [strategic positioning goal]
          **Success Criteria**:

          - [ ] [measurable criterion 1]
          - [ ] [measurable criterion 2]

          ### 10 Years

          **Goal**: [long-term vision]
          **Success Criteria**:

          - [ ] [measurable criterion 1]
          - [ ] [measurable criterion 2]

          ## Change Log

          | Date         | Change                  |
          | ------------ | ----------------------- |
          | [YYYY-MM-DD] | Initial charter created |
          ```

          ## Quality Criteria

          - The charter includes a clear mission statement that distinguishes this project
          - At least 3 business KPIs are defined with current and target values
          - Goals are defined for all 5 horizons: 1 month, 6 months, 1 year, 5 years, 10 years
          - Each goal has concrete, measurable success criteria
          - The charter is saved to `projects/{slug}/charter.md`

          ## Context

          The charter is the strategic backbone of the project. It provides the criteria against which all prioritization decisions are made. The reality_check step will score progress against these KPIs and goals, and the update_priorities step will recommend actions based on the gap between current state and charter targets. A well-defined charter prevents scope creep, engineering-only drift, and unfocused effort.
        inputs:
          state_assessment: { required: true }
        outputs:
          charter: { required: true }

      - name: reality_check
        instructions: |
          # Reality Check

          ## Objective

          Compare the project's current state against its charter goals and KPIs, score progress at each horizon, check for business-thread drift, and produce a verdict (accelerate/continue/pivot/pause/archive) with a confidence score (high/medium/low).

          ## Task

          Read the state assessment and charter, then produce a dated success review report that gives the human an honest, evidence-based picture of where the project stands and what should happen next.

          ### Process

          1. **Read inputs**
             - Load `state_assessment.md` for current project data
             - Load the charter (`projects/{slug}/charter.md`) for goals and KPIs

          2. **Score each KPI**
             - For each KPI in the charter, compare the current value to the target
             - Calculate progress as a percentage or directional indicator
             - Flag KPIs that are declining, stagnant, or significantly off-target
             - If a KPI has no current data (pre-launch), note it as "not yet measurable" rather than scoring

          3. **Assess each goal horizon**
             - For each of the 5 horizons (1mo/6mo/1yr/5yr/10yr):
               - Check each success criterion against current state
               - Rate as: **on-track**, **at-risk**, or **off-track**
               - Provide evidence for the rating (specific data points)
             - For longer horizons (5yr/10yr), assess whether the trajectory is aligned even if the goal is far out

          4. **Check the business thread**
             - Using the activity balance from the state assessment, evaluate:
               - Is the project making progress on business goals, or only engineering?
               - Are customer-facing milestones moving, or just internal infrastructure?
               - Has there been business activity (user research, marketing, customer conversations) in the last 30 days?
             - Flag if the project appears to be in "heads-down engineering" mode without business validation

          5. **Determine the verdict**
             - Based on KPI scores, goal progress, and business thread assessment, recommend one of:
               - **Accelerate**: KPIs trending up, goals on-track, strong product-market signals — invest more
               - **Continue**: Steady progress, no red flags — maintain current pace and direction
               - **Pivot**: Some goals off-track but the problem space is validated — change approach, not mission
               - **Pause**: Blocked by external factors or resource constraints — park and revisit later
               - **Archive**: Mission no longer relevant, goals consistently off-track, no path to viability — close out gracefully

          6. **Assess confidence**
             - Rate confidence as **high**, **medium**, or **low** based on:
               - **High**: Multiple data points support the verdict, clear trend, no ambiguity
               - **Medium**: Some data supports the verdict but gaps exist or trends are mixed
               - **Low**: Insufficient data, conflicting signals, or the situation is genuinely unclear
             - Explain what would increase confidence (e.g., "3 more months of KPI data" or "customer interviews needed")

          7. **Write the success review report**
             - Save to `projects/{slug}/reports/success_review_YYYY-MM.md` using the current month
             - Create the `reports/` directory if it doesn't exist

          ## Output Format

          ### projects/{slug}/reports/success_review_YYYY-MM.md

          ```markdown
          # Success Review: [Project Name] — [Month YYYY]

          **Review Date**: [YYYY-MM-DD]
          **Charter Version**: [last updated date from charter]
          **Previous Verdict**: [from last review, or "First review"]

          ## KPI Scorecard

          | KPI      | Current | Target   | Progress         | Trend                              |
          | -------- | ------- | -------- | ---------------- | ---------------------------------- |
          | [metric] | [value] | [target] | [% or indicator] | [improving / stagnant / declining] |

          ### KPI Analysis

          [2-3 sentences on overall KPI health. Flag any that are significantly off-target.]

          ## Goal Progress

          ### 1 Month — [on-track / at-risk / off-track]

          - [criterion 1]: [status with evidence]
          - [criterion 2]: [status with evidence]

          ### 6 Months — [on-track / at-risk / off-track]

          - [criterion 1]: [status with evidence]
          - [criterion 2]: [status with evidence]

          ### 1 Year — [on-track / at-risk / off-track]

          - [criterion 1]: [status with evidence]
          - [criterion 2]: [status with evidence]

          ### 5 Years — [on-track / at-risk / off-track]

          [Trajectory assessment — is current direction aligned?]

          ### 10 Years — [on-track / at-risk / off-track]

          [Vision alignment assessment]

          ## Business Thread Check

          **Activity Balance**: [engineering-skewed / balanced / business-skewed]

          [Assessment of whether business goals are getting attention alongside engineering.
          Flag specific concerns if the human appears to be losing the business thread.]

          ## Verdict

          **Recommendation**: [accelerate / continue / pivot / pause / archive]
          **Confidence**: [high / medium / low]

          ### Reasoning

          [3-5 sentences explaining why this verdict was reached, citing specific KPI data,
          goal progress, and business thread observations.]

          ### What Would Change This Verdict

          [What data or events would shift the recommendation in either direction?
          e.g., "If MRR reaches $X in the next 2 months, upgrade to accelerate.
          If no customer signups in 60 days, consider pause."]
          ```

          ## Quality Criteria

          - Each KPI from the charter is scored with current vs target values
          - Each goal across all 5 horizons has an on-track/at-risk/off-track assessment with evidence
          - A clear verdict is stated with confidence level
          - The review flags if activity is skewed toward engineering at the expense of business goals
          - The verdict is supported by specific data points, not generic reasoning
          - The "What Would Change This Verdict" section gives the human actionable decision criteria

          ## Context

          This is the core accountability step. The review must be honest — its value comes from surfacing uncomfortable truths, not from confirming what the human wants to hear. If the project is drifting, say so clearly. If KPIs aren't being measured, that itself is a finding worth flagging. The goal is to help the human make informed decisions about where to invest their time and energy.
        inputs:
          state_assessment: { required: true }
          charter: { required: true }
        outputs:
          success_review: { required: true }

      - name: update_priorities
        instructions: |
          # Update Priorities

          ## Objective

          Translate the success review verdict into concrete, actionable next steps: which workflows to run, which milestones to create or close, and whether the project's priority in PROJECTS.yaml should change.

          ## Task

          Read the success review and charter, then produce a prioritized list of recommendations that the human can act on immediately or delegate to agents.

          ### Process

          1. **Read inputs**
             - Load the success review report from the reality_check step
             - Load the charter for context on goals and KPIs
             - Note the verdict and confidence level

          2. **Map verdict to action patterns**

             Each verdict implies a different set of actions:
             - **Accelerate**:
               - Recommend increasing investment: more milestones, faster cadence
               - Suggest which goals to push harder on
               - Recommend `project/press_release` if there's a shippable feature worth announcing
               - Consider raising priority in PROJECTS.yaml

             - **Continue**:
               - Recommend maintaining current pace
               - Identify the next milestone to set up (`milestone/setup`)
               - Flag any at-risk goals that need attention before they go off-track
               - Priority stays the same in PROJECTS.yaml

             - **Pivot**:
               - Identify what to keep (validated problem space) vs what to change (approach, target segment, solution)
               - Recommend a new `project/press_release` to reframe the value proposition
               - Suggest updating the charter with revised goals
               - May need a new onboard cycle for the pivoted direction

             - **Pause**:
               - Recommend closing active milestones or moving issues to backlog
               - Specify what would trigger resumption (external event, resource availability, market change)
               - Lower priority in PROJECTS.yaml
               - Note: paused projects should still get periodic success reviews (quarterly minimum)

             - **Archive**:
               - Recommend closing all milestones and issues
               - Suggest a final retrospective note in the charter
               - Set status to "archived" in PROJECTS.yaml
               - Move to lowest priority or remove from active list

          3. **Generate specific workflow recommendations**
             - For each recommended action, specify the exact workflow to run:
               - `project/onboard` — if pivoting requires re-profiling
               - `project/press_release` — if there's a feature to announce or reframe
               - `project/success` — schedule the next review (quarterly for active, semi-annual for paused)
               - `milestone/setup` — if a new milestone should be created
               - `research/research` — if market validation or competitive analysis is needed
             - Order by urgency and impact

          4. **Draft PROJECTS.yaml changes** (if applicable)
             - If the verdict warrants a priority change, specify exactly what to change
             - Show the before/after for the project entry
             - Do NOT make the change — just recommend it for human approval

          5. **Identify charter updates needed**
             - If goals need revision based on the review, note what should change
             - This feeds back into the next `project/success` run
             - Do NOT modify the charter — just note what needs updating

          ## Output Format

          ### priority_recommendations.md

          ````markdown
          # Priority Recommendations: [Project Name]

          **Based on**: Success Review [Month YYYY]
          **Verdict**: [verdict] (confidence: [level])

          ## Immediate Actions

          ### 1. [Most urgent action]

          - **What**: [specific action]
          - **Workflow**: `[job/workflow]` or manual action
          - **Why**: [tied to verdict reasoning]
          - **Owner**: [human / luce / drago]

          ### 2. [Next action]

          ...

          ## Priority Adjustment

          **Current Priority**: [from PROJECTS.yaml]
          **Recommended Priority**: [same / higher / lower / archive]
          **Reasoning**: [why, tied to verdict]

          ### Proposed PROJECTS.yaml Change

          ```yaml
          # Before
          - name: [project]
            priority: [current]
            status: [current]

          # After
          - name: [project]
            priority: [new]
            status: [new]
          ```
          ````

          ## Charter Updates Needed

          - [Goal or KPI that should be revised, and suggested revision]
          - [Or "No updates needed — charter is current"]

          ## Next Review

          - **Recommended**: [date — quarterly for active, semi-annual for paused]
          - **Focus Areas**: [what to pay attention to before next review]

          ## Decision Points

          [Key questions for the human to decide on — things the agent can't decide unilaterally.
          e.g., "Should we pivot the target segment from developers to data scientists?"
          or "Is the $X/month budget still available for this project?"]

          ## Quality Criteria

          - Recommendations follow directly from the verdict in the success review
          - Each recommendation specifies a concrete action with an owner and workflow
          - Recommendations are ordered by urgency and impact
          - PROJECTS.yaml changes are proposed but not applied (human approval required)
          - The next review date is specified
          - Decision points requiring human judgment are clearly called out

          ## Context

          This is the final step that turns analysis into action. The recommendations should be specific enough that the human can say "yes, do it" and the agents can execute immediately. Avoid vague recommendations like "consider improving marketing" — instead say "run `project/press_release` for the X feature to test messaging with customers." The human is busy and focused on engineering — these recommendations are the business thread that keeps the project strategically coherent.
        inputs:
          success_review: { required: true }
          charter: { required: true }
        outputs:
          priority_recommendations: { required: true }

  doctor:
    summary: "Audit a project's health: hub note completeness, repo conventions, and release post coverage on the website"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
      - Use Chrome MCP for all live public websites (HTTP 200) — take screenshot + snapshot
        to capture current state, messaging, and page status (live/demo/placeholder).
    steps:
      - name: load_hub
        instructions: |
          # Load Project Hub

          ## Objective

          Find the project's index hub note in the notes repo via the zk tag system, then extract all
          structured data needed for the health audit: repos, website URL, social media, and hub
          field completeness.

          ## Steps

          ### 1. Find the hub note

          Use `zk` to locate the hub note by its `index` type and project name tag:

          ```bash
          NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
          zk --notebook-dir "$NOTES_DIR" list index/ --tag "index" --tag "<project_name>" --format "{{absPath}}"
          ```

          If no result, try variations in this order:
          1. Search by `project:` frontmatter: `rg "^project: <project_name>" "${NOTES_DIR:-$HOME/notes}/index/" -l`
          2. Search by `type: index` in frontmatter: `rg "type: index" "${NOTES_DIR:-$HOME/notes}/index/" -l` then check each for a matching title or name
          3. Try alternate tag spellings (e.g. `ks-systems` vs `ks.systems`)

          Note: Hub notes may be findable via `project:` frontmatter even when the project tag is missing from `tags:`. This is a common gap that `file_gaps` will correct by adding the tag.

          If still not found, report it as a critical gap (hub note missing entirely) and proceed
          with whatever repos can be inferred from the project name.

          ### 2. Parse the hub note

          Read the full note frontmatter and body. Extract:

          | Field | Source |
          |-------|--------|
          | Website URL | Body links, `website_url:` frontmatter, or `domains:` field |
          | Social media | Body links to X/Twitter, LinkedIn, Bluesky, Mastodon, GitHub profile |
          | Repos | `tags` containing `repo/<owner>/<repo>`, `repo_ref:` frontmatter, body links to GitHub/Forgejo repos |
          | Project name | `name:` frontmatter |
          | Status | `status/active`, `status/paused`, etc. tags |

          For repos: check both the frontmatter and the body — hub notes often have repos as wikilinks
          or markdown links. Parse both `repo/ncrmro/keystone` style tags and `https://github.com/...`
          style links.

          ### 3. Identify the website repo

          Among the extracted repos, identify which (if any) is the project's website:
          - Name contains `web`, `site`, `www`, or `frontend`
          - Description mentions "website", "landing page", or "marketing"
          - Has a known web framework (Next.js, Astro, etc.) — check with `git ls-remote` or a quick
            `gh repo view` / `fj repo view`

          ### 4. Write the hub_report.md

          Create `hub_report.md` with this structure:

          ```markdown
          # Hub Report: <project_name>

          ## Hub Note
          - Path: <notes-dir>/index/<id> <slug>.md
          - Status: found | missing

          ## Fields

          | Field | Status | Value |
          |-------|--------|-------|
          | Website URL | present / missing | https://... |
          | Social: X/Twitter | present / missing | ... |
          | Social: LinkedIn | present / missing | ... |
          | Social: Bluesky | present / missing | ... |
          | Repos | N repos / none listed | ... |

          ## Repos

          | Repo | Platform | URL | Role |
          |------|----------|-----|------|
          | ncrmro/keystone | github | https://github.com/ncrmro/keystone | source |
          | ncrmro/ks-systems-web | github | https://github.com/ncrmro/ks-systems-web | website |

          ## Website Repo
          - Identified: <repo> | None identified
          ```

          ## Notes

          - Do NOT update the hub note yet — that happens in `file_gaps`
          - If the hub note is missing entirely, still produce hub_report.md with the missing status
            so downstream steps know to file a hub creation issue
          - Social media gaps are informational (lower priority issues) — repos and website are critical
        inputs:
          project_name: { required: true }
        outputs:
          hub_report: { required: true }

      - name: audit_health
        instructions: |
          # Audit Repo and Release Health

          ## Objective

          For each repo in the project, run `repo/doctor` via a parallel sub-agent to audit
          conventions. For each source repo, enumerate releases and check whether each release
          has a corresponding published MDX post on the project's website.

          ## Steps

          ### 1. Run repo/doctor for each repo (parallel sub-agents)

          For each repo listed in `hub_report.md`, launch a sub-agent (Task tool) running the
          `repo/doctor` workflow. These run in parallel — one sub-agent per repo.

          Each sub-agent should be invoked via the Task tool with a prompt like:
          ```
          Start the repo/doctor workflow for <owner>/<repo>.
          job_name: "repo", workflow_name: "doctor", goal: "audit repo health for <owner>/<repo>", session_id: <session_id>
          Follow the steps and return a summary of: labels present/missing, branch protection status, open milestones, and boards.
          ```

          Collect results. If a repo is inaccessible (no SSH/API access), record that as a skip
          with reason.

          ### 2. Enumerate releases in source repos

          For each **source repo** (non-website repos), find all releases/tags:

          ```bash
          # GitHub
          gh release list --repo <owner>/<repo> --limit 50

          # Forgejo
          fj release list --repo <owner>/<repo>

          # Fallback: git tags
          git -C <local-path> tag --sort=-version:refname | head -20
          ```

          Also check for a `releases/` directory in the repo root — Keystone-style projects store
          release notes at `releases/<version>/release_notes.md`. If found, use those as the
          canonical release list.

          For each release, record:
          - Version (e.g. `v0.8.0`)
          - Date
          - Title / headline (first line of release notes)
          - Source: GitHub release, git tag, or `releases/` directory

          ### 3. Check website for published posts

          For each **website repo**, check whether blog/posts MDX infrastructure exists:

          ```bash
          # Clone locally if not already present, then check
          ls <website-repo>/src/content/posts/ 2>/dev/null || \
          ls <website-repo>/content/posts/ 2>/dev/null || \
          ls <website-repo>/posts/ 2>/dev/null
          ```

          Common paths to check (in order):
          1. `src/content/posts/`
          2. `content/posts/`
          3. `src/pages/blog/`
          4. `pages/blog/`
          5. `src/app/posts/` (Next.js App Router)

          If no posts directory found: record `blog_infrastructure: missing`.

          If found: list all `.mdx` and `.md` files. For each release found in step 2, check whether
          a post exists that references the version (filename contains the version string, or file
          content mentions the version in the title/metadata).

          ### 4. Write health_report.md

          ```markdown
          # Health Report: <project_name>

          ## Repo Doctor Results

          ### <owner>/<repo>
          - Labels: standard set present / missing: bug, enhancement, ...
          - Branch protection: main not protected
          - Milestones: current milestone open / no open milestones
          - Boards: present / missing

          (repeat per repo)

          ## Release Coverage

          ### Source Repo: <owner>/<repo>
          Releases found: N

          | Version | Date | Title | Published Post | Post Path |
          |---------|------|-------|----------------|-----------|
          | v0.8.0 | 2026-03-17 | OS Agents | yes | src/content/posts/keystone.v0-8-0-os-agents.mdx |
          | v0.7.0 | 2026-03-16 | Keys | missing | — |

          ### Website Repo: <owner>/<repo>
          - Blog infrastructure: found at src/content/posts/ | missing
          - Posts directory: src/content/posts/
          - Total posts: N

          ## Summary

          - Repos checked: N
          - Releases found: N
          - Posts published: N / N
          - Missing posts: N
          - Blog infrastructure missing: yes | no
          ```

          ## Notes

          - **Scope**: This step checks whether posts exist — it does NOT create MDX files. If posts
            are missing, record them as gaps; `file_gaps` will file issues for an agent to create them.
          - Run repo/doctor sub-agents in parallel — do not wait for each to finish before starting
            the next
          - If the website repo is not cloned locally, clone it to `~/.keystone/repos/<owner>/<repo>/`
            using `gh repo clone <owner>/<repo> ~/.keystone/repos/<owner>/<repo>` (GitHub) or
            `git clone ssh://forgejo@git.ncrmro.com:2222/<owner>/<repo>.git ~/.keystone/repos/<owner>/<repo>` (Forgejo)
          - Version matching is fuzzy: `v0-8-0`, `v0.8.0`, and `0.8.0` should all match release `v0.8.0`
        inputs:
          hub_report: { required: true }
        outputs:
          health_report: { required: true }

      - name: file_gaps
        instructions: |
          # File Issues for Gaps

          ## Objective

          For every gap found in the hub audit and health audit, file a targeted GitHub or Forgejo
          issue so it can be assigned and tracked. Update the hub note with any fields that can be
          filled in automatically.

          ## Steps

          ### 1. Triage all gaps

          Read `hub_report.md` and `health_report.md`. Build a gap list:

          | Gap Type | Severity | Action |
          |----------|----------|--------|
          | Hub note missing | Critical | File issue to create hub note |
          | Hub: website URL missing | High | File issue to add website URL to hub |
          | Hub: no repos listed | High | Update hub note with repo_ref tags (automatic) |
          | Hub: social media missing | Low | File issue (informational) |
          | Blog infrastructure missing | High | File issue on website repo to scaffold blog |
          | Missing release post | Medium | File one issue per release on website repo |
          | Repo/doctor failures | Varies | Defer to repo/doctor's own issue filing |

          Skip filing issues for gaps that `repo/doctor` already handles — those are reported but not
          duplicated here.

          ### 2. Update the hub note automatically

          For any repos that were discovered but not yet listed in the hub note, add them now:
          - Add `repo/<owner>/<repo>` tags to the frontmatter `tags:` list
          - This does not require an issue — just update the note directly

          Only commit if frontmatter was actually changed — skip if all repos were already listed:
          ```bash
          NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
          git -C "$NOTES_DIR" diff --quiet || git -C "$NOTES_DIR" add . && git -C "$NOTES_DIR" commit -m "chore(hub): add repo refs to <project> hub note"
          ```

          ### 3. File: blog infrastructure issue (if missing)

          If `blog_infrastructure: missing` for any website repo, file ONE issue on that repo:

          ```
          Title: feat(posts): add MDX blog/posts infrastructure

          Body:
          ## Context
          The <project> website at <url> does not have a blog or posts section.
          Press releases and release announcements need a published home on the website.

          ## Required
          - A `src/content/posts/` directory (or equivalent) that accepts MDX files
          - A `/posts` index page listing all posts by category
          - A `/posts/[slug]` dynamic route rendering individual posts
          - Posts use `export const metadata = { title, description, author, date }` frontmatter

          ## Standard
          See `ncrmro/ks-systems-web` for the reference implementation:
          - `src/content/posts/` — MDX files with dot-notation naming: `keystone.v0-8-0-os-agents.mdx`
          - `src/app/posts/page.tsx` — index page grouping posts by category
          - `src/app/posts/[slug]/page.tsx` — dynamic route
          - `src/lib/content/posts.ts` — content loader

          ## Assignable to Copilot / agents
          This is a well-defined implementation task suitable for automated agents.

          ## Releases waiting to be published
          <list releases that are missing posts>
          ```

          Label it: `feat`, `content`, `good first issue` (and `copilot` if available).

          ### 4. File: one issue per missing release post

          For each release that has no corresponding published MDX post, file one issue on the
          **website repo**:

          ```
          Title: feat(posts): publish release post for <project> <version>

          Body:
          ## Release
          - Version: <version>
          - Date: <date>
          - Source: <link to release notes or GitHub release>
          - Headline: <title of release>

          ## Task
          Create `src/content/posts/<project>.v<version-dashes>-<slug>.mdx` with:

          export const metadata = {
            title: "<project> <version> — <headline>",
            description: "<one-line summary>",
            author: "NCRMRO",
            date: "<date>",
          };

          # <project> <version> — <headline>

          <content from release notes>

          ## Source material
          Release notes: <link or path>

          ## Assignable to Copilot / agents
          ```

          File these issues individually — not as a bulk issue — so each can be independently assigned.

          When passing the body to `gh issue create`, use a heredoc or a temp file to avoid shell
          quoting issues with the embedded code block:
          ```bash
          gh issue create --title "feat(posts): publish release post for <project> <version>" \
            --body-file /tmp/release-post-issue-<version>.md --label "feat,content"
          ```

          ### 5. Write gap_report.md

          ```markdown
          # Gap Report: <project_name>

          ## Hub Note Updates (applied automatically)
          - Added repo_ref tags: repo/ncrmro/keystone, ...

          ## Issues Filed

          | Gap | Issue | URL |
          |-----|-------|-----|
          | Blog infrastructure missing | feat(posts): add MDX blog/posts infrastructure | https://... |
          | Missing post: v0.7.0 | feat(posts): publish release post for keystone v0.7.0 | https://... |
          | Missing post: v0.6.0 | feat(posts): publish release post for keystone v0.6.0 | https://... |

          ## Skipped Gaps

          | Gap | Reason |
          |-----|--------|
          | Social media missing | Low priority — informational only, no issue filed |
          | Repo convention gaps | Handled by repo/doctor |

          ## Summary
          - Hub note updated: yes / no
          - Issues filed: N
          - No action needed: N gaps already covered
          ```

          ## Notes

          - Use `gh issue create` for GitHub repos, `fj issue create` for Forgejo repos
          - Do NOT file duplicate issues — before filing, check open issues for the same title with
            `gh issue list --search "feat(posts): publish release post for <project> <version>"`
          - For the blog infrastructure issue, add a checklist of all missing release posts as items
            in the body so the implementer knows the full backlog
          - Notify the user of all issues filed at the end with a bulleted list of URLs
        inputs:
          hub_report: { required: true }
          health_report: { required: true }
        outputs:
          gap_report: { required: true }

  wrap_up:
    summary: "Wind down engineering work — group uncommitted changes into logical commits, push, document in notes, and check in on open issues/PRs"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job covers the full project lifecycle from onboarding through engineering handoff.

      Agent access context:
      - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
      - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
      - Use CLI tools first for repo investigation to save tokens.
    steps:
      - name: scan_context
        instructions: |
          # Scan Context and Cluster Changes

          ## Objective

          Discover every uncommitted change across the specified repos, filter out work
          already handled by other sessions, and cluster remaining changes into logical
          commit groups so the next step can present a clean plan to the user.

          ## Inputs

          - `repos` — space-separated repo paths from the user, or current working directory if blank.
          - `.deepwork/tmp/wrap_up_state.json` — shared session state (may not exist yet).

          ## Shared State Schema

          The shared state file lives at `.deepwork/tmp/wrap_up_state.json`:

          ```json
          {
            "sessions": {
              "<session_id>": {
                "claimed_group_key": "<key>",
                "status": "claiming|committing|done",
                "last_seen": "<ISO-8601 timestamp>"
              }
            },
            "processed_groups": [
              {
                "key": "<group_key>",
                "commit_sha": "<sha>",
                "repo": "<path>",
                "processed_by": "<session_id>",
                "processed_at": "<ISO-8601 timestamp>"
              }
            ]
          }
          ```

          A session is **stale** if `last_seen` is more than 30 minutes ago. Release
          stale session claims before reading active ones.

          ## Steps

          ### 1. Resolve repos

          If `repos` is blank, use the current working directory. Otherwise split on
          spaces to get a list of paths. For each path, verify it is a git repo:

          ```bash
          git -C <path> rev-parse --is-inside-work-tree 2>/dev/null
          ```

          Skip non-git paths with a warning.

          ### 2. Read shared state

          ```bash
          cat .deepwork/tmp/wrap_up_state.json 2>/dev/null || echo '{}'
          ```

          Parse out:
          - Active (non-stale) session claims -> set of claimed group keys to exclude.
          - Processed groups -> set of file paths already committed this session -> exclude from discovery.

          ### 3. Discover changes per repo

          For each repo, run:

          ```bash
          git -C <path> status --short
          git -C <path> rev-parse --abbrev-ref HEAD          # current branch
          git -C <path> symbolic-ref refs/remotes/origin/HEAD --short 2>/dev/null | sed 's|origin/||'  # default branch
          git -C <path> rev-list --left-right --count HEAD...@{upstream} 2>/dev/null  # ahead/behind
          ```

          Collect all modified, new, deleted, and untracked files.

          ### 4. Filter processed and claimed files

          Remove any file that appears in a processed group or is claimed by an active
          (non-stale) session.

          ### 5. Cluster remaining changes into logical groups

          Use the following heuristics (apply in order; stop when a file is assigned):

          1. **Modified files with related names**: files sharing a directory prefix and
             modified in the same apparent feature (e.g., `conventions/process.wrap-up.md`
             and `modules/terminal/agent-assets/wrap-up-skill.template.md` -> same group).

          2. **New files alongside a modified parent**: a new step instruction file
             alongside a modified `job.yml` -> same group.

          3. **Dependency updates alone**: `flake.lock`, `package-lock.json`,
             `go.sum`, etc. -> their own group with `chore(deps):` prefix.

          4. **Catch-all**: remaining files with no clear relationship -> one group per
             top-level directory (e.g., one group for all remaining `modules/` changes).

          For each group, write:
          - `key`: a stable slug derived from the repo path + first file (e.g., `keystone/conventions`)
          - `repo`: absolute path to the repo
          - `files`: list of affected paths relative to repo root
          - `suggested_message`: a Conventional Commits message summarising the group
          - `branch`: current branch name
          - `default_branch`: detected default branch
          - `ahead`: commits ahead of remote
          - `behind`: commits behind remote

          ### 6. Write output

          Write `wrap_up_scan.json` with this structure:

          ```json
          {
            "repos_scanned": ["<path>", ...],
            "active_sessions": [{"session_id": "...", "claimed_group_key": "..."}],
            "processed_groups": [{"key": "...", "commit_sha": "..."}],
            "change_groups": [
              {
                "key": "keystone/conventions",
                "repo": "/home/ncrmro/.keystone/repos/ncrmro/keystone",
                "files": ["conventions/process.wrap-up.md"],
                "suggested_message": "feat(conventions): add wrap-up convention",
                "branch": "main",
                "default_branch": "main",
                "ahead": 0,
                "behind": 0
              }
            ],
            "no_changes": false
          }
          ```

          If there are no change groups after filtering, set `no_changes: true` and note
          this in the output so `plan_commits` can inform the user that everything is
          already clean.

          ### 7. Handle edge cases

          - **On default branch with unstaged work**: note it clearly — the user may want
            to create a feature branch first. Do not refuse; just record it.
          - **Untracked files**: include them in grouping. The commit step will handle
            `git add`.
          - **Repos with uncommitted merges or rebase in progress**: flag them in
            `change_groups[*].notes` and skip committing for that repo — let the user
            resolve manually.
        inputs:
          repos: { required: false }
        outputs:
          wrap_up_scan: { required: true }

      - name: plan_commits
        instructions: |
          # Plan Commits

          ## Objective

          Read the scan results, present the next unprocessed change group to the user for
          review and approval, confirm the commit message, and claim the group in shared state
          so other sessions know it is in progress.

          ## Inputs

          - `wrap_up_scan.json` — output from `scan_context`
          - `.deepwork/tmp/wrap_up_state.json` — shared session state

          ## Steps

          ### 1. Read scan results

          ```bash
          cat .deepwork/tmp/wrap_up_scan.json
          ```

          If `no_changes` is `true`, skip to step 5 (nothing to do).

          ### 2. Refresh shared state

          Re-read `.deepwork/tmp/wrap_up_state.json` (it may have been updated by other
          sessions since `scan_context` ran):

          ```bash
          cat .deepwork/tmp/wrap_up_state.json 2>/dev/null || echo '{}'
          ```

          - Release stale session claims (last_seen > 30 minutes ago).
          - Rebuild the set of:
            - **Claimed** group keys (active sessions with non-stale claims).
            - **Processed** group keys (already committed this session or prior).

          ### 3. Select the next group

          From `change_groups` in `wrap_up_scan.json`, find the first group whose key is
          not in the claimed or processed set.

          If no unclaimed group remains -> all work is done. Set `all_done: true` in
          `wrap_up_plan.json` and skip to step 6.

          ### 4. Present the group to the user

          Show a concise summary:

          ```
          Repo:    <repo absolute path>
          Branch:  <branch>  (default: <default_branch>  ahead: <N>  behind: <N>)
          Files:
            - path/to/file.ext
            - path/to/other.ext
          Suggested commit:
            <suggested_message>
          ```

          If the group notes indicate a merge or rebase is in progress, flag it and skip
          it (do not claim it).

          Ask the user:

          1. **Approve the file list?** (yes / edit — if edit, let the user remove files
             they want to defer; removed files stay in `wrap_up_scan.json` as unclaimed)
          2. **Commit message?** (accept suggested / provide a replacement)
          3. **Push after commit?** (yes / no — default yes)

          ### 5. Claim the group

          Write the claim to shared state **before** proceeding. This prevents another
          session from picking up the same group:

          ```json
          {
            "sessions": {
              "<session_id>": {
                "claimed_group_key": "<key>",
                "status": "claiming",
                "last_seen": "<ISO-8601 now>"
              }
            },
            "processed_groups": [ ... ]
          }
          ```

          Use a read-modify-write pattern to avoid clobbering other sessions:

          ```bash
          STATE=".deepwork/tmp/wrap_up_state.json"
          TMPFILE="${STATE}.tmp.$$"
          cat "$STATE" 2>/dev/null | jq \
            --arg sid "<session_id>" \
            --arg key "<group_key>" \
            --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.sessions[$sid] = {claimed_group_key: $key, status: "claiming", last_seen: $now}' \
            > "$TMPFILE" && mv "$TMPFILE" "$STATE"
          ```

          ### 6. Write output

          Write `wrap_up_plan.json`:

          ```json
          {
            "all_done": false,
            "group": {
              "key": "<key>",
              "repo": "<absolute path>",
              "files": ["<relative path>", ...],
              "commit_message": "<approved message>",
              "branch": "<branch>",
              "push": true
            }
          }
          ```

          If `all_done` is `true`:

          ```json
          {
            "all_done": true
          }
          ```

          ## Output Format

          ### wrap_up_plan.json

          Written to `.deepwork/tmp/wrap_up_plan.json`.

          ## Quality Criteria

          - The plan file is written with the group key, repo path, approved file list, and commit message
          - The session claim is written to shared state before the output file
          - Files the user deferred are NOT in the plan's file list
          - If no groups remain, `all_done: true` is set
        inputs:
          wrap_up_scan: { required: true }
        outputs:
          wrap_up_plan: { required: true }

      - name: commit_and_document
        instructions: |
          # Commit and Document

          ## Objective

          Stage and commit the approved file group, optionally push it, update the shared
          state to mark the group as processed, and write a brief handoff note in the configured notes dir
          (or update an existing open issue/PR with a check-in comment).

          ## Inputs

          - `wrap_up_plan.json` — from `plan_commits`
          - `.deepwork/tmp/wrap_up_state.json` — shared session state

          ## Steps

          ### 1. Read the plan

          ```bash
          cat .deepwork/tmp/wrap_up_plan.json
          ```

          If `all_done` is `true`, there is nothing to do — skip to step 7 and emit an
          empty `commit_result.json`.

          ### 2. Stage files

          ```bash
          cd <group.repo>
          git add -- <file1> <file2> ...
          ```

          Run `git status` to confirm only the intended files are staged. If unintended
          files appear (e.g., auto-generated outputs), unstage them and note the deviation.

          ### 3. Commit

          ```bash
          git -C <group.repo> commit -m "<group.commit_message>"
          ```

          Capture the resulting commit SHA:

          ```bash
          COMMIT_SHA=$(git -C <group.repo> rev-parse HEAD)
          ```

          ### 4. Push (if approved)

          If `group.push` is `true`:

          ```bash
          git -C <group.repo> push
          ```

          If the branch has no upstream yet:

          ```bash
          git -C <group.repo> push --set-upstream origin <group.branch>
          ```

          ### 5. Update shared state

          Mark the group as processed. Use a read-modify-write to avoid clobbering other
          sessions:

          ```bash
          STATE=".deepwork/tmp/wrap_up_state.json"
          TMPFILE="${STATE}.tmp.$$"
          cat "$STATE" | jq \
            --arg sid "<session_id>" \
            --arg key "<group.key>" \
            --arg sha "<COMMIT_SHA>" \
            --arg repo "<group.repo>" \
            --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '
              .sessions[$sid].status = "done" |
              .sessions[$sid].last_seen = $now |
              .processed_groups += [{
                key: $key,
                commit_sha: $sha,
                repo: $repo,
                processed_by: $sid,
                processed_at: $now
              }]
            ' > "$TMPFILE" && mv "$TMPFILE" "$STATE"
          ```

          ### 6. Post a check-in comment (if there are open issues/PRs for this work)

          For any open GitHub or Forgejo issues and PRs identified as relevant in the session
          context or in `wrap_up_scan.json` notes, post a brief status comment using the
          template from `process.wrap-up`:

          ```markdown
          ## Session check-in — <YYYY-MM-DD>

          **Status:** committed — `<commit_sha_short>` on `<branch>`

          ### What happened

          - Committed: `<commit_message>`
          - Files: <count> file(s) in `<top-level dir>`

          ### Testing

          <any testing notes, or "not tested in this session">

          ### Next steps

          1. <next concrete action if known>

          ### Deferred

          <files or work explicitly deferred — or "nothing deferred">

          ---
          *Check-in from /wrap-up.*
          ```

          Skip this step if no relevant issues/PRs are known.

          ### 7. Write output

          Write `.deepwork/tmp/wrap_up_progress.json`:

          ```json
          {
            "committed": true,
            "group_key": "<key>",
            "repo": "<absolute path>",
            "branch": "<branch>",
            "commit_sha": "<full SHA>",
            "commit_message": "<message>",
            "pushed": true,
            "files": ["<relative path>", ...],
            "notes_report_path": "<path to configured notes-dir report, or null>",
            "issues_commented": ["<URL>", ...]
          }
          ```

          If nothing was committed (`all_done` was true from the plan):

          ```json
          {
            "committed": false
          }
          ```

          ## Output Format

          ### wrap_up_progress.json

          Written to `.deepwork/tmp/wrap_up_progress.json`.

          ## Quality Criteria

          - The commit SHA is recorded in both `commit_result.json` and shared state
          - Shared state `processed_groups` entry includes `key`, `commit_sha`, `repo`, `processed_by`, `processed_at`
          - The session's `status` is updated to `"done"` in shared state
          - Only the files from the approved plan are staged — no unintended files
        inputs:
          wrap_up_plan: { required: true }
        outputs:
          wrap_up_progress: { required: true }

      - name: continue_or_finish
        instructions: |
          # Continue or Finish

          ## Objective

          After a group has been committed, check whether additional unprocessed change
          groups remain. If they do, ask the user whether to continue and loop back to
          `plan_commits`. If none remain (or the user says stop), produce a final summary.

          ## Inputs

          - `wrap_up_progress.json` — from `commit_and_document`
          - `wrap_up_scan.json` — from `scan_context`
          - `.deepwork/tmp/wrap_up_state.json` — shared session state

          ## Steps

          ### 1. Read current state

          ```bash
          cat .deepwork/tmp/wrap_up_scan.json
          cat .deepwork/tmp/wrap_up_state.json 2>/dev/null || echo '{}'
          ```

          Rebuild the set of processed and claimed group keys (same logic as `plan_commits`
          step 2, including stale session release).

          ### 2. Count remaining groups

          From `wrap_up_scan.json` `change_groups`, count groups whose key is not yet
          processed or actively claimed by a non-stale session.

          ### 3. Decide

          **If 0 remaining groups:**

          - Print the completion summary (see below).
          - Write `wrap_up_summary.json` with `finished: true`.
          - Complete the workflow.

          **If >= 1 remaining groups:**

          - Show the user how many groups remain and a one-line preview of each
            (suggested commit message only — not full file lists).

          - Ask: **"Process the next group? (yes / no / stop)**
            - `yes` -> call `go_to_step` with `step_id: "plan_commits"` to loop.
            - `no` / `stop` -> print partial summary and complete the workflow with
              `finished: false`.

          ### 4. Completion summary

          Print a table of everything committed this session:

          ```
          Wrap-up complete for this session.

          Committed groups:
            <commit_sha_short>  <branch>  <commit_message>  (<repo short name>)
            ...

          Remaining (not processed this session):
            -  <key>  <suggested_message>  (<repo short name>)
            ...

          Run /project.wrap_up in another session or tab to continue.
          ```

          ### 5. Write output

          Write `wrap_up_summary.md` in the working directory:

          ```markdown
          # Wrap-up Summary

          **Session**: <session_id>
          **Date**: <YYYY-MM-DD>

          ## Committed This Session

          | SHA       | Branch     | Message                          | Repo               |
          | --------- | ---------- | -------------------------------- | ------------------- |
          | `abc1234` | `feat/...` | `feat(terminal): add wrap-up...` | ncrmro/keystone    |
          | ...       | ...        | ...                              | ...                |

          ## Notes Reports Created

          - <path or "none">

          ## Issues / PRs Commented

          - <URL or "none">

          ## Remaining (not processed this session)

          | Key                    | Suggested Message        | Repo            |
          | ---------------------- | ------------------------ | --------------- |
          | `keystone/modules/...` | `chore(deps): update...` | ncrmro/keystone |
          | ...                    | ...                      | ...             |

          Run `/project.wrap_up` to continue processing remaining groups.
          ```

          If `finished` is `true` and no groups remain, omit the "Remaining" section.

          ## Output Format

          ### wrap_up_summary.md

          Written to the working directory (`.deepwork/tmp/wrap_up_summary.md`).

          ## Quality Criteria

          - Remaining group count is correct (accounts for groups claimed by other active sessions)
          - If groups remain and the user said yes, `go_to_step plan_commits` is called
          - The summary lists every group committed this session with its commit SHA
          - `finished` is `true` only when no unclaimed groups remain
        inputs:
          wrap_up_progress: { required: true }
        outputs:
          wrap_up_summary: { required: true }
