name: keystone_system
summary: "Keystone development lifecycle: worktree, build, review, merge, deploy, validate, update, and convention management"

step_arguments:
  - name: goal
    description: "What to implement — a feature description, bug report, or refactor goal"
    type: string

  - name: feature_description
    description: "What feature or bug to spec — a sentence or paragraph describing the need"
    type: string

  - name: convention_topic
    description: "What to codify — a topic description and optionally a draft with proposed rules"
    type: string

  - name: plan_md
    description: "Implementation plan with steps, files to change, and acceptance criteria"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify the plan has concrete, ordered steps, identifies specific files, and includes testable acceptance criteria."

  - name: implementation_summary_md
    description: "Summary of changes made: files modified, commits created, decisions taken"
    type: file_path
    review:
      strategy: individual
      instructions: "Read the plan_md file from the plan step to verify all planned steps were addressed. Confirm commits follow conventional format and no unrelated changes were introduced."

  - name: review_report_md
    description: "Review results — findings addressed, findings skipped with justification"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify every review finding is either fixed or has a documented justification for skipping."

  - name: build_result_md
    description: "Build output — success confirmation or failure details with loop-back decision"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify both nix flake check and ks build completed without errors."

  - name: merge_result_md
    description: "Merge confirmation — branch name, commit hash on main, push status"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify the merge completed without conflicts and the branch was pushed to origin/main."

  - name: deploy_result_md
    description: "Deployment confirmation — ks update --lock output, build success, any warnings"
    type: file_path

  - name: validation_report_md
    description: "Validation results — per-host health status, agent health, fleet impact, issues found"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Verify: direct health checks on the current host show no critical issues;
        all affected hosts were checked; specific plan validation criteria are confirmed;
        each agent's task queue, recent jobs, and blocking issues are reported;
        every issue found is cross-referenced against GitHub; a dated fleet health
        note was written to the configured notes dir via zk.

  - name: fleet_survey_md
    description: "Fleet state report: current vs latest keystone rev, commit changelog, per-host health, reachability"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Verify the report shows the exact keystone commit locked in flake.lock and
        the latest on main with the full commit log between them. All hosts in
        hosts.nix must be listed with reachability status. Direct health checks
        must have been run on the current host.

  - name: update_plan_md
    description: "Update plan: triaged changes, verification checklist, issues to file, fixes to apply"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Read the fleet_survey_md from the previous step to verify all commits in
        the gap are accounted for in the triage. Verify every commit is classified
        as verify-only, ad-hoc-fix, or needs-issue. Verify items marked needs-issue
        have clear justification.

  - name: fixes_report_md
    description: "Report of fixes applied, issues filed, and any remaining blockers before deployment"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Read the update_plan_md to verify all ad-hoc-fix items were addressed and
        all needs-issue items have issue URLs. Verify no blockers remain undocumented.

  - name: preflight_build_result_md
    description: "Build results per host — success/failure, errors, warnings"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify every reachable host from the deployment plan was built and all builds succeeded or failures are documented."

  - name: update_result_md
    description: "Deployment result: ks update --lock output per host, build status, any errors or warnings"
    type: file_path

  - name: issue_md
    description: "Final GitHub issue body plus created issue URL or matching existing issue URL"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Confirm the issue body is actionable as the plan of record and suitable to
        seed the eventual PR description. Verify RFC 2119 keywords are used correctly,
        requirements are testable, at least one ASCII diagram is present, affected
        modules are identified, user stories are included, and the GitHub issue was
        created or an existing issue was linked.

  - name: convention_draft_md
    description: "The drafted convention file in RFC 2119 format, ready for cross-referencing"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Read conventions/AGENTS.md for format rules (H1 title format, numbered rules,
        RFC 2119 keywords). Read 2-3 existing conventions to verify format consistency.
        Verify rules are specific, actionable, and grouped into coherent sections.
        Verify a golden example is included if the convention covers a non-trivial pattern.

  - name: cross_reference_report_md
    description: "Analysis of overlaps with existing conventions, redundant rules identified, and proposed changes"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Read the convention_draft_md from the previous step. Spot-check 2-3 referenced
        existing conventions to verify overlap claims are accurate. Verify every
        convention in conventions/ was scanned, overlaps cite specific rule numbers,
        and each overlap has a concrete resolution.

  - name: change_summary_md
    description: "Summary of all file changes: convention created, conventions updated/removed, archetypes.yaml modifications"
    type: file_path
    review:
      strategy: individual
      instructions: >
        Read the cross_reference_report_md to verify all proposed changes were applied.
        Read conventions/archetypes.yaml to verify the new convention was wired correctly.
        Verify cross-references are bidirectional and no rules were silently dropped.

  - name: commit_result_md
    description: "Commit confirmation — hash, files changed, push status"
    type: file_path
    review:
      strategy: individual
      instructions: "Verify commit follows conventional commits format, was pushed to origin/main, and contains only convention-related files."

workflows:
  develop:
    summary: "Full keystone development lifecycle from plan through validated multi-host deployment"
    common_job_info_provided_to_all_steps_at_runtime: |
      Keystone is a NixOS-based infrastructure platform. Development follows a strict
      worktree-based workflow to keep the main branch always deployable.

      ## Convention: All work happens in worktrees

      Changes are NEVER made directly on main. Every change goes through:
      1. Create a git worktree branch off main
      2. Implement changes in the worktree
      3. Run DeepWork reviews (.deepreview rules) and fix findings
      4. Build to verify nix evaluation passes
      5. Merge the worktree branch into main
      6. Human runs `ks update --lock` in nixos-config to lock the new keystone rev
      7. Validate ALL hosts in the system with `ks doctor`

      ## Two-repo model

      - **keystone** — the NixOS module library (this repo). Worktree branches are created here.
      - **nixos-config** — the per-deployment configuration that imports keystone as a flake input.
        `ks update --lock` pulls the latest keystone main, locks flake.lock, builds, and deploys.

      ## Fast path vs full system

      During development, use `ks build` (home-manager only, no sudo) for fast iteration.
      This catches most evaluation errors and is sufficient for iterating on terminal/desktop
      module changes. However, the final deploy MUST always be `ks update --lock` which does
      a full system build + lock + deploy. Never consider a change complete until it has been
      through the full system path.

      ## Multi-host fleet

      Keystone manages multiple hosts (workstation, server, etc.) connected via Tailscale.
      After deploying to the current host, the validate step must check whether other hosts
      also need updating (e.g., if keystone module changes affect server services). Use
      `ks doctor` and the hosts table from `hosts.nix` to determine which hosts need attention.
      All hosts must be nominal before the workflow is complete.

      ## Key commands

      - `nix flake check --no-build` — fast evaluation check (catches type errors, missing imports)
      - `ks build` — build home-manager profiles only (fast, no sudo)
      - `ks build --lock` — full system build + lock + push
      - `ks update` — pull, build, deploy current host (requires sudo)
      - `ks update --lock` — pull, lock, build, push, deploy (requires sudo, human-only)
      - `ks doctor` — **AI entrypoint only** — this launches the `/ks.doctor` slash command (spawns a new model session). NEVER call `ks doctor` as a shell command inside a workflow step — use `systemctl --failed` and `journalctl -p err` for direct health checks instead.

      ## Iterative loop rules

      If the build step fails, loop back to implement to fix the issue.
      If validation finds problems after deploy, create a new worktree and loop back to plan.
      DeepWork review findings are fixed in-place in the worktree before proceeding.

      ## Convention system

      Conventions live in `conventions/` as RFC 2119 markdown files. Each convention follows
      a strict format: `{prefix}.{topic}.md` with prefixes `process`, `tool`, `code`, or `os`.
      Conventions are wired into agent archetypes via `conventions/archetypes.yaml` — either
      as `inlined_conventions` (always in context) or `referenced_conventions` (on-demand).

      The AGENTS.md in CLAUDE.md is generated from archetypes.yaml by the Nix build
      (`modules/terminal/conventions.nix`). After modifying archetypes.yaml, a `ks build`
      or `ks update` regenerates the instruction files.

      Key files:
      - `conventions/*.md` — convention documents
      - `conventions/archetypes.yaml` — maps conventions to agent archetypes and roles
      - `conventions/AGENTS.md` — meta-conventions for editing the conventions repo itself
      - `modules/terminal/conventions.nix` — Nix module that generates CLI tool instruction files
    steps:
      - name: plan
        instructions: |
          # Plan

          ## Objective

          Create a git worktree branch off main, analyze the user's goal, and produce a concrete implementation plan with validation criteria defined up front.

          ## Task

          Take the user's goal and translate it into an actionable implementation plan. The plan must be specific enough that another agent (or yourself in the next step) can execute it without ambiguity.

          ### Process

          1. **Understand the goal**
             - Read the user's goal input carefully
             - Ask structured questions if the goal is ambiguous or underspecified
             - Identify which keystone modules/packages are likely affected

          2. **Create the worktree**
             - Derive a branch name from the goal (e.g., `feat/add-ollama-module`, `fix/tpm-unlock-race`)
             - Follow conventional branch naming: `feat/`, `fix/`, `refactor/`, `chore/`, `docs/`
             - Create the worktree: `git worktree add .claude/worktrees/<branch-name> -b <branch-name>`

          3. **Analyze the scope**
             - Read the relevant source files to understand the current state
             - Determine if changes are **OS-level** (modules/os/, modules/server/, flake.nix) or **home-manager-only** (modules/terminal/, modules/desktop/home/)
             - This distinction matters for the build step — OS changes require full nix build, home-manager-only changes can use the fast `ks build` path

          4. **Define validation criteria**
             - For every change, define how to verify it works BEFORE starting implementation
             - Include: what commands to run, what output to expect, what "success" looks like
             - Validation criteria must be concrete and testable — not "it should work"

          5. **Write the plan**
             - List specific files to create or modify
             - Order steps logically (dependencies first)
             - Note any risks or things that could go wrong

          ## Output Format

          ### plan.md

          ```markdown
          # Implementation Plan

          ## Goal

          [Restate the user's goal in precise terms]

          ## Branch

          - **Name**: `<branch-name>`
          - **Worktree**: `.claude/worktrees/<branch-name>`

          ## Scope

          - **Change type**: [OS-level | home-manager-only | both]
          - **Build strategy**: [full nix build | ks build (home-manager only)]
          - **Affected modules**: [list of module paths]

          ## Validation Criteria

          These criteria MUST be satisfied before the work is considered complete:

          1. [Concrete, testable criterion — e.g., "nix flake check --no-build passes"]
          2. [Another criterion — e.g., "new option evaluates correctly in agent-evaluation.nix test"]
          3. [Runtime criterion — e.g., "ks doctor shows no new warnings after deploy"]

          ## Steps

          ### 1. [First change]

          - **File**: `path/to/file.nix`
          - **Change**: [What to do and why]

          ### 2. [Second change]

          - **File**: `path/to/other-file.nix`
          - **Change**: [What to do and why]

          [Continue for all changes...]

          ## Risks

          - [Anything that could go wrong or needs extra care]
          ```

          ## Quality Criteria

          - The plan has concrete, ordered implementation steps — not vague goals
          - The plan identifies specific files that will be created or modified
          - The plan includes clear validation criteria that are testable
          - The change type (OS-level vs home-manager-only) is correctly identified
          - A worktree branch has been created with a descriptive name

          ## Context

          This is the first step in the keystone development lifecycle. A good plan prevents wasted cycles in later steps. The validation criteria defined here will be checked in the final validate step after deployment, so they must be precise enough to verify on a live system.
        inputs:
          goal:
            required: true
        outputs:
          plan_md:
            required: true

      - name: implement
        instructions: |
          # Implement

          ## Objective

          Execute the implementation plan in the worktree — write code, test locally, and commit changes with clean conventional commits.

          ## Task

          Read the plan from the previous step and execute each change in the worktree. Work methodically through the plan, committing logical units of work as you go.

          ### Process

          1. **Switch to the worktree**
             - The worktree path is specified in the plan's "Branch" section
             - All file operations must happen in the worktree, NOT on main

          2. **Execute each plan step in order**
             - Follow the plan's steps sequentially
             - Read each target file before modifying it — understand the existing code
             - Make the smallest change that achieves the goal
             - If you discover something the plan missed, note it but stay focused — don't scope-creep

          3. **Commit as you go**
             - Use conventional commits: `feat(scope): description`, `fix(scope): description`, etc.
             - Group related changes into logical commits
             - Don't batch everything into one giant commit
             - Ensure each commit builds cleanly on its own when possible

          4. **Quick-check as you go**
             - For Nix changes: run `nix flake check --no-build` after significant edits to catch syntax errors early
             - For shell scripts: check with `shellcheck` if available
             - Don't wait until the build step to discover basic errors

          5. **Document what you did**
             - Track every file modified and why
             - Note any deviations from the plan with justification
             - Record any decisions made during implementation

          ## Output Format

          ### implementation_summary.md

          ```markdown
          # Implementation Summary

          ## Branch

          - **Name**: `<branch-name>`
          - **Worktree**: `.claude/worktrees/<branch-name>`

          ## Changes Made

          ### Commit: `<short hash>` — `<commit message>`

          - **Files**: `path/to/file1.nix`, `path/to/file2.nix`
          - **What**: [Brief description of what this commit does]

          ### Commit: `<short hash>` — `<commit message>`

          - **Files**: `path/to/file3.nix`
          - **What**: [Brief description]

          [Continue for all commits...]

          ## Plan Coverage

          | Plan Step           | Status | Notes                                  |
          | ------------------- | ------ | -------------------------------------- |
          | 1. [step from plan] | Done   |                                        |
          | 2. [step from plan] | Done   | Slightly different approach — [reason] |
          | 3. [step from plan] | Done   |                                        |

          ## Deviations from Plan

          - [Any changes not in the original plan, with justification]
          - [Or "None — implemented as planned"]

          ## Change Type Confirmation

          - **Scope**: [OS-level | home-manager-only | both]
          - **Build strategy**: [full nix build | ks build]
          ```

          ## Quality Criteria

          - All steps from the implementation plan are addressed — none are silently skipped
          - Changes are committed with conventional commit messages and logical grouping
          - The implementation stays focused on the plan — no scope creep or drive-by fixes
          - The change type (OS-level vs home-manager-only) is confirmed for the build step

          ## Context

          This step produces the actual code changes. The next step (review) will run DeepWork .deepreview rules against these changes, so clean commits and focused changes make review easier. If the build step later fails, the workflow will loop back here to fix issues.
        inputs:
          plan_md:
            required: true
        outputs:
          implementation_summary_md:
            required: true

      - name: review
        instructions: |
          # Review

          ## Objective

          Run DeepWork `.deepreview` rules against the worktree changes and fix all findings before proceeding to build.

          ## Task

          Use the DeepWork review system to validate the changes made in the implement step. Fix all actionable findings, document any skipped findings with justification.

          ### Process

          1. **Run the reviews**
             - Call `mcp__deepwork__get_review_instructions` (no arguments — it auto-detects the branch diff)
             - This returns review tasks to run in parallel

          2. **Execute all review tasks**
             - Launch each review task as a parallel sub-agent
             - Collect all findings

          3. **Act on findings**
             - **Obviously correct fixes** (typos, missing imports, formatting): fix immediately
             - **Substantive findings** (architectural issues, missing tests, spec drift): fix in the worktree and commit
             - **False positives or not applicable**: document why in the review report

          4. **Re-run until clean**
             - After fixing findings, re-run the reviews
             - Repeat until all reviews pass or remaining findings are explicitly skipped with justification
             - Only reviews that had findings need re-running

          5. **Document results**
             - Record what was found and how each finding was resolved

          ## Output Format

          ### review_report.md

          ```markdown
          # Review Report

          ## Reviews Run

          - [review_name_1]: [PASSED | X findings]
          - [review_name_2]: [PASSED | X findings]

          ## Findings Addressed

          ### Finding: [brief description]

          - **Review**: [which review rule]
          - **Action**: Fixed — [what was changed]
          - **Commit**: `<hash>` — `<message>`

          ### Finding: [brief description]

          - **Review**: [which review rule]
          - **Action**: Skipped — [justification for why this is not applicable]

          ## Final Status

          - **Total findings**: X
          - **Fixed**: Y
          - **Skipped**: Z (with justification)
          - **All reviews passing**: [yes/no]
          ```

          ## Quality Criteria

          - Every review finding is either fixed or has a documented justification for skipping
          - Fixes are committed in the worktree with descriptive commit messages
          - The final review run shows all reviews passing (or only skipped findings remain)

          ## Context

          This is the quality gate before build. Catching issues here (docs drift, spec mismatches, code style) is much cheaper than finding them after merge and deploy. The review rules in `.deepreview` are specifically tuned for keystone conventions.
        inputs:
          implementation_summary_md:
            required: true
        outputs:
          review_report_md:
            required: true

      - name: build
        instructions: |
          # Build

          ## Objective

          Verify the changes are correct using the fastest possible feedback loop. Only escalate to full system builds when necessary.

          ## Task

          Run targeted, fast verification first. Escalate to broader builds only when the change scope requires it. The goal is rapid iteration — don't wait minutes for a full rebuild when a 5-second check will catch the issue.

          ### Process

          1. **Targeted verification first (seconds)**
             - **Shell scripts**: Run `shellcheck` on any modified `.sh` files
             - **Nix syntax** (`.nix` files only): Run `nix-instantiate --parse` on individual changed `.nix` files to catch syntax errors
             - **Unit tests**: If `tests/module/` has relevant test files, run them individually:
               `nix eval --file tests/module/agent-evaluation.nix --json` (fast, no build)
             - Fix any errors found at this level before proceeding

          2. **Evaluation check (10-30 seconds)**
             - Run `nix flake check --no-build`
             - This evaluates all NixOS configurations and checks assertions without building derivations
             - If this fails, the issue is in the Nix evaluation — fix it and re-check
             - If this fails, call `go_to_step` with `step_id: "implement"` to fix

          3. **Build check (only if needed)**
             - **Home-manager-only changes**: Run `ks build` (builds home-manager profiles, no sudo, ~30s)
             - **OS-level changes**: The full system build happens during `ks update --lock` in deploy. Do NOT attempt a full nixos-rebuild here — it's slow and requires sudo
             - For OS changes, `nix flake check --no-build` passing is sufficient for this step

          4. **Evaluate results**
             - If all checks pass: proceed to merge
             - If targeted checks or eval fails: call `go_to_step` with `step_id: "implement"` to fix
             - Document all output including warnings

          **Maximum loop iterations**: If this is the 3rd build failure, stop looping and ask the user for guidance.

          ## Output Format

          ### build_result.md

          ```markdown
          # Build Result

          ## Change Scope

          - **Type**: [OS-level | home-manager-only | both]
          - **Modified files**: [list of key files changed]

          ## Targeted Checks

          | Check              | Status        | Time |
          | ------------------ | ------------- | ---- |
          | shellcheck [file]  | PASS/FAIL/N/A | Xs   |
          | nix parse [file]   | PASS/FAIL     | Xs   |
          | module test [test] | PASS/FAIL/N/A | Xs   |

          ## Evaluation Check

          - **Command**: `nix flake check --no-build`
          - **Status**: [PASS | FAIL]
          - **Time**: [Xs]
          - **Errors**: [none | error details]

          ## Build Check

          - **Command**: [ks build | skipped — OS changes build at deploy]
          - **Status**: [PASS | FAIL | SKIPPED]
          - **Time**: [Xs]
          - **Warnings**: [notable warnings, or "none beyond upstream deprecations"]

          ## Decision

          - **Proceed to merge**: [yes | no — loop back to implement]
          ```

          ## Quality Criteria

          - Targeted checks (shellcheck, nix parse) pass on all modified files
          - `nix flake check --no-build` passes without errors
          - For home-manager-only changes, `ks build` also passes
          - The build strategy matches the change scope

          ## Context

          Speed matters here. The develop workflow is designed for rapid iteration. A 5-second shellcheck or nix parse catches most errors instantly. The 30-second `nix flake check --no-build` catches evaluation issues. Only home-manager changes need `ks build` — OS changes get their full build during deploy. Don't make the developer wait for a full system rebuild when faster feedback is available.
        inputs:
          review_report_md:
            required: true
        outputs:
          build_result_md:
            required: true

      - name: merge
        instructions: |
          # Merge

          ## Objective

          Merge the worktree branch into keystone main and push to origin, making the changes available for deployment.

          ## Task

          Merge the completed, reviewed, and built changes from the worktree into the main branch and push.

          ### Process

          1. **Pre-merge checks**
             - Confirm the build step passed (read build_result.md)
             - Ensure all commits in the worktree are pushed to the branch
             - Check if main has advanced since the worktree was created: `git log main..origin/main`

          2. **Merge to main**
             - Switch to main: `git checkout main`
             - Pull latest: `git pull`
             - Merge the branch: `git merge <branch-name>`
             - If merge conflicts arise: resolve them, then re-run `nix flake check --no-build` to verify
             - Do NOT use `--squash` — preserve individual commits for history

          3. **Push**
             - Push main to origin: `git push`
             - Verify the push succeeded

          4. **Clean up worktree**
             - Remove the worktree: `git worktree remove .claude/worktrees/<branch-name>`
             - Delete the branch: `git branch -d <branch-name>`
             - Note: if validation later fails and requires a fix, a new worktree will be created in the plan step — this is by design (clean worktree per change)

          5. **Document the merge**
             - Record the final commit hash on main
             - Note the branch that was merged

          ## Output Format

          ### merge_result.md

          ```markdown
          # Merge Result

          ## Branch Merged

          - **Branch**: `<branch-name>`
          - **Commits**: [number of commits merged]
          - **Final commit on main**: `<hash>`

          ## Merge Details

          - **Conflicts**: [none | resolved — description]
          - **Push status**: [success | failed — reason]

          ## Cleanup

          - **Worktree removed**: [yes/no]
          - **Branch deleted**: [yes/no]

          ## Ready for Deploy

          The changes are now on keystone main at commit `<hash>`.
          The human can now run `ks update --lock` in nixos-config to deploy.
          ```

          ## Quality Criteria

          - The merge completed without unresolved conflicts and the branch was pushed to origin/main
          - The worktree and branch were cleaned up
          - The final commit hash is recorded for traceability

          ## Context

          After this step, the changes are on keystone main but NOT yet deployed. The deploy step requires human intervention (`ks update --lock` needs sudo). The merge result provides the commit hash the human needs to verify they're deploying the right changes.
        inputs:
          build_result_md:
            required: true
        outputs:
          merge_result_md:
            required: true

      - name: deploy
        instructions: |
          # Deploy

          ## Objective

          Guide the human through running `ks update --lock` in nixos-config to deploy the merged keystone changes to the system.

          ## Task

          This is a **human-in-the-loop** step. The agent cannot run `ks update --lock` because it requires sudo. Guide the human through the deployment and capture the results.

          ### Process

          1. **Prompt the human**
             - Tell the user to run `ks update --lock` in their nixos-config directory
             - Remind them this will: pull latest keystone, lock flake.lock, build the full system, and deploy
             - Ask them to share the output when it completes

          2. **Wait for results**
             - The human will run the command and report back
             - Ask structured questions if the output is unclear:
               - Did the build succeed?
               - Were there any errors or warnings?
               - Did the deployment (switch-to-configuration) succeed?

          3. **Evaluate the deployment**
             - If `ks update --lock` succeeded: proceed to validate
             - If it failed with a build error: this is likely a Nix evaluation issue that wasn't caught in the build step. The agent should analyze the error and determine if it can be fixed. If so, call `go_to_step` with `step_id: "implement"` (this will require creating a new worktree since the previous one was cleaned up in merge)
             - If it failed with a deployment error (switch-to-configuration): document the error and ask the human for guidance

          4. **Document the deployment**
             - Capture the key output from `ks update --lock`
             - Note the keystone commit that was locked

          **Maximum loop iterations**: If the deploy fails twice, stop and ask the human to investigate manually rather than looping.

          ## Output Format

          ### deploy_result.md

          ```markdown
          # Deploy Result

          ## Command

          `ks update --lock` in nixos-config

          ## Keystone Revision

          - **Locked commit**: `<hash from flake.lock>`
          - **Previous commit**: `<previous hash>`

          ## Build Output

          - **Status**: [success | failed]
          - **Warnings**: [notable warnings, or "none beyond upstream deprecations"]

          ## Deploy Output

          - **Status**: [success | failed]
          - **NixOS generation**: [generation number if available]

          ## Notes

          - [Any relevant observations from the deploy output]
          ```

          ## Quality Criteria

          - The human confirmed `ks update --lock` completed successfully
          - The locked keystone commit matches the merge result from the previous step
          - Any warnings or issues are documented

          ## Context

          This is the only step that requires human intervention. `ks update --lock` is the full pipeline: pull repos, lock flake inputs, build the complete NixOS system, push the lock commit, and switch to the new configuration. It requires sudo because NixOS system activation requires root. After this step, the system is running the new configuration and the validate step will verify everything is nominal.
        inputs:
          merge_result_md:
            required: true
        outputs:
          deploy_result_md:
            required: true

      - name: validate
        instructions: |
          # Validate

          ## Objective

          Run `ks doctor` on the current host and check all affected hosts in the fleet to verify the system is nominal after deployment.

          ## Task

          Verify that the deployed changes are working correctly across all hosts. This step can also be run standalone via the `doctor` workflow to check fleet health at any time.

          ### Process

          1. **Check current host health directly**
             - **Do NOT run `ks doctor`** — it is an AI entrypoint (`/ks.doctor` slash command), not a shell diagnostic tool
             - Run direct health checks instead:
               ```bash
               systemctl is-system-running           # overall state
               systemctl --failed                    # list failed units
               journalctl -p err --since '1 hour ago' --no-pager | tail -30
               ```
             - For service-specific checks related to the deployed changes, run `systemctl status <service>` directly
             - Pay special attention to services related to the changes that were deployed

          2. **Check the validation criteria from the plan**
             - If this step is running as part of the `develop` workflow, read the plan.md from the plan step
             - Verify each validation criterion defined in the plan is satisfied
             - Run the specific commands listed in the plan's "Validation Criteria" section

          3. **Check agent health**
             - List all configured agents via nix eval (see AGENTS.md "Nix Eval for System Context"):
               ```bash
               nix eval ~/.keystone/repos/nixos-config#nixosConfigurations.<HOST>.config.keystone.os.agents \
                 --json --apply 'a: builtins.mapAttrs (_: v: { fullName = v.fullName; host = v.host or null; archetype = v.archetype; desktop = v.desktop.enable; mail = v.mail.provision; chrome = v.chrome.enable; }) a'
               ```
             - For each agent on the current host, check:
               - `agentctl <agent> status` — are core services running?
               - `agentctl <agent> tasks` — are tasks processing or stuck? Note count of pending tasks.
               - `agentctl <agent> jobs` (or equivalent) — what are the 3-5 most recent jobs? Are any stuck/failed?
               - `agentctl <agent> email` — is mail flowing?
             - For agents on remote hosts, SSH in and run equivalent checks
             - **Tailscale note**: `tailscale status` shows per-agent Tailscale nodes. Agent Tailscale integration is a **TODO feature** — offline agent nodes are expected and informational only. Only flag if a _host-level_ Tailscale node goes offline.

          4. **Cross-reference issues with GitHub**
             - For each issue found (failed units, stuck agents, unhealthy services), search GitHub before treating it as new:
               ```bash
               gh issue list --search "<keyword>" --repo ncrmro/keystone
               gh issue list --search "<keyword>" --repo ncrmro/nixos-config
               ```
             - If an existing issue is found: link it in the report — do not create a duplicate
             - If no existing issue: document it as a new finding requiring a new issue

          5. **Determine fleet impact**
             - Read the hosts table: `ks agent` can show the fleet, or evaluate `hosts.nix` directly
             - Determine which other hosts are affected by the changes:
               - Server module changes affect the server host
               - Agent module changes affect hosts running agents
               - Terminal/desktop changes affect all workstations
               - Domain/services changes may affect all hosts
             - If no other hosts are affected, document why and skip multi-host checks

          6. **Check other affected hosts**
             - For each affected remote host:
               - SSH in and check service status: `ssh root@<host> systemctl --failed`
               - Check for any deployment-related issues: `ssh root@<host> journalctl -p err --since '1 hour ago'`
               - If the remote host needs updating too, inform the human
             - Ask structured questions to confirm if the human wants to update remote hosts now

          7. **Evaluate results**
             - If all checks pass: complete the workflow
             - If issues found on current host: document them. If they are caused by the recent changes, call `go_to_step` with `step_id: "plan"` to create a fix (this requires a new worktree since we already merged)
             - If remote hosts need attention: document what needs to happen

          8. **Archive report to zk notes** (see `tool.zk-notes` and `process.notes`)
             - Fleet health reports contain personal deployment data — archive to the configured notes dir (`$NOTES_DIR`, `~/notes` for Keystone human users), NOT leave them in the open-source repo
             - **Find prior report** (required — used for `previous_report` chain):
               ```bash
               NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
               zk --notebook-dir "$NOTES_DIR" list reports/ \
                 --tag "report/keystone-system" \
                 --tag "repo/ncrmro/nixos-config" \
                 --tag "source/deepwork/ks-doctor" \
                 --sort created- --limit 1 --format json
               ```
             - **Create the report note**:
               ```bash
               NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
               zk --notebook-dir "$NOTES_DIR" new reports/ --title "keystone fleet health $(date +%Y-%m-%d)" \
                 --no-input --print-path \
                 --extra report_kind="keystone-system" \
                 --extra source_ref="ks.doctor" \
                 --extra type="report" \
                 --extra author="ks.doctor"
               ```
             - **Write note content** — required frontmatter (`type: report`, `tags: [report/keystone-system, repo/ncrmro/nixos-config, source/deepwork/ks-doctor]`, `previous_report: <prior note id or omit if none>`) followed by a concise summary:
               - Keystone revision gap (commits behind, impactful changes)
               - Host reachability table
               - Failed units per host with GitHub issue links
               - Action items
             - **Link from a relevant hub if one exists**:
               ```bash
               NOTES_DIR="${NOTES_DIR:-$HOME/notes}"
               zk --notebook-dir "$NOTES_DIR" list index/ --tag "status/active" --format json
               ```
               If there is a system or operations hub for this notebook, append a link to the new report in its report ledger section. Do not require a `project/keystone` hub.

          **Maximum loop iterations**: If this is the 2nd validation failure, stop looping and present all findings to the human for manual resolution.

          ## Output Format

          ### validation_report.md

          ```markdown
          # Validation Report

          ## Current Host

          - **Hostname**: [hostname]
          - **System state**: [running | degraded | maintenance]
          - **Failed units**: [from `systemctl --failed`, or "None"]
          - **Recent errors**: [from `journalctl -p err`, or "None"]

          ## Plan Validation Criteria

          | Criterion             | Status    | Evidence                        |
          | --------------------- | --------- | ------------------------------- |
          | [criterion from plan] | PASS/FAIL | [command output or observation] |
          | [criterion from plan] | PASS/FAIL | [command output or observation] |

          ## Agent Health

          ### [agent-name] (host: [host])

          - **Services**: [running | failed — details]
          - **Tasks**: [N pending | idle | stuck since HH:MM]
          - **Recent jobs**: [last 3-5 job names or "none in last 24h"]
          - **Blocking issues**: [description or "none"]
          - **Mail**: [ok | down]
          - **Tailscale**: [online | offline] _(offline is expected — agent Tailscale integration is a TODO)_

          ## Fleet Impact Assessment

          - **Changes affect**: [list of affected hosts, or "current host only"]
          - **Hosts checked**: [list]
          - **Hosts needing update**: [list, or "none"]

          ## Remote Host Status

          ### [hostname] (if applicable)

          - **Status**: [nominal | issues found | needs update]
          - **Details**: [findings]

          ## Issues Found

          | Issue                                         | Existing tracker item   | Status       |
          | --------------------------------------------- | ----------------------- | ------------ |
          | [e.g., syncoid-rpool-to-ocean.service failed] | [#42 — link]            | pre-existing |
          | [e.g., unknown service crash]                 | none — new issue needed | new          |

          ## Overall Status

          - **System nominal**: [yes | no — details]
          - **All validation criteria met**: [yes | no — which failed]
          - **Action needed**: [none | list of follow-up actions]
          ```

          ## Quality Criteria

          - Direct health checks on the current host (`systemctl --failed`, `journalctl -p err`) show no critical issues
          - All hosts affected by the changes have been checked or confirmed not impacted
          - The specific validation criteria from the plan are confirmed working on the live system
          - Each agent's task queue, recent jobs, and any blocking issues are reported
          - Every issue found is cross-referenced against the issue tracker — existing issues are linked, genuinely new issues are flagged for creation
          - A dated fleet health note has been written to the configured notes dir via `zk` — the report must not remain only in the keystone repo's `.deepwork/` folder

          ## Context

          This is the final quality gate in the develop workflow. It ensures that changes don't just build — they actually work on a live system. The multi-host check is critical because keystone manages a fleet of interconnected hosts, and a change that works on the workstation might break a server service or agent provisioning. This step can also be invoked standalone via the `doctor` workflow for routine fleet health checks.
        inputs:
          deploy_result_md:
            required: false
        outputs:
          validation_report_md:
            required: true

  issue:
    summary: "Create or identify a keystone GitHub issue whose body contains RFC 2119 requirements, user story, diagrams, and deliverables"
    common_job_info_provided_to_all_steps_at_runtime: |
      Keystone is a NixOS-based infrastructure platform. Development follows a strict
      worktree-based workflow to keep the main branch always deployable.

      ## Two-repo model

      - **keystone** — the NixOS module library (this repo). Worktree branches are created here.
      - **nixos-config** — the per-deployment configuration that imports keystone as a flake input.
        `ks update --lock` pulls the latest keystone main, locks flake.lock, builds, and deploys.

      ## Convention system

      Conventions live in `conventions/` as RFC 2119 markdown files. Each convention follows
      a strict format: `{prefix}.{topic}.md` with prefixes `process`, `tool`, `code`, or `os`.
      Conventions are wired into agent archetypes via `conventions/archetypes.yaml` — either
      as `inlined_conventions` (always in context) or `referenced_conventions` (on-demand).

      Key files:
      - `conventions/*.md` — convention documents
      - `conventions/archetypes.yaml` — maps conventions to agent archetypes and roles
      - `conventions/AGENTS.md` — meta-conventions for editing the conventions repo itself
      - `modules/terminal/conventions.nix` — Nix module that generates CLI tool instruction files
    steps:
      - name: write_issue
        instructions: |
          # Write Issue

          ## Objective

          Produce a GitHub issue for `ncrmro/keystone` whose body serves as the plan of
          record: RFC 2119 requirements, user stories, affected modules, architecture
          diagrams, and an implementation checklist that can later be mirrored in the PR.

          ## Task

          Take the user's feature description and research the keystone codebase to
          produce a well-structured issue. Ask structured questions if the description is
          ambiguous.

          ### Process

          1. **Understand the feature**
             - Parse the user's feature description
             - Ask structured questions to clarify scope, affected hosts, and integration points
             - Identify which existing keystone modules are involved

          2. **Research the codebase**
             - Read the relevant modules in `modules/` to understand current architecture
             - Check if similar patterns exist (e.g., how other server services are structured)
             - Review `AGENTS.md` / `CLAUDE.md` for the module file tree and conventions
             - Look at existing specs in `specs/` for format reference — especially the most recent ones

          3. **Draft the issue**
             - Follow the established format (see Output Format below)
             - Use RFC 2119 keywords: MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD NOT, MAY, REQUIRED, OPTIONAL
             - Every requirement MUST be numbered under a temporary issue-local prefix such as `ISSUE-REQ-1`, `ISSUE-REQ-2`, or another unambiguous sequential format
             - Include at least one ASCII diagram showing module architecture or data flow
             - Identify all affected files in `modules/`, `packages/`, and `flake.nix`
             - Include a checklist of deliverables or implementation tasks derived from the requirements
             - The issue body MUST be sufficient for a future PR description to reuse directly

          4. **Create the GitHub issue**
             - Choose a Conventional-Commit-style issue title: `type(scope): subject`
             - Use `gh issue create --repo ncrmro/keystone --title "..." --body-file <file>`
             - If a closely matching issue already exists, do NOT create a duplicate. Update the output file with the existing issue URL and explain why it matches.
             - Save the final issue body to a temporary local markdown file under `.deepwork/tmp/` before creating the issue, using a unique slug-based name so multiple issues in a session don't overwrite each other (e.g., `.deepwork/tmp/keystone-issue-agent-assets-fallback.md`). Do NOT place this draft under `.deepwork/jobs/`, because the local file is only a staging artifact for `gh issue create`.
             - After creation, append the created issue URL to the output file.

          5. **Archive to notes (if notes are enabled)**
             - Check if `keystone.notes` is enabled: `nix eval ~/.keystone/repos/nixos-config#homeConfigurations.<user>.config.keystone.notes.enable --json 2>/dev/null`
             - If enabled, use `NOTES_DIR="${NOTES_DIR:-$HOME/notes}"` and create a brief note there via `zk --notebook-dir "$NOTES_DIR" new notes/ --title "keystone issue: <title>" --no-input`. Write the issue URL, one-paragraph summary, and the GitHub link. On Keystone systems, `NOTES_DIR` resolves to the configured notebook root (`~/notes` for human users).
             - If notes are not enabled or the command fails, skip silently.

          ## Output Format

          ### issue.md

          Use a file path under `.deepwork/tmp/`, for example `.deepwork/tmp/keystone-issue.md`. The GitHub issue is the canonical source of record; the local markdown file is temporary workflow output.

          ```markdown
          # <Conventional issue title>

          <One paragraph summary of what this feature does and why it matters.>

          ## User stories

          - As a [role], I want [capability] so that [benefit].
          - As a [role], I want [capability] so that [benefit].

          ## Architecture
          ```

          [ASCII diagram showing module relationships, data flow, or system topology]

          ```

          ## Affected Modules
          - `modules/path/to/file.nix` — [what changes]
          - `modules/path/to/other.nix` — [what changes]

          ## Requirements

          ### <Section Name>

          **ISSUE-REQ-1** <Module/feature> MUST <do something specific>.

          **ISSUE-REQ-2** <Module/feature> SHOULD <do something recommended>.

          **ISSUE-REQ-3** When <condition>, <module> MUST <behavior>.

          [Continue with numbered requirements grouped by logical section...]

          ## Deliverables

          - [ ] Deliverable derived from the requirements
          - [ ] Deliverable derived from the requirements

          ## Acceptance criteria

          - [ ] Requirement coverage is complete
          - [ ] Build/test/validation path is identified

          ## Issue metadata

          - Repository: `ncrmro/keystone`
          - Suggested labels: `<optional labels>`
          - Created issue: `<issue URL after creation>`
          ```

          ## Quality Criteria

          - Requirements use RFC 2119 keywords correctly and consistently
          - Each requirement is numbered and specific enough to verify
          - At least one ASCII diagram illustrates the architecture
          - All affected keystone modules and files are identified
          - A user stories section explains why this feature matters for the relevant actors
          - The issue body can be reused as the foundation for the eventual PR description
          - A GitHub issue was created or an existing matching issue was linked with justification

          ## Context

          Keystone issues are the plan of record for implementation. The issue body
          should contain the requirements and checklist that will later be reflected in
          the PR description. Avoid creating a standalone `specs/REQ-XXX/...` file unless
          the user explicitly asked for a committed spec in addition to the issue.
        inputs:
          feature_description:
            required: true
        outputs:
          issue_md:
            required: true

  doctor:
    summary: "Check all hosts are nominal — survey fleet state, then validate via direct shell health checks"
    common_job_info_provided_to_all_steps_at_runtime: |
      Keystone is a NixOS-based infrastructure platform. Development follows a strict
      worktree-based workflow to keep the main branch always deployable.

      ## Multi-host fleet

      Keystone manages multiple hosts (workstation, server, etc.) connected via Tailscale.
      After deploying to the current host, the validate step must check whether other hosts
      also need updating (e.g., if keystone module changes affect server services). Use
      `ks doctor` and the hosts table from `hosts.nix` to determine which hosts need attention.
      All hosts must be nominal before the workflow is complete.

      ## Key commands

      - `nix flake check --no-build` — fast evaluation check (catches type errors, missing imports)
      - `ks build` — build home-manager profiles only (fast, no sudo)
      - `ks doctor` — **AI entrypoint only** — this launches the `/ks.doctor` slash command (spawns a new model session). NEVER call `ks doctor` as a shell command inside a workflow step — use `systemctl --failed` and `journalctl -p err` for direct health checks instead.

      ## Two-repo model

      - **keystone** — the NixOS module library (this repo). Worktree branches are created here.
      - **nixos-config** — the per-deployment configuration that imports keystone as a flake input.
        `ks update --lock` pulls the latest keystone main, locks flake.lock, builds, and deploys.
    steps:
      - name: survey_fleet
        instructions: |
          # Survey Fleet

          ## Objective

          Gather the current state of the keystone fleet: what keystone revision is locked in nixos-config, what's on keystone main, the commit changelog between them, and a preliminary health check of all reachable hosts.

          ## Task

          Build a comprehensive snapshot of the fleet's current state to inform the update plan. This step collects data only — no changes are made.

          ### Process

          1. **Determine the keystone revision gap**
             - Find the config repo by reading the activation-time pointer at `/run/current-system/keystone-system-flake` (written by `keystone.systemFlake`). On a non-running-NixOS host, fall back to `~/.keystone/repos/nixos-config`.
             - Read `flake.lock` to extract the currently locked keystone revision:
               ```bash
               nix eval --raw <nixos-config-path>#inputs.keystone.rev 2>/dev/null \
                 || jq -r '.nodes.keystone.locked.rev' <nixos-config-path>/flake.lock
               ```
             - Get the latest commit on keystone main:
               ```bash
               git -C <keystone-path> rev-parse origin/main
               ```
             - If the revs differ, list all commits in the gap:
               ```bash
               git -C <keystone-path> log --oneline <locked-rev>..origin/main
               ```
             - If the revs match, note "keystone is up to date" and the workflow can be short-circuited

          2. **Check nixos-config recent commits**
             - Review the last 20 commits on nixos-config's current branch (usually main):
               ```bash
               git -C <nixos-config-path> log --oneline -20
               ```
             - Note any uncommitted changes in nixos-config: `git -C <nixos-config-path> status`

          3. **Check current host health directly**
             - **Do NOT run `ks doctor`** — that command is an AI entrypoint (`/ks.doctor` slash command) and would create a recursive loop
             - Instead, run direct shell health checks:
               ```bash
               systemctl is-system-running           # overall state: running / degraded
               systemctl --failed                    # list any failed units
               journalctl -p err --since '1 hour ago' --no-pager | tail -20
               ```
             - Note any failed units or recent errors — these are pre-existing issues, not caused by pending changes

          4. **Gather fleet data via nix eval**
             Use the same nix eval patterns as `ks doctor` (see AGENTS.md "Nix Eval for System Context"):
             - **Hosts table**: `nix eval -f <config-path>/hosts.nix --json`
             - **Agents** (per host):
               ```bash
               nix eval <config-path>#nixosConfigurations.<HOST>.config.keystone.os.agents \
                 --json --apply 'a: builtins.mapAttrs (_: v: {
                   fullName = v.fullName; host = v.host or null;
                   archetype = v.archetype; desktop = v.desktop.enable;
                   mail = v.mail.provision; chrome = v.chrome.enable;
                 }) a'
               ```
             - **Users** (per host):
               ```bash
               nix eval <config-path>#nixosConfigurations.<HOST>.config.keystone.os.users \
                 --json --apply 'u: builtins.mapAttrs (_: v: { fullName = v.fullName or ""; }) u'
               ```
             - **Enabled services** (server hosts):
               ```bash
               nix eval <config-path>#nixosConfigurations.<HOST>.config.keystone.server._enabledServices \
                 --json 2>/dev/null
               ```

          5. **Check host reachability**
             - From the hosts table, for each host with an `sshTarget`, check reachability:
               ```bash
               ssh -o ConnectTimeout=5 -o BatchMode=yes root@<sshTarget> echo ok 2>/dev/null
               ```
             - Record which hosts are reachable and which are not
             - For reachable hosts, capture their current NixOS generation:
               ```bash
               ssh root@<sshTarget> readlink /nix/var/nix/profiles/system
               ```
             - Skip VMs and test hosts (those with `sshTarget: null` or `baremetal: false` where not cloud)

          6. **Cross-reference known issues with GitHub**
             - For any failed units or health problems found in step 3, search GitHub before treating them as new:
               ```bash
               gh issue list --search "<keyword>" --repo ncrmro/keystone
               gh issue list --search "<keyword>" --repo ncrmro/nixos-config
               ```
             - Note the issue URL next to each finding in the health section — do not create duplicates

          7. **Check for agenix-secrets changes**
             - If `agenix-secrets/` exists in nixos-config, check if it's clean and up to date:
               ```bash
               git -C <nixos-config-path>/agenix-secrets status --short
               git -C <nixos-config-path>/agenix-secrets log origin/main..HEAD --oneline
               ```

          ## Output Format

          ### fleet_survey.md

          ```markdown
          # Fleet Survey

          **Date**: [current date/time]
          **nixos-config path**: [path]
          **keystone path**: [path]

          ## Keystone Revision Gap

          - **Locked in flake.lock**: `[commit hash]` ([date])
          - **Latest on main**: `[commit hash]` ([date])
          - **Commits behind**: [N]

          ### Changelog (oldest -> newest)

          | Hash      | Message                           | Modules Touched    |
          | --------- | --------------------------------- | ------------------ |
          | `abc1234` | feat(os): add new agent option    | modules/os/agents/ |
          | `def5678` | fix(terminal): shell prompt color | modules/terminal/  |
          | ...       | ...                               | ...                |

          ## nixos-config Status

          - **Branch**: [main]
          - **Clean**: [yes | no — details]
          - **Recent commits**:
          ```

          [last 10 commits one-line]

          ```

          ## Preliminary Health (Current Host)

          - **Hostname**: [hostname]
          - **System state**: [running | degraded | maintenance]
          - **Failed units**: [list from `systemctl --failed`, or "None"]
          - **Recent errors**: [summary from `journalctl -p err`, or "None"]

          ## Host Reachability

          | Host | Role | SSH Target | Reachable | Generation | Notes |
          |------|------|------------|-----------|------------|-------|
          | ncrmro-workstation | client | ncrmro-workstation.mercury | yes | 142 | current host |
          | ocean | server | ocean.mercury | yes | 87 | — |
          | mercury | server | 216.128.136.32 | yes | 45 | VPS |
          | maia | server | maia.mercury | no | — | offline |
          | mox | client | mox.mercury | no | — | offline |

          ## Agenix Secrets

          - **Status**: [clean | dirty — details]
          - **Up to date**: [yes | no — commits behind]
          ```

          ## Quality Criteria

          - The report shows the exact keystone commit currently locked in flake.lock and the latest commit on keystone main, with the full commit log between them
          - All hosts in hosts.nix are listed with their reachability status — unreachable hosts are noted, not silently skipped
          - Direct host health checks (`systemctl --failed`, `journalctl -p err`) were run on the current host and any issues are documented

          ## Context

          This is the first step of the update workflow. The data collected here drives all subsequent decisions: the plan_update step uses the changelog to classify changes, the execute_fixes step uses pre-existing issues to prioritize work, and the run_update step uses host reachability to determine deployment targets. Accuracy here prevents surprises during deployment.
        inputs: {}
        outputs:
          fleet_survey_md:
            required: true

      - name: validate
        instructions: |
          # Validate

          ## Objective

          Run `ks doctor` on the current host and check all affected hosts in the fleet to verify the system is nominal after deployment.

          ## Task

          Verify that the deployed changes are working correctly across all hosts. This step can also be run standalone via the `doctor` workflow to check fleet health at any time.

          ### Process

          1. **Check current host health directly**
             - **Do NOT run `ks doctor`** — it is an AI entrypoint (`/ks.doctor` slash command), not a shell diagnostic tool
             - Run direct health checks instead:
